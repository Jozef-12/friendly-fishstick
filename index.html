    },
    trends: [
      { titel: "Recordincasso €11,2M (+6%) — vierde jaar op rij stijgend", richting: "up", impact: "P", detail: "€10,57M (2023) → €11,20M (2024). Volledig afkomstig van Nederlandse gebruikers: hogescholen, universiteiten en commerciële onderwijsinstellingen. Overgrote deel via raamovereenkomsten ('Easy Access'/afkoopregelingen) met VH en UNL. UvO 'erin geslaagd om binnen deze regelingen meer gebruik af te rekenen' → daling aantal inbreuken en toestemmingsaanvragen → stijging afkoopgelden, afname individuele aanvragen. Daarnaast groeimodel UNL-regeling (jaarlijks stijgend afkoopbedrag)." },
      { titel: "Recordrepartitie €11,4M (+4%) — hoogste bedrag ooit", richting: "up", impact: "P", detail: "€10,93M (2023) → €11,36M (2024). Samenstelling: rechthebbenden €3,60M (was €3,78M) · Nederlandse CBO's €7,76M (was €7,15M). Verdeling op basis onafhankelijk onderzoek naar gebruik binnen instellingen (elke 3 jaar steekproef). Universiteit-afkoopgelden: 61% internationale uitgevers (via IPRO) · 17% NL uitgevers · 22% beeldmakers (via Pictoright) · 0,3% auteurs (via Lira). Hogeschool-afkoopgelden: 58% NL uitgevers · 31% internationaal · 9% beeldmakers · 1% muziek (FEMU) · 1% auteurs." },
      { titel: "Universiteiten-afkoop +8,5% naar €5,97M (groeimodel UNL)", richting: "up", impact: "P", detail: "€3,66M (2020) → €5,08M (2021) → €4,58M (2022) → €5,50M (2023) → €5,97M (2024). Onder nieuwe Easy Access-regeling 2023–2025 afgesproken dat afkoopsom gedurende looptijd geleidelijk stijgt i.v.m. door UvO geconstateerde toename in hergebruik. Tegelijkertijd max pagina's verlaagd van 50→40 (max 20% van werk). Geldt voor papier + digitaal + PowerPoint-afbeeldingen. Docenten aangesloten universiteiten kunnen hergebruiken; 40+ pagina's vereist aanvullende toestemming via Auteursrechten-informatiepunt (AIP)." },
      { titel: "Hogescholen-afkoop +2,3% naar €4,82M (stabilisatie)", richting: "flat", impact: "A", detail: "€1,94M (2020) → €4,33M (2021) → €4,52M (2022) → €4,71M (2023) → €4,82M (2024). Vereniging Hogescholen namens 36 aangesloten hogescholen. Docenten kunnen tot 50 pagina's overnemen (max 25% van werk). Tot 50 afbeeldingen in PowerPoints. Geldt voor papier én digitaal. Alle 36 hogescholen hebben in 2024 rapportages aangeleverd over hergebruik — door voorzitter aangemerkt als 'belangrijke stap'." },
      { titel: "Readergelden dalen (afkoop vervangt individuele aanvragen)", richting: "down", impact: "A", detail: "Alleen readergelden (naheffingsgelden, titelspecifieke gelden, losse afkoopregelingen commerciële onderwijsinstellingen) daalden in 2024. Structureel gevolg van succesvolle Easy Access-modellen: meer afgerekend binnen afkoopregelingen → daling aantal inbreuken en individuele toestemmingsaanvragen → directe impact op inkomsten uit titelspecifieke gelden + naheffingen. Titelspecifieke readergelden 2024: €201K rechtenopbrengst; €234K repartitie (versus €238K/€273K in 2023)." },
      { titel: "Bedrijfslasten nagenoeg vlak: €911K (+0,7%) vs begroot €1.080K", richting: "flat", impact: "P", detail: "€905K (2023) → €911K (2024) · begroot €1.080K. Zeer lage kostengroei. Kosten Cedar €657K → €738K, waarvan personele inzet €430K → €490K, algemene kosten €104K → €105K, huisvesting €48K → €50K, automatisering €75K → €93K. Personele kosten lager dan begroot (€590K) door 'lager dan verwachte personele inzet gedurende het boekjaar' — universiteiten terughoudender in openstellen digitale leeromgevingen + onderbezetting bureau UvO. Advies €32K → €20K (vooral juridisch advies lager). Overige bedrijfslasten €143K → €76K (2023 had incidentele investering CopyrightCheck-tool + nieuw CMS-website)." },
      { titel: "Inhoudingspercentage verlaagd naar 9,5% (was 10,5%) — dalende trend", richting: "down", impact: "P", detail: "Was 13% in 2021 → 10,5% in 2023 → 9,5% in 2024. Combinatie stijgende incasso + beperkte kostenstijging. Inhouding ter dekking kosten 7% (was 8%); aanvullend 2,5% voor controle/handhaving = totaal 9,5%. Baten €1.118K (2023) → €923K (2024, -17%) — ondanks hogere incasso en repartitie, want lagere %. Feitelijke inhouding ligt ruim onder branchenorm van max 15%. Bedrijfslasten in % van repartitie: 8,0% (was 8,3%)." },
      { titel: "Resultaat €189K positief (was €266K) — toegevoegd aan algemene reserve", richting: "flat", impact: "P", detail: "Baten €923K (was €1.118K) · lasten €911K (was €905K) · saldo baten/lasten €12K (was €213K) · financieel resultaat €177K (was €53K, door hogere rente) = resultaat €189K. Begroot was slechts €30K. Toegevoegd aan algemene reserve. Gecombineerd met forse rentebaten — 'financiële baten in 2024 wel weer hoger dan begroot en hoger dan voorgaand jaar' door hogere rente-inkomsten. Begroting 2025: resultaat €58K (baten €1.031K · lasten €1.048K · rente €75K)." },
      { titel: "€500K EV-onttrekking naar te verdelen rechten — eerste keer", richting: "flat", impact: "P", detail: "Bestuur constateerde in 2024 dat 'beschikbare eigen vermogen relatief hoog is in vergelijking met de beoogde continuïteitsreserve'. Besluit: €500K uit algemene reserve beschikbaar stellen aan rechthebbenden. Methode: rechtstreekse mutatie algemene reserve → te verdelen rechten (niet via staat van baten en lasten) — 'op vergelijkbare wijze als uitkeringen aan belanghebbenden bij andere rechtspersoonsvormen'. Parallel aan PRO (€200K), Reprorecht (€912K), Lira (€625K). Algemene reserve: €2,01M (1/1) → €1,70M (31/12): +€189K resultaat -€500K onttrekking. Streven: continuïteitsreserve minimaal exploitatiekosten voorgaand boekjaar." },
      { titel: "Financieel resultaat €177K (+234%) — rentemeevaller", richting: "up", impact: "P", detail: "€53K (2023) → €177K (2024) · begroot slechts €65K. 'Hogere rente-inkomsten' — spaar- en depositorente in 2024 hoger dan verwacht. Liquide middelen ultimo 2024: €2,47M (was €2,42M) — €2,46M op spaarrekeningen, €6K op bank. Netto-kasstroom +€51K (na -€500K EV-onttrekking). Begroting 2025: €75K rentebaten (neerwaartse verwachting)." },
      { titel: "Te verdelen rechten €1,61M — opgelopen (was €1,27M)", richting: "up", impact: "A", detail: "Stand 1/1/2024: €1,27M · +€11,20M rechtenopbrengst · +€500K EV-onttrekking · -€11,36M repartitie = stand 31/12/2024 €1,61M. Wettelijke norm: uitbetaling binnen 9 maanden na afloop incassojaar. Afkoopgelden: incasso + verdeling in hetzelfde boekjaar → post 'te verdelen gelden' doorgaans beperkt. Naheffing-gelden (relatie bekend -€67K) en titelspecifieke readergelden (€47K nog niet in verdeling) zorgen voor schommeling. Opbouw naar jaarlaag: 2024 €600K · 2023 €416K · 2022 €519K · 2021 €36K · 2020 en ouder €34K. Beperkte reservering van €25K voor onbekende rechthebbenden aangehouden." },
      { titel: "Ketenkosten readergelden 16,2% — boven 15%-norm", richting: "flat", impact: "A", detail: "UvO's eigen inhouding 10,5%; totale ketenkosten voor readergelden komen uit op 16,2% door doorverdeling via IPRO (buitenlandse rechthebbenden) en Pictoright (beeldmakers). 'Deze berekening zou niet worden toegepast indien IPRO in het buitenland gevestigd zou zijn.' Readergelden kenmerken zich door 'relatief hoge arbeidsintensiteit' — gebruik soms per titel en aantal studenten meten en afrekenen. Inzagemodellen met UNL en VH verder uitwerken. Kosten naar rato toegerekend: lasten in % rechtenopbrengst = 8,1% voor alle drie stromen (afkoopsommen, naheffingen, titelspecifieke)." },
      { titel: "Begroting 2025: licht negatief saldo · resultaat +€58K", richting: "flat", impact: "A", detail: "Baten €1.031K (admin.vergoeding). Lasten €1.048K: Cedar €834K · bestuur/toezicht €33K · adviseurs €27K · contributies €0K · overige €154K. Saldo -€17K · financieel resultaat €75K · resultaat €58K. 'In 2025 voorzien we een toename van de personele kosten, mede door een groei van het aantal fte's.' Toenemende complexiteit verdeling vraagt uitbreiding administratieve ondersteuning. Parallel: in kaart brengen hoe werkprocessen efficiënter ingericht kunnen worden." },
    ],
    risicos: [
      { cat: "Meting", sev: "W", titel: "Feitelijke omvang hergebruik 'eenduidig vaststellen' blijft lastig", detail: "Voorzitter Bruinsma expliciet in voorwoord: 'recordincasso van € 11,2 miljoen en een verdeling van € 11,4 miljoen ... maar dat mag niet verhullen dat opnieuw bleek hoe lastig het is om de feitelijke omvang van dat gebruik door onderwijsinstellingen eenduidig vast te stellen.' Afkoopmodel vereenvoudigt proces maar brengt 'nieuwe vraagstukken met zich mee, zoals het genereren van gedetailleerde hergebruikdata'. CopyrightCheck-tool SURF moet toekomstig meer inzicht geven — 'meten is weten, en in ons geval ook eerlijk verdelen'." },
      { cat: "Regeling", sev: "W", titel: "Onderhandelingen 2025 met beide koepels (UNL + VH) · afkoopregelingen lopen af", detail: "Easy Access-regeling UNL loopt per 31-12-2025 af. Hbo-regeling VH eveneens t/m 2024 (en extensie). 'Vooruitkijkend naar 2025, staan we voor belangrijke onderhandelingen met universiteiten en hogescholen.' Continuïteit incassomodel afhankelijk van hernieuwde afspraken. UvO blijft geloven in Easy Access-model maar afstemming nodig met onderwijskoepels over volumes, tarieven en gebruiksdata." },
      { cat: "AI", sev: "A", titel: "AI-opkomst op 'volle aandacht' maar zonder uitgewerkt beleid", detail: "Voorzitter: 'Uiteraard heeft de stormachtige opkomst van AI ook bij ons de volle aandacht. Wat betekent het voor het hergebruik en wat zijn de auteursrechtelijke aspecten? En hoe kan AI ons en de onderwijsinstellingen ondersteunen in de analyse van hergebruiksgegevens?' Signalering van vraagstukken, geen concreet beleid of projecten in jaarverslag 2024 geformaliseerd. Positioneert zich als kwestie voor 2025 en verder." },
      { cat: "Ketenkosten", sev: "A", titel: "Ketenkosten readergelden 16,2% — boven 15%-norm", detail: "Door doorverdeling via IPRO (buitenlandse rechthebbenden) + Pictoright (beeldmakers) komen ketenkosten uit op 16,2%. 'Deze omstandigheid leidt ertoe dat de beheerskosten van IPRO door het CvTA meegerekend worden in de zogenoemde ketenkosten van Stichting UvO. Deze berekening zou niet worden toegepast indien IPRO in het buitenland gevestigd zou zijn.' Readergelden arbeidsintensief vanwege titel- en student-specifieke meting. Inzagemodellen met UNL/VH verder uit te werken." },

      { cat: "Governance", sev: "P", titel: "Geen tegenstrijdige belangen in 2024 · WNT binnen norm", detail: "'In het verslagjaar 2024 zijn geen gevallen voorgekomen van potentiële tegenstrijdige belangen.' Bestuursleden (behalve onafhankelijk voorzitter) voeren taak onbezoldigd uit. Directeur Pijnacker €96.536 bij 0,55 FTE (max €128.150 binnen WNT) — in loondienst Cedar, doorbelast via functietarief. Voorzitter Bruinsma €15.000 (max €34.950). Overige bestuursleden (Aleva, Benjamins, De Klerk, Lip, Noorman, Pilot, Smit) <€2.100." },

    incidenten: [
      { type: "afspraak", titel: "Easy Access-regeling 2023–2025 UNL ondertekend", impact: "Nieuwe driejarige afkoopregeling 14 publieke universiteiten · groeimodel + verlaging max pagina's 50→40", datum: "mei 2024 ondertekend", detail: "UNL en UvO tekenden nieuwe Easy Access-regeling voor 2023–2025. Belangrijk: afkoopbedrag stijgt jaarlijks (groeimodel) op basis van door UvO geconstateerde toename in hergebruik. Tegemoetkoming aan uitgeverszorgen over vervangend hergebruik: maximum pagina's verlaagd 50→40 (mits ≤20% van werk). Dekt papier + digitaal + PowerPoint-afbeeldingen. 40+ pagina's via Auteursrechten-informatiepunt (AIP). Docenten aan 14 publieke universiteiten mogen hergebruiken." },
      { type: "afspraak", titel: "Voortzetting afkoopregeling hogescholen 2024", impact: "Continuïteit Easy Access-regeling met VH-hogescholen", datum: "maart 2024", detail: "Voortzetting afkoopregeling auteursrechten hogescholen in 2024. Vereniging Hogescholen namens alle 36 aangesloten hogescholen. Docenten kunnen tot 50 pagina's overnemen (max 25% van werk). Tot 50 afbeeldingen in PowerPoints. Geldt voor papier én digitaal. Alle 36 hogescholen hebben in 2024 rapportages aangeleverd — 'belangrijke stap'." },

      { type: "EV-mutatie", titel: "€500K onttrekking algemene reserve naar te verdelen rechten", impact: "EV-afbouw via rechtstreekse onttrekking · grootste van 2024 in PRO-cluster", datum: "bestuursbesluit 2024", detail: "Bestuur UvO constateerde in 2024 dat beschikbaar eigen vermogen relatief hoog was t.o.v. beoogde continuïteitsreserve. Besluit: €500K uit EV beschikbaar stellen aan rechthebbenden. Verwerking rechtstreeks via vermindering algemene reserve naar te verdelen rechten (niet via staat van baten en lasten). Parallel aan PRO (€200K), Reprorecht (€912K), Lira (€625K). Algemene reserve: €2,01M (1/1) → €1,70M (31/12). Streven continuïteitsreserve: minimaal exploitatiekosten voorgaand boekjaar." },
      { type: "communicatie", titel: "Vijfjarig jubileum UvO in Utrecht", impact: "Stil staan bij wat is opgebouwd + vooruit kijken", datum: "2024", detail: "Stichting UvO bestond 5 jaar (opgericht januari 2019 door afsplitsing readerregelingen van Stichting PRO). Jubileumviering in Utrecht met sprekers over toekomst hoger onderwijs, (open) leermaterialen en auteursrechten. Beslisboommaker Katinka Polderman maakte beslisboom 'Heeft UvO nog bestaansrecht?' Voorzitter: 'vijfjarig bestaan van UvO een prachtig moment om stil te staan bij wat we hebben opgebouwd en om vooruit te kijken naar wat nog mogelijk is.'" },

    duurzaamheid: [
      { sdg: "Mediafederatie · branchevertegenwoordiging NL uitgevers", detail: "UvO vertegenwoordigt ruim 700 Nederlandse uitgevers via mandaat — grotendeels aangesloten bij Mediafederatie (vereniging brancheorganisaties uitgeverij/mediabedrijven NL). Bestuursleden namens NL uitgevers voorgedragen en benoemd door Mediafederatie. Bestuursleden namens internationale uitgevers (3×) voorgedragen door Stichting IPRO. Toezichthoudend bestuur: 3× internationaal + 2× NL + onafhankelijk voorzitter." },
      { sdg: "VOI©E-lidmaatschap · Governance Code CBO's 2021", detail: "UvO lid van Vereniging van Organisaties die het Intellectueel eigendom Collectief Exploiteren (VOI©E). VOI©E fungeert namens CBO's als aanspreekpunt en meldpunt voor kritiek/klachten. UvO volgt VOI©E Governance Code CBO's 2021 als uitgangspunt goed bestuur. Directeur Pijnacker tevens bestuurslid VOI©E. Via VOI©E-contributie financiert UvO aandeel in piraterijbestrijding door Stichting BREIN — vertegenwoordiger namens uitgevers in toezichthoudend bestuur BREIN." },
      { sdg: "Geen sociaal-culturele activiteiten · maximale uitkering aan uitgevers", detail: "'Het beleid van de stichting is om zoveel als mogelijk gelden direct aan te bieden aan uitgevers. Stichting UvO voert zelf geen sociaal-culturele activiteiten uit.' Aandeel voor uitgevers zo hoog mogelijk houden — inkomsten gaan alleen naar rechthebbenden, niet aangewend voor sociale, culturele of educatieve diensten. Indirect wel gelden: groot deel VOI©E-contributie → BREIN (piraterijbestrijding)." },

      { sdg: "Vertegenwoordiging uitgevers NL + internationaal · 1.046 rechthebbenden", detail: "1.046 vertegenwoordigde rechthebbenden (2023: 1.053). 493 uitgekeerde rechthebbenden (2023: 490). 142 gefactureerde gebruikers (2023: 146). Vertegenwoordigingsovereenkomsten met: Stichting Pictoright (beeldmakers), Stichting FEMU (muziekauteurs/-uitgevers), Stichting IPRO (buitenlandse rechthebbenden). Voor onderwijsmarkt fungeert UvO als één aanspreekpunt voor rechten rond overnames voor onderwijsdoeleinden." },

      samenvatting: "Na governance-wijziging 2023 (overgang van bestuursmodel naar Raad van Toezicht met directeur-bestuurder) en SLA met NVPI in 2024 is duidelijk geworden dat STAP primair een uitvoeringsorganisatie is: ontvangen incasso zo snel mogelijk uitkeren aan rechthebbenden tegen zo laag mogelijke kosten. De directeur-bestuurder neemt niet deel aan onderhandelingen met betalingsplichtigen — NVPI voert die gesprekken en informeert STAP over de uitkomsten. Deze beperktere rolinvulling leidde in 2024 tot het vertrek van P. Boertje per 31-12-2024; J.B. Remie volgt op per 1-1-2025. Kerntaken directeur: leiding STAP, controle op SLA met NVPI, overleg met wettelijk toezichthouder CvTA, vertegenwoordiging binnen branchevereniging VOICE. STAP is niet meer alleen afhankelijk van thuiskopiegelden — EMSBOD en secundair muziekgebruik VOD breiden de incassobasis uit.",
      fases: [
        { titel: "2024 · SLA met NVPI operationeel", periode: "verslagjaar", focus: "Na tekening SLA met NVPI in 2024 is rolverdeling duidelijk: NVPI onderhandelt, STAP voert uit. Directeursfunctie uitgebreid van 6 naar 8 uur/week. Vertrek P. Boertje eind 2024 conform besluit RvT — de eerder gemaakte afspraak dat de bestuurder actief zou meedoen aan onderhandelingen (grondslag voor urenuitbreiding) werd niet gerealiseerd." },
        { titel: "2025 · Transitie naar J.B. Remie", periode: "vanaf 1 januari 2025", focus: "J.B. Remie benoemd als directeur-bestuurder. Tevens per 19-12-2024 afgetreden als bestuurslid Stichting de Thuiskopie en per 1-1-2025 opnieuw benoemd — ditmaal in Thuiskopie-bestuur namens de muziekproducenten. A. de Jong (directeur NVPI) volgt hem op in Thuiskopie namens de muziekproducenten. Statutenwijziging 29 jan 2025 betreft vooral taken bestuurder en verantwoordelijkheden RvT." },
        { titel: "2025 · Verhoging incasso secundair muziekgebruik VOD", periode: "lopend", focus: "Inzet op verhoging incasso-opbrengsten via NVPI-onderhandelingen over Videoland 2024 (nog niet gesloten; onderhandelingen over hoogte + mogelijkheid track-niveau uitkering) en aanvullende incasso voor Videoclips, Podcasts e.d. Begroting 2025: positief exploitatiesaldo €28.640 door hogere incasso + andere invulling bestuursfunctie." },
        { titel: "Hoofdverdeelsleutel Thuiskopie · bindend advies zomer 2026", periode: "2025–2026", focus: "Externe procesbegeleider aangesteld in overleg met CvTA; externe commissie hoofdverdeelsleutel werkt aan bindend voorstel aan bestuur Thuiskopie. 20% van 2021-2022-2023 Thuiskopie-incasso (ca. €18 mln totaal bij Thuiskopie) gereserveerd in afwachting. Voor STAP specifiek: €1,715 mln nog te ontvangen (Thuiskopievergoeding 2021 €607.563 · 2022 €556.007 · 2023 €551.216)." },

    trends: [
      { titel: "Rechtenopbrengsten €2,62 mln (vs €8,61 mln in 2023)", richting: "down", impact: "A", detail: "€8.607.843 → €2.620.421. Daling -€6,0 mln verklaard door: -€3,8M eenmalige Videoland-incasso 2014-2022 in 2023, -€1,3M Videoland 2023, -€962K Thuiskopie HVS-nabetaling 2019-2020 in 2023 — alle eenmalig. Hogere EMSBOD in 2024 (+€76K naar €400K) en iets lagere Leenrecht (-€1K). Totaal verwacht voor 2024 €4,39 mln na ontvangst nog uitstaande €1,77 mln (€1,3M Videoland 2024 in onderhandeling + €468K EMSBOD 2024). Jaarlijkse incasso structureel rond €4,7 mln — substantieel hoger dan historische basis door diversificatie." },
      { titel: "Inhoudingspercentage 3,5% → 8,1% (feitelijk 6,25%-7,6%)", richting: "up", impact: "W", detail: "Gemiddeld gewogen inhoudingspercentage gestegen van 3,5% (2023) naar 8,1% (2024). Feitelijke bandbreedte 6,25%-7,6% in 2024 (was 5%-6,25% in 2023). Stijging primair door hogere kosten bij (door normalisatie) veel lagere incasso dan uitzonderlijk piekjaar 2023. Geldt ook voor 2025. STAP hanteert middellange-termijn-benadering (3-5 jaar). Ingehouden administratievergoeding: €296.019 (was €240.831, +22,9%). Totale baten admin-vergoeding €312.086 (was €307.590) — inclusief mutatie totale verplichting €16.067." },
      { titel: "Bedrijfslasten +16% naar €378K (CPI 3,3%)", richting: "up", impact: "W", detail: "€326.330 → €378.476, fors boven CPI-norm 3,3%. Genormaliseerd (excl. €36.930 BREIN-financieringswijziging en €13.344 extra directeursuren) slechts +0,57% — binnen norm. Begroot was €367.720. Grootste mutaties: BREIN €0 → €50.000 (financieringswijziging + RvT-besluit €20K extra), uitbreiding directeur 6 → 8 uur/week €13.344 (SLA NVPI indexering €8.500), hogere VOICE+Collectieve Handhaving €36.930, juridische adviezen -€11.184, rechthebbendenvergadering +€3.092." },
      { titel: "Resultaat -€13.017 (begroot +€8.580)", richting: "down", impact: "A", detail: "Exploitatieresultaat -€66.391 (begroot -€3.920) + financieel resultaat +€53.373 (begroot +€12.500, was +€3.439 in 2023) = netto -€13.017. Rentebaten hoger door rente spaarrekening én toerekening rente op gereserveerde Thuiskopiegelden (€34.295) — laatste post was in begroting 2024 nog onder administratievergoeding opgenomen (stelselwijziging). Resultaat ten laste van algemene reserve gebracht. Algemene reserve 31-12-2024: €206.352 (was €84.408 — bijgeschreven vrijval voorziening claims €134.961)." },
      { titel: "Voorziening claims €115K volledig vrijgevallen", richting: "down", impact: "P", detail: "Voorziening claims niet-aangeslotenen: stand 1-1-2024 €115.437, dotatie €19.524 → totaal €134.961 volledig vrijgevallen ten gunste van algemene reserve. Conform RJ 150 herzien: 'op basis van nadere inzichten en een herbeoordeling van de omstandigheden is in 2024 vastgesteld dat het bestaan van een verplichting niet (langer) aannemelijk is'. Voorziening was €344.721 per 1-1-2023 (vrijval richting repartitie 2023 €117.291). Stand 31-12-2024: €0 — volledig afgebouwd." },
      { titel: "Te verdelen rechten 3,10 → 1,75 mln", richting: "down", impact: "A", detail: "€3.099.413 → €1.745.555. Instroom €5.719.834 (beginstand €3.099.413 + rechtenopbrengst €2.620.421). Uitstroom bruto repartitie €3.974.279 (rechthebbenden €3.346.347 + admin-inhouding €296.019 + dotatie voorziening claims €19.524 + SoCu-inhouding €312.389). Uitgekeerd aan rechthebbenden €3.642.365 over 116 betalingen aan 70 rechthebbenden. Nog te ontvangen rechtenopbrengsten (balans): €3,48 mln (was €1,16 mln) door nog te factureren EMSBOD 2024 €468K + Secundair Muziekgebruik Videoplatform 2024 €1,3M + Thuiskopie HVS 2021-2022-2023 €1,71M." },
      { titel: "SoCu-fonds geherclassificeerd naar bestemmingsreserve", richting: "flat", impact: "A", detail: "Sociaal Cultureel Fonds (SoCu) voorheen gerubriceerd als langlopende schuld, vanaf 2024 als bestemmingsreserve binnen eigen vermogen (RJ 130.101 e.v.). Vergelijkende cijfers 2023 aangepast (RJ 120.602). Motivatie: SoCu betreft een 'onverdeeld belang van de stichting zelf en vormt geen verplichting naar externe partijen'. Stand 1-1-2024 €141.233 · toegevoegd €312.389 (8% netto repartitie) · onttrokken €249.000 · stand 31-12-2024 €204.622. Bijdragen 2024: Edison Stichting €184K · Digitaal Platform Edison €50K · Al-congres 2-12-2024 (Buma/SENA/NVPI) €10K · STOMP Ledendag XL €5K. Kindermuziekweek (€10K in 2023) niet meer in 2024." },
      { titel: "EMSBOD +24% naar €400K", richting: "up", impact: "P", detail: "€323.617 → €400.000 (incasso Extra Media Services Broadcast on Demand over 2023, toegevoegd aan repartitie in 2024). Binnen repartitieverplichtingen staat nog €182.696 EMSBOD 2023 open + €468.064 EMSBOD 2024 nog te factureren. Ruwe schatting EMSBOD 2025: €500K — staat los van lopende onderhandelingen. NVPI onderhandelt namens STAP over uitbreiding naar andere VOD/podcast-diensten mits waarde muziekgebruik substantieel hoger is dan incasso-kosten." },
      { titel: "Verhouding CBO-inkomsten: Thuiskopie 84% · EMSBOD 15% · Leenrecht 1%", richting: "flat", impact: "A", detail: "Van €2,62 mln rechtenopbrengsten 2024: Thuiskopievergoeding €2.204.863 (84,1%) · EMSBOD €400.000 (15,3%) · Leenrechtvergoeding €15.558 (0,6%) · Videoland €0 (was €5,1 mln in 2023 piekjaar). Strategisch dalen van pure Thuiskopie-afhankelijkheid is doel — gerealiseerd via EMSBOD (vanaf 2023) en Videoland (piek 2023). Na normalisatie blijft Thuiskopie dominant maar niet alleen afhankelijk. Jaarlijks verwacht incasso ~€4,7 mln excl. HVS-nabetalingen Thuiskopie." },
      { titel: "Liquide middelen -29% naar €1,74 mln (was €2,44 mln)", richting: "down", impact: "A", detail: "€2.442.212 → €1.743.851 (-€698.362). Kasstroom uit rechtenopbrengsten -€1,27 mln (ontvangst €2,62M - doorbetaling €3,64M - SoCu-uitkeringen €249K). Kasstroom operationeel +€573K (grote daling overige vorderingen €571K door afwikkeling vorderingen NVPI en EMS/BOD 2023). Geen investeringen. Saldi direct opeisbaar: rekening-courant ING €38.824, zakelijke spaarrekening ING €1.705.027. Hogere saldo spaarrekening genereerde rentebaten €53.373 (was €3.439)." },

    risicos: [
      { cat: "Hoofdverdeelsleutel", sev: "K", titel: "20% van 2021-2022-2023 Thuiskopie-incasso (~€18 mln) gereserveerd bij Thuiskopie", detail: "Voor 2021, 2022 en 2023 is 20% van de jaarincasso door Stichting de Thuiskopie gereserveerd in afwachting van nieuwe hoofdverdeelsleutel — totaal ca. €18 mln bij Thuiskopie, waarvan voor STAP €1.714.786 (Thuiskopievergoeding 2021 €607.563 · 2022 €556.007 · 2023 €551.216). Externe procesbegeleider aangesteld via overleg met CvTA; externe commissie hoofdverdeelsleutel werkt aan bindend voorstel aan bestuur Thuiskopie. Verwachting: bindend advies zomer 2026. Laatst bekende hoofdverdeelsleutel (2019-2020): Audiovisueel 45,45% · Audio 32,30% · Geschriften 13,75% · Beeld 8,50%. Binnen Audio: Makers 40% (7,5% LIRA / 92,5% Stemra) · Uitvoerenden 30% (Norma) · Producenten 30% (STAP). Dit is grootste openstaande risico/vordering-onzekerheid voor STAP." },
      { cat: "Juridisch", sev: "W", titel: "HP c.s.-cassatie tethered downloads loopt door in 2025", detail: "Stichting de Thuiskopie houdt reserveringen aan voor uitspraak Hof (22 maart 2022) in zaak Dell & HP/Stobi over 'offline streaming copies' (tethered downloads). Thuiskopie is in cassatie gegaan; procedure loopt nog in 2025. Uitkomst beïnvloedt toekomstige Thuiskopie-incassobasis en daarmee STAP-rechtenopbrengsten structureel. In 2024 geen directe financiële reservering bij STAP — indirect via Thuiskopie's eigen voorzieningen." },
      { cat: "Marktdynamiek", sev: "W", titel: "Thuiskopie-incasso structureel onder druk", detail: "Stichting de Thuiskopie signaleert stagnatie in verkopen van mobiele telefoons en computers — consumenten gebruiken deze langer dan voorheen. Thuiskopie is grootste inkomstenbron STAP (84% in 2024, €2,20 mln structureel). In combinatie met tethered-downloads-dossier en cloud-verschuiving een langere-termijn bedreiging voor kerninkomsten." },
      { cat: "Onderhandeling", sev: "W", titel: "Videoland 2024 nog niet gesloten · NVPI onderhandelt", detail: "Voor 2024 worden nog onderhandelingen gevoerd over: (1) hoogte bedrag Videoland-incasso en (2) mogelijkheid grotendeels op track-niveau uit te keren aan rechthebbenden. NVPI onderhandelt namens STAP. Voor 2022 en 2023 is €1,3 mln/jaar geïncasseerd en grotendeels via reguliere repartities uitbetaald. Balans 31-12-2024: vordering Secundair Muziekgebruik Videoplatform periode 2024 €1,3 mln (en gelijknamige verplichting) — geboekt als te ontvangen/te verdelen. Hoop op afsluiting in 2025." },
      { cat: "Governance", sev: "A", titel: "Beperkte rolinvulling directeur-bestuurder", detail: "'De rol van directeur/bestuurder is hiermee feitelijk beperkt, omdat de directeur/bestuurder niet deelneemt aan de gesprekken ofwel onderhandelingen met betalingsplichtigen. De onderhandelingen worden gevoerd door de NVPI, om vervolgens de directeur/bestuurder van STAP te informeren over de uitkomsten van de onderhandelingen.' De gewijzigde rolinvulling leidde tot vertrek P. Boertje per 31-12-2024. Besluitvorming over onderhandelingsstrategie ligt buiten STAP's eigen bestuur. Kritiek vanuit CvTA-perspectief mogelijk." },
      { cat: "Representativiteit", sev: "A", titel: "150-200 vertegenwoordigde producenten · 70 uitgekeerde rechthebbenden", detail: "Aantal producenten (of hun vertegenwoordigers) waaraan STAP direct of indirect uitkeert: 150-200. Aantal feitelijk uitgekeerde rechthebbenden 2024: 70 (idem 2023). Aantal gefactureerde gebruikers (incasso): 1 (was 2 in 2023) — STAP incasseert zelf niet, ontvangt via Stichting de Thuiskopie, Stichting Leenrecht, Vereniging Buma (EMSBOD) en CLT-UFA NL Branch (Videoland). Beperkte schaal maakt STAP kwetsbaar voor CvTA-compliance-eisen die disproportioneel zijn t.o.v. organisatieomvang." },
      { cat: "Omzetopgaven", sev: "A", titel: "Tijdige accountantsverklaringen vanuit Majors een knelpunt", detail: "Rechthebbenden dienen omzetopgave + accountantsverklaring aan te leveren via webportal. Bij Majors (grootste rechthebbenden) komt accountantsverklaring regelmatig 'te laat binnen' waardoor marktomvang én individueel aandeel niet tijdig bepaald kan worden — repartitie daardoor in twee voorschotten en derde definitieve afrekening pas in jaar 3. STAP heeft in voorjaar 2023 aanscherping beleid doorgevoerd: 75% uitkeren bij ontbreken omzetopgave, rest na aanlevering; maandelijkse herinneringen. Doel: alsnog repartitie binnen wettelijke 9-maandstermijn." },
      { cat: "Kostenbeheersing", sev: "A", titel: "Bedrijfslasten-norm (CPI +3,3%) niet gehaald", detail: "Kostenpercentage STAP 2024: 16,5% van rechtenopbrengst (was 3,8% in 2023 — vertekend door piek-incasso); 9,5% van bruto repartitie (was 4,7%). Jaarmutatie bedrijfslasten +16,0% (CPI 3,3%). Genormaliseerd (excl. BREIN-wijziging en uitbreiding directeur-uren) slechts +0,6%. BREIN-bijdrage 2026 onder 'stevig voorbehoud' afhankelijk van geleverde inspanningen BREIN voor muziekproducenten. Vanaf 2023 neemt STAP deel aan CvTA-project individuele kostennorm: normatieve beoordeling via jaarcijfers door RvT." },
    ],
    technologie: [
      { project: "Webapplicatie 'Rechthebbenden'", status: "Operationeel · geüpdatet 2024", detail: "Portal waarin rechthebbenden per betaling een overzicht krijgen per rechtensoort (Thuiskopievergoeding, Leenrechtvergoeding, EMSBOD, Secundair Muziekgebruik VOD, Videoclips, Podcasts etc.): bedrag totaal ontvangen, aandeel rechthebbende, inhouding voor SoCu, inhouding voor reservering claims t/m 2024 (vrijval in 2024), inhouding administratievergoeding. In 2024 is de website van STAP geüpdatet — 'look en feel' verbeterd en overzichtelijker geworden. Kosten webapplicatie 2024: €21.026 (was €21.819). Voldoet aan informatieplicht Wet Toezicht CBO's." },
      { project: "Omzetopgave-portal met scherper beleid", status: "Beleidsaanscherping 2023, operationeel 2024", detail: "Webapplicatie waarin rechthebbenden omzetopgaven + accountantsverklaring indienen. Nieuw beleid sinds voorjaar 2023: (1) in januari nieuwe jaar melding dat omzetopgaven ingediend kunnen worden + maandelijkse herinneringen, (2) bij nog geen omzetopgave: nauwkeurige inschatting marktaandeel → 75% uitgekeerd; restant na ontvangst omzetopgave, volledig bedrag als voldaan. Doel: alsnog repartitie binnen wettelijke termijn ondanks laat komende accountantsverklaringen van Majors (veelal vanuit elders gevestigde hoofdkantoren)." },

      { type: "onafhankelijk lid", rol: "Onafhankelijk lid RvT", datum: "01/01-31/12/2024 · doorlopend", details: "Mw. C. (Caroline) Zegers — onafhankelijk lid. Bezoldiging 2024 €23.300 bij deeltijdfactor 6,240 (was €22.300 bij 6,000 in 2023). Nevenfuncties: Head of Executive Compensation en Corp. Reward NN Group (bezoldigd), diverse bestuurders-/toezichtrollen bij stichtingen op gebied van Duurzaamheid en Governance." },
      { type: "lid RvT", rol: "Lid RvT", datum: "01/01-31/12/2024 · doorlopend", details: "Dhr. N.P. (Niek) van den Hoven. Bezoldiging 2024 €23.300 (was €22.300). Hoofdfunctie: Chief Financial Officer Universal International Music BV (bezoldigd)." },
      { type: "vertrek", rol: "Lid RvT (vertrek)", datum: "tot 31/07/2024", details: "Dhr. M.C.J. ten Veen — afgetreden per 31 juli 2024. Bezoldiging 2024 €15.592 (was €22.300 voor heel 2023). Vacature is per ultimo 2024 niet ingevuld — RvT bestaat per 31-12-2024 uit 4 leden (waarvan 2 onafhankelijk)." },
      { type: "lid RvT", rol: "Lid RvT (sinds nov 2023)", datum: "03/11/2023-31/12/2024 · doorlopend", details: "Dhr. D. (Dick) de Groot — Chief Executive Officer Be Yourself Music BV (bezoldigd). Tevens: lid bestuur Stichting STOMP (onbezoldigd). Bezoldiging 2024 €23.300 (was €3.717 voor deelperiode 2023)." },
      { type: "vertrek", rol: "Directeur-bestuurder (vertrek)", datum: "tot 31/12/2024", details: "Dhr. P. (Paul) Boertje. Bezoldiging 2024 €46.596 bij deeltijdfactor 0,20 FTE (was €33.252 bij 0,15 FTE in 2023 — uitbreiding van 6 naar 8 uur per week). Onder WNT-norm: individueel max op deeltijdbasis €46.600 (99,99% gebruikt) van WNT-max €233.000. Geen dienstbetrekking. Nevenfuncties: mede-eigenaar Casual Solution BV (B), regiolobbyist NVBD/Dierenbescherming (B), lid bestuur Fauna Beheer Eenheid Zuid-Holland (via NVBD, B), lid adviescommissie Stadsnatuur en Dierenwelzijn College Rotterdam (via NVBD, B), co-hoofdredacteur SENA Magazine (B), lid beoordelingscommissie Muziek Productie Fonds SENA (B), lid OR NVBD (O). Vertrek conform besluit RvT na wijziging rolinvulling; opgevolgd per 1-1-2025 door J.B. Remie." },
      { type: "aantreden", rol: "Directeur-bestuurder (aantreden)", datum: "vanaf 01/01/2025", details: "Dhr. J.B. (Hans) Remie. Benoemd per 1 januari 2025 door RvT. Tevens per 19 december 2024 afgetreden als bestuurslid Stichting de Thuiskopie, en per 1-1-2025 in dezelfde rol benoemd namens de muziekproducenten — functie niet verenigbaar met directeur/bestuurder STAP was reden voor wissel. A. de Jong (directeur NVPI) is per 1-1-2025 bestuurslid Stichting de Thuiskopie namens de muziekproducenten. Kerntaken Remie: leiding STAP, controle SLA met NVPI, overleg met CvTA, vertegenwoordiging binnen VOICE (incl. deelname werkgroepen)." },
      { type: "statuten", rol: "Statutenwijziging II", datum: "29 januari 2025", details: "Statuten STAP opnieuw gewijzigd — wijziging betreft voornamelijk de taken van de bestuurder en de verantwoordelijkheden van de Raad van Toezicht. Komt bovenop eerdere wijziging 14 juli 2022 (toevoeging van andere vergoedingen dan Thuiskopie/Leenrecht). Notariële akte oprichting: 6 april 1995. KvK 41194739, statutaire zetel Hilversum, kantooradres per 1-5-2025 gewijzigd: Hogehilweg 6 (1101 CC Amsterdam) → Hobaostraat 8 (1101 CZ Amsterdam)." },
      { type: "accountant", rol: "Accountant", datum: "controle 2024", details: "De ZorgAccountants B.V. · drs. E.J.W. van Hamersveld RA. Goedkeurende controleverklaring getekend te Bilthoven, 21 november 2025. Controle conform Nederlandse controlestandaarden en Controleprotocol WNT 2024. Anticumulatiebepaling WNT niet gecontroleerd (conform Controleprotocol WNT 2024 art. 1.6a). Accountantskosten 2024: €9.150 (was €8.300)." },
      { type: "vergadering", rol: "Rechthebbendenvergadering", datum: "26 juni 2024 · 25 juni 2025", details: "Jaarlijkse rechthebbendenvergadering: eenmaal per jaar verantwoording van bestuurder over gang van zaken en gevoerd beleid. Vergadering verleent goedkeuring aan sociaal-cultureel beleid. Gehouden gelijktijdig met ALV NVPI Muziek en STOMP Zomerbarbecue → grote opkomst. Kosten rechthebbendenvergadering 2024: €9.981 (was €6.889)." },
      { type: "SLA", rol: "SLA met NVPI · doorberekende personeelskosten", datum: "getekend 2024", details: "STAP heeft geen eigen personeel. Doorberekende personeelskosten SLA NVPI 2024: €206.500 (was €198.000, begroot €206.000). NVPI fungeert als dienstverlener en voert onderhandelingen met betalingsplichtigen namens STAP. Bij NVPI zit ook de juridische en commerciële expertise. SLA getekend in 2024 — maakt rolverdeling expliciet: NVPI onderhandelt, STAP voert uit." },

/* ═══ CONTINUOUS RISK SCORING ═══ */
const lerp = (v, lo, hi) => Math.max(0, Math.min(100, (v - lo) / (hi - lo) * 100));

function calcRisk(c, yi) {
  const d = D[c]; if (!d) return null;
  const inc = d.inc[yi], kst = d.kst[yi];
  if (inc === null || kst === null || inc === 0) return null;
  const rep = d.rep[yi] || 1;
  const pI = kst / inc * 100, pR = kst / rep * 100;
  const prevK = yi > 0 ? (d.kst[yi-1] ?? kst) : kst;
  const mut = prevK > 0 ? ((kst - prevK) / prevK * 100) : 0;
  const delta = mut - (CPI[JR[yi]] || 0);
  const liq = d.liq[yi], evd = d.evd[yi];
  const hasReserve = !NO_RESERVE.has(c);
  const n = normFor(c);

  // Continuous scoring: linear interpolation between anchors
  const s1 = lerp(pI, 0, n * 1.5);              // 0% → 0, norm*1.5 → 100
  const s2 = lerp(pR, 0, 30);                    // 0% → 0, 30% → 100
  const s3 = lerp(delta, -3, 10);                // -3pp → 0, +10pp → 100
  const s4 = liq !== null ? lerp(1/liq, 0.5, 2) : null;   // ratio 2+ → 0, ratio 0.5 → 100
  // Reserve: alleen voor CBO's die een algemene reserve hanteren
  const s5 = (hasReserve && evd !== null) ? lerp(1/Math.max(evd, 0.01), 0.4, 3) : null;

  const items = [
    { k:"Kosten/Incasso", v:s1, r:pI.toFixed(1)+"%", w:.20, norm:"≤"+n.toFixed(1)+"%" + (NORM[c] === null ? " (peer-ref.)" : " (CvTA)") },
    { k:"Kosten/Repart.", v:s2, r:pR.toFixed(1)+"%", w:.20, norm:"≤15%" },
    { k:"Δ Kosten vs CPI", v:s3, r:(delta>0?"+":"")+delta.toFixed(1)+"pp", w:.20, norm:"≤CPI" },
    { k:"Liquiditeit", v:s4, r:liq!==null?liq.toFixed(2):"n.b.", w:.20, norm:"≥1.0" },
    { k:"Reserve-dekking", v:s5, r: !hasReserve ? "n.v.t." : (evd!==null?(evd*100).toFixed(0)+"%":"n.b."), w:.20, norm: hasReserve ? "≥100%" : "geen alg. reserve" },
  ];
  let wS = 0, sS = 0, av = 0;
  items.forEach(s => { if (s.v !== null) { wS += s.w; sS += s.v * s.w; av++; } });
  const tot = wS > 0 ? Math.round(sS / wS) : null;
  const lev = tot === null ? "n.b." : tot <= 20 ? "Laag" : tot <= 40 ? "Midden" : tot <= 60 ? "Verhoogd" : "Hoog";
  const col = tot === null ? "#888" : tot <= 20 ? "#10b981" : tot <= 40 ? "#eab308" : tot <= 60 ? "#f97316" : "#ef4444";
  // "Total" = max aantal van toepassing zijnde indicatoren (5 of 4 als geen reserve)
  const total = hasReserve ? 5 : 4;
  return { scores: items, tot, lev, col, pI, pR, delta, liq, evd, hasReserve, av, total, norm: n, bovenNorm: pI > n };
}

/* ═══ HELPERS ═══ */
const fE = v => v === null ? "n.b." : v >= 1e5 ? "€"+(v/1e3).toFixed(0)+"M" : v >= 1e3 ? "€"+(v/1e3).toFixed(1)+"M" : "€"+v+"K";
const colOf = v => v === null ? "#888" : v <= 25 ? "#10b981" : v <= 50 ? "#eab308" : v <= 75 ? "#f97316" : "#ef4444";
const NB = () => (<span style={{ color:"var(--mt2)", fontSize:10, fontStyle:"italic" }}>n.b.</span>);
const Badge = ({ a, t }) => (<span style={{ fontSize:9, padding:"2px 7px", borderRadius:10, background: a === t ? "var(--ok)11" : a >= 4 ? "var(--wn)11" : "var(--dg)11", color: a === t ? "var(--ok)" : a >= 4 ? "var(--wn)" : "var(--dg)", fontWeight:600 }}>{a}/{t}</span>);

const TABS = ["Overzicht","Risicoprofiel","Financieel","Verdeling","Ketenkosten","Benchmark","Signalen","Jaarverslagen"];

/* ═══ SIGNAL DETECTION ═══ */
const SEV = { K:"Kritiek", W:"Waarschuwing", A:"Aandachtspunt", P:"Positief" };
const SEVC = { K:"var(--dg)", W:"var(--or)", A:"var(--wn)", P:"var(--ok)" };
const SEVICON = { K:"🔴", W:"🟠", A:"🟡", P:"🟢" };

function detectSignals(c, yi) {
  const d = D[c]; if (!d) return [];
  const inc = d.inc[yi], kst = d.kst[yi], rep = d.rep[yi], ntv = d.ntv[yi];
  if (inc === null || kst === null || inc === 0) return [];
  const signals = [];
  const jr = JR[yi];
  const norm = normFor(c);
  const pI = kst / inc * 100;
  const pR = rep > 0 ? kst / rep * 100 : null;
  const prevInc = yi > 0 ? d.inc[yi-1] : null;
  const prevKst = yi > 0 ? d.kst[yi-1] : null;
  const prevNtv = yi > 0 ? d.ntv[yi-1] : null;
  const cpi = CPI[JR[yi]] || 0;
  const kstMut = prevKst && prevKst > 0 ? ((kst - prevKst) / prevKst * 100) : null;
  const incMut = prevInc && prevInc > 0 ? ((inc - prevInc) / prevInc * 100) : null;
  const ntvMut = prevNtv && prevNtv > 0 ? ((ntv - prevNtv) / prevNtv * 100) : null;
  const liq = d.liq[yi], evd = d.evd[yi], tempo = d.tempo[yi];
  const hasReserve = !NO_RESERVE.has(c);

  // --- KOSTEN ---
  if (pI > norm * 1.2) signals.push({ sev:"K", cat:"Kosten", msg:`Kostenpercentage (${pI.toFixed(1)}%) overschrijdt individuele norm (${norm}%) met meer dan 20%` });
  else if (pI > norm) signals.push({ sev:"W", cat:"Kosten", msg:`Kostenpercentage (${pI.toFixed(1)}%) ligt boven individuele norm (${norm}%)` });
  else if (pI > norm * 0.9) signals.push({ sev:"A", cat:"Kosten", msg:`Kostenpercentage (${pI.toFixed(1)}%) nadert individuele norm (${norm}%) — minder dan 10% marge` });
  else if (pI <= norm * 0.6) signals.push({ sev:"P", cat:"Kosten", msg:`Kostenpercentage (${pI.toFixed(1)}%) ruim binnen individuele norm (${norm}%)` });

  if (kstMut !== null && kstMut - cpi > 5) signals.push({ sev:"K", cat:"Kosten", msg:`Kosten stegen ${kstMut.toFixed(1)}% terwijl CPI ${cpi}% was — overschrijding van ${(kstMut-cpi).toFixed(1)} procentpunt` });
  else if (kstMut !== null && kstMut - cpi > 2) signals.push({ sev:"W", cat:"Kosten", msg:`Kostenstijging (${kstMut.toFixed(1)}%) overtreft CPI (${cpi}%) met ${(kstMut-cpi).toFixed(1)} procentpunt` });
  else if (kstMut !== null && kstMut < -5) signals.push({ sev:"P", cat:"Kosten", msg:`Kosten daalden significant met ${Math.abs(kstMut).toFixed(1)}%` });

  if (pR !== null && pR > 20) signals.push({ sev:"K", cat:"Kosten", msg:`Kosten t.o.v. repartitie (${pR.toFixed(1)}%) extreem hoog — meer dan €1 op €5 gaat naar beheer` });
  else if (pR !== null && pR > 15) signals.push({ sev:"W", cat:"Kosten", msg:`Kosten t.o.v. repartitie (${pR.toFixed(1)}%) boven sectorale 15%-grens` });

  // --- LIQUIDITEIT ---
  if (liq !== null) {
    if (liq < 0.5) signals.push({ sev:"K", cat:"Liquiditeit", msg:`Liquiditeitsratio (${liq.toFixed(2)}) kritiek laag — repartitieverplichtingen kunnen niet worden gedekt` });
    else if (liq < 1.0) signals.push({ sev:"W", cat:"Liquiditeit", msg:`Liquiditeitsratio (${liq.toFixed(2)}) onder de norm van 1.0 — risico op betalingsproblemen` });
    else if (liq >= 2.0) signals.push({ sev:"P", cat:"Liquiditeit", msg:`Ruime liquiditeitspositie (ratio ${liq.toFixed(2)})` });

    // Trend: 3 jaar dalend
    const l3 = [d.liq[yi-2], d.liq[yi-1], d.liq[yi]].filter(v => v !== null);
    if (l3.length === 3 && l3[0] > l3[1] && l3[1] > l3[2]) {
      signals.push({ sev:"A", cat:"Liquiditeit", msg:`Liquiditeitsratio daalt al 3 jaar op rij (${l3.map(v=>v.toFixed(2)).join(" → ")})` });
    }
  }

  // --- RESERVES --- (alleen voor CBO's die een algemene reserve hanteren)
  if (hasReserve && evd !== null) {
    if (evd < 0) signals.push({ sev:"K", cat:"Reserve", msg:`Negatief eigen vermogen — reserve-dekking ${(evd*100).toFixed(0)}%` });
    else if (evd < 0.3) signals.push({ sev:"K", cat:"Reserve", msg:`Reserve-dekking (${(evd*100).toFixed(0)}%) kritiek laag — onvoldoende buffer voor tegenvallers` });
    else if (evd < 1.0) signals.push({ sev:"W", cat:"Reserve", msg:`Reserve-dekking (${(evd*100).toFixed(0)}%) onder norm van 100% — eigen vermogen dekt niet de jaarlijkse kosten` });
    else if (evd > 2.5) signals.push({ sev:"P", cat:"Reserve", msg:`Solide reserve-positie (${(evd*100).toFixed(0)}% dekking)` });
  }

  // --- VERDELING (tempo; onverdeeld-na-3-jaar verwijderd in v8) ---
  if (tempo !== null && tempo < 0.5) signals.push({ sev:"K", cat:"Verdeling", msg:`Verdeeltempo (${(tempo*100).toFixed(0)}%) alarmerend laag — minder dan helft binnen wettelijke termijn` });
  else if (tempo !== null && tempo < 0.7) signals.push({ sev:"W", cat:"Verdeling", msg:`Verdeeltempo (${(tempo*100).toFixed(0)}%) onder de 70% — vertraging in uitbetaling aan rechthebbenden` });
  else if (tempo !== null && tempo >= 0.95) signals.push({ sev:"P", cat:"Verdeling", msg:`Uitstekend verdeeltempo (${(tempo*100).toFixed(0)}%) — nagenoeg volledige verdeling binnen termijn` });

  if (ntv !== null && ntvMut !== null && ntvMut > 30) signals.push({ sev:"W", cat:"Verdeling", msg:`Nog te verdelen gelden stegen ${ntvMut.toFixed(0)}% t.o.v. vorig jaar (van €${Math.round((prevNtv||0)/1000)}M naar €${Math.round(ntv/1000)}M)` });
  else if (ntv !== null && ntvMut !== null && ntvMut < -30) signals.push({ sev:"P", cat:"Verdeling", msg:`Nog te verdelen gelden daalden ${Math.abs(ntvMut).toFixed(0)}% — goede voortgang in repartitie` });

  // --- INCASSO ---
  if (incMut !== null && incMut < -20) signals.push({ sev:"K", cat:"Incasso", msg:`Incasso daalde ${Math.abs(incMut).toFixed(1)}% — substantieel omzetverlies dat de organisatie onder druk kan zetten` });
  else if (incMut !== null && incMut < -10) signals.push({ sev:"W", cat:"Incasso", msg:`Incasso daalde ${Math.abs(incMut).toFixed(1)}% t.o.v. vorig jaar` });
  else if (incMut !== null && incMut > 20) signals.push({ sev:"P", cat:"Incasso", msg:`Sterke incassogroei van ${incMut.toFixed(1)}%` });

  return signals.sort((a, b) => "KWAP".indexOf(a.sev) - "KWAP".indexOf(b.sev));
}

function detectSectorTrends(yi) {
  const trends = [];
  const jr = JR[yi];
  const curInc = SECTOR_INC[yi], curKst = SECTOR_KST[yi], curPct = SECTOR_PCT[yi];

  // --- 5-year lookback (or max available) ---
  const lb = Math.min(yi, 5); // lookback years
  const baseYi = yi - lb;
  const baseInc = SECTOR_INC[baseYi], baseKst = SECTOR_KST[baseYi], basePct = SECTOR_PCT[baseYi];
  const period = `${JR[baseYi]}–${jr}`;

  if (lb >= 3 && baseInc > 0 && baseKst > 0) {
    const incGr = ((curInc - baseInc) / baseInc * 100);
    const kstGr = ((curKst - baseKst) / baseKst * 100);
    const cumCPI = Object.entries(CPI).filter(([y]) => +y > +JR[baseYi] && +y <= +jr).reduce((s, [, v]) => s + v, 0);

    trends.push({ icon:"📈", title:"Incasso-ontwikkeling", msg:`Sectorale incasso groeide ${incGr.toFixed(0)}% over ${period} (van €${Math.round(baseInc/1e3)}M naar €${Math.round(curInc/1e3)}M)`, color: incGr > 0 ? "var(--ok)" : "var(--dg)" });
    trends.push({ icon:"💰", title:"Kostenontwikkeling vs CPI", msg:`Kosten stegen ${kstGr.toFixed(0)}% over ${period} — cumulatieve CPI was ${cumCPI.toFixed(1)}% in dezelfde periode. ${kstGr > cumCPI ? "Kosten groeiden sneller dan inflatie." : "Kosten bleven onder inflatieniveau."}`, color: kstGr > cumCPI ? "var(--or)" : "var(--ok)" });

    const pctChange = ((curPct - basePct) / basePct * 100);
    trends.push({ icon:"📊", title:"Kostenpercentage-trend", msg:`Kostenpercentage ${curPct < basePct ? "daalde" : "steeg"} van ${(basePct*100).toFixed(1)}% naar ${(curPct*100).toFixed(1)}% (${pctChange > 0 ? "+" : ""}${pctChange.toFixed(1)}%) — ${curPct < basePct ? "structurele verbetering in efficiëntie" : "verslechterende kostenbeheersing"}`, color: curPct <= basePct ? "var(--ok)" : "var(--or)" });
  }

  // --- CBO's boven individuele norm ---
  const bovenNu = CBOS.filter(c => { const d = D[c]; if (!d || !d.inc[yi] || d.inc[yi] === 0) return false; return d.kst[yi] / d.inc[yi] * 100 > normFor(c); });
  const bovenVorig = yi > 0 ? CBOS.filter(c => { const d = D[c]; if (!d || !d.inc[yi-1] || d.inc[yi-1] === 0) return false; return d.kst[yi-1] / d.inc[yi-1] * 100 > normFor(c); }) : [];
  if (bovenNu.length > 0) {
    const delta = bovenNu.length - bovenVorig.length;

/* ═══ URL HASH STATE ═══ */
function parseHash() {
  const h = (typeof window !== "undefined" ? window.location.hash : "").replace(/^#/, "");
  const o = {};
  h.split("&").filter(Boolean).forEach(p => { const [k,v] = p.split("="); if (k) o[k] = decodeURIComponent(v||""); });
  return o;
}
function writeHash(o) {
  if (typeof window === "undefined") return;
  const parts = [];
  if (o.tab !== undefined && o.tab !== 0) parts.push("tab=" + o.tab);
  if (o.cbo && o.cbo !== "__ALL__") parts.push("cbo=" + encodeURIComponent(o.cbo));
  if (o.yr !== undefined) parts.push("yr=" + o.yr);
  const h = parts.length ? "#" + parts.join("&") : "";
  if (window.location.hash === h) return;
  // In sandboxed iframes (about:srcdoc) replaceState throws SecurityError — safely ignore
  try { history.replaceState(null, "", window.location.pathname + window.location.search + h); }
  catch (e) { /* no URL-state in this context; dashboard still works fine */ }
}

/* ═══ CSV EXPORT ═══ */
function exportCsv(filename, rows) {
  const csv = rows.map(r => r.map(c => {
    const s = c === null || c === undefined ? "" : String(c);
    return /[",\n;]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  }).join(";")).join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type:"text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 500);
}
