              </div>
            ));
          })()}
          <div style={{display:"flex",gap:14,marginTop:12,fontSize:10,color:"var(--mt)"}}>
            <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:"#3b82f6",borderRadius:2}}/>NL</span>
            <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:"var(--wn)",borderRadius:2}}/>Buitenland</span>
            <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:"#c084fc",borderRadius:2}}/>Via andere CBO</span>
          </div>
        </div>
        <div className="cd"><div className="ct">Repartitie-onderverdeling · 2024 <span style={{fontSize:9,fontWeight:400,color:"var(--mt)",marginLeft:6}}>bron: CvTA 8.16</span></div>
          {(() => {
            const rows = CBOS.map(c => {
              const r = REP_SPLIT_2024[c]; if (!r) return null;
              const tot = r.nl + r.buit + r.cbo;
              return { c, tot, nl:r.nl, buit:r.buit, cbo:r.cbo };
            }).filter(r => r && r.tot > 0).sort((a,b) => b.tot - a.tot);
            const max = rows[0]?.tot || 1;
            return rows.map((r,i) => (
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
                <div style={{flex:"0 0 85px",fontSize:11,fontWeight:600,cursor:"pointer",color:cbo===r.c?"var(--acc)":"var(--tx)"}} onClick={()=>setCbo(r.c)}>{r.c}</div>
                <div style={{flex:1,display:"flex",height:14,borderRadius:4,overflow:"hidden",background:"var(--c2)"}}>
                  <div style={{width:(r.nl/max*100)+"%",background:"var(--ok)"}} title={`NL rechthebbenden: €${Math.round(r.nl).toLocaleString("nl-NL")}K`}/>
                  <div style={{width:(r.buit/max*100)+"%",background:"var(--wn)"}} title={`Buitenland: €${Math.round(r.buit).toLocaleString("nl-NL")}K`}/>
                  <div style={{width:(r.cbo/max*100)+"%",background:"#c084fc"}} title={`Door naar andere CBO: €${Math.round(r.cbo).toLocaleString("nl-NL")}K`}/>
                </div>
                <div style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:"var(--tx)",width:52,textAlign:"right"}}>€{(r.tot/1e3).toFixed(1)}M</div>
              </div>
            ));
          })()}
          <div style={{display:"flex",gap:14,marginTop:12,fontSize:10,color:"var(--mt)"}}>
            <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:"var(--ok)",borderRadius:2}}/>NL rechthebbenden</span>
            <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:"var(--wn)",borderRadius:2}}/>Buitenland</span>
            <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:"#c084fc",borderRadius:2}}/>Door naar andere CBO</span>
          </div>
        </div>
      </div>)}
      {yi !== 9 && <div className="cd" style={{textAlign:"center",padding:30,color:"var(--mt)",fontSize:12}}>Herkomst incasso en repartitie-onderverdeling zijn in dit dashboard alleen voor 2024 opgenomen. Selecteer 2024 om deze weergave te tonen.</div>}
      <div className="cd" style={{marginTop:18}}><div className="ct">Incasso vs Repartitie · {jr}</div>
        {CBOS.filter(c=>(D[c]?.inc[yi]??0)>0).sort((a,b)=>(D[b]?.inc[yi]||0)-(D[a]?.inc[yi]||0)).slice(0,12).map((c,i) => {
          const inc=D[c].inc[yi],rep=D[c].rep[yi]||0; const ratio=inc>0?rep/inc:0;
          const col=ratio>=1?"var(--ok)":ratio>=.8?"var(--wn)":"var(--or)";
          return (<div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <div style={{flex:"0 0 85px",fontSize:11,fontWeight:600,cursor:"pointer",color:"var(--acc)"}} onClick={()=>{setCbo(c);setTab(1);}}>{c}</div>
            <div style={{flex:1,position:"relative",background:"var(--c2)",borderRadius:3,height:8,overflow:"hidden"}}>
              <div style={{position:"absolute",height:8,borderRadius:3,width:Math.min(ratio*100,100)+"%",background:col,opacity:.7,transition:"width .5s"}}/>
            </div>
            <div style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:col,width:50,textAlign:"right"}}>{(ratio*100).toFixed(0)}%</div>
          </div>);
        })}
        <div style={{fontSize:10,color:"var(--mt)",marginTop:8}}>Repartitie als % van incasso — boven 100% = meer gereparteerd dan geïncasseerd (inhaal voorgaande jaren)</div>
      </div>
    </div>
  )}

  {/* ═══ TAB 4: KETENKOSTEN ═══ */}
  {tab === 4 && (
    <div className="fu">
      <div className="cd" style={{marginBottom:18}}>
        <div className="ct">Ketenkosten · Structuur {jr}</div>
        <div style={{fontSize:12,color:"var(--mt)",lineHeight:1.6,marginBottom:6}}>
          Bij ketens loopt geld van een incasserende CBO (eerste schakel) via één of meer doorverdelende CBO's naar rechthebbenden. De sectorale norm van <b style={{color:"var(--tx)"}}>15%</b> geldt voor de <i>totale keten</i>: eigen beheerskosten van alle schakels samen gedeeld door de doorverdeelde repartitie. De kosten worden pro-rata toegerekend: 1e schakel naar het aandeel van de incasso dat naar CBO's gaat, doorverdelers naar het aandeel van hun incasso uit CBO's, én verdeeld over alle ketens waarin zij actief zijn (geen dubbeltelling).
        </div>
      </div>
      {yi === 9 ? (() => {
        // Pre-compute: tel in hoeveel ketens elke doorv-CBO voorkomt (voor splitsing)
        const ketensPerCbo = {};
        KETENS.forEach(k => k.doorv.forEach(dv => { ketensPerCbo[dv] = (ketensPerCbo[dv] || 0) + 1; }));
        return KETENS.map((k, ki) => {
        const incD = D[k.inc], firstKst = incD?.kst[yi] ?? null;
        const firstInc = incD?.inc[yi] ?? 0;
        const repSplit = REP_SPLIT_2024[k.inc];
        const viaCbo = repSplit?.cbo ?? 0;
        // 1e schakel: alleen het deel van de kosten dat toerekenbaar is aan de CBO-doorverdeelstroom
        // (pro-rata naar het aandeel van de incasso dat naar CBO's gaat)
        const firstKstProRata = firstInc > 0 ? (firstKst || 0) * (viaCbo / firstInc) : (firstKst || 0);
        // Verdelers: elke doorv-CBO heeft een totale "cbo-kanaal-kost" (kst × cbo-aandeel in hun incasso),
        // die verdeeld wordt over het aantal ketens waarin zij voorkomen (geen dubbeltelling).
        const verdelers = k.doorv.map(dv => {
          const h = HERK_INC_2024[dv];
          const dd = D[dv];
          if (!h || !dd) return null;
          const totInc = (dd.inc[yi] || 0);
          const incViaCbo = h.cbo || 0;
          const eigenKst = dd.kst[yi] || 0;
          const aandeelViaCbo = totInc > 0 ? incViaCbo/totInc : 0;
          const nKetens = ketensPerCbo[dv] || 1;
          // Pro-rata over ketens om dubbeltelling te voorkomen
          const kstAanDezeKeten = (eigenKst * aandeelViaCbo) / nKetens;
          return { cbo: dv, totInc, incViaCbo, eigenKst, aandeelViaCbo, nKetens, kstAanDezeKeten };
        }).filter(Boolean);
        const totEigenKstVerdelers = verdelers.reduce((s, v) => s + v.kstAanDezeKeten, 0);
        const ketenKstBenadering = firstKstProRata + totEigenKstVerdelers;
        const ketenPctBenadering = viaCbo > 0 ? ketenKstBenadering / viaCbo * 100 : null;

        return (
          <div key={ki} className="cd" style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
              <div>
                <div className="ct" style={{margin:0,fontSize:14}}>{k.naam}</div>
                <div style={{fontSize:10,color:"var(--mt)",marginTop:2}}>Eerste schakel: <b style={{color:"var(--tx)"}}>{k.inc}</b> → {k.doorv.length} doorverdelende CBO's</div>
              </div>
              {ketenPctBenadering !== null && (
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{fontSize:10,color:"var(--mt)",textAlign:"right"}}>
                    <div>Indicatief ketenkosten-%</div>
                    <div style={{fontSize:9,color:"var(--mt2)"}}>norm ≤15%</div>
                  </div>
                  <div style={{
                    width:54,height:54,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
                    background:(ketenPctBenadering>15?"var(--dg)":ketenPctBenadering>12?"var(--or)":"var(--ok)")+"18",
                    border:"2px solid "+(ketenPctBenadering>15?"var(--dg)":ketenPctBenadering>12?"var(--or)":"var(--ok)"),
                    fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,
                    color:ketenPctBenadering>15?"var(--dg)":ketenPctBenadering>12?"var(--or)":"var(--ok)"
                  }}>{ketenPctBenadering.toFixed(1)}%</div>
                </div>
              )}
            </div>

            {/* Geldstroom */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
              <div style={{padding:"10px 12px",background:"var(--c2)",borderRadius:8}}>
                <div style={{fontSize:9,color:"var(--mt)",textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Incasso 1e schakel</div>
                <div style={{fontSize:15,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:"var(--acc)"}}>€{((incD?.inc[yi]||0)/1e3).toFixed(1)}M</div>
              </div>
              <div style={{padding:"10px 12px",background:"var(--c2)",borderRadius:8}}>
                <div style={{fontSize:9,color:"var(--mt)",textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Kost 1e schakel (pro-rata)</div>
                <div style={{fontSize:15,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:"var(--wn)"}}>{firstKst !== null ? "€"+(firstKstProRata/1e3).toFixed(2)+"M" : "n.b."}</div>
                <div style={{fontSize:8,color:"var(--mt2)",marginTop:2}}>van €{((firstKst||0)/1e3).toFixed(1)}M totaal</div>
              </div>
              <div style={{padding:"10px 12px",background:"var(--c2)",borderRadius:8}}>
                <div style={{fontSize:9,color:"var(--mt)",textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Doorverdeeld naar CBO's</div>
                <div style={{fontSize:15,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:"#c084fc"}}>€{(viaCbo/1e3).toFixed(1)}M</div>
              </div>
              <div style={{padding:"10px 12px",background:"var(--c2)",borderRadius:8}}>
                <div style={{fontSize:9,color:"var(--mt)",textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Indic. kosten verdelers</div>
                <div style={{fontSize:15,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:"var(--wn)"}}>€{(totEigenKstVerdelers/1e3).toFixed(2)}M</div>
              </div>
            </div>

            {/* Doorverdelers */}
            <div style={{fontSize:11,fontWeight:600,color:"var(--mt)",marginBottom:6}}>Doorverdelende CBO's ({verdelers.length}):</div>
            <div style={{overflowX:"auto"}}>
              <table>
                <thead><tr>
                  {["CBO","Totale incasso","w.v. via CBO","Aandeel uit keten","Eigen kosten","Kst% (eigen)","Toegerekend"].map((h,i) => (
                    <th key={i} style={{textAlign:i===0?"left":"right",fontSize:10}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {verdelers.map((v,i) => {
                    const pI = v.totInc > 0 ? v.eigenKst / v.totInc * 100 : 0;
                    const n = normFor(v.cbo);
                    return (
                      <tr key={v.cbo} style={{background:i%2===0?"transparent":"var(--c2)",cursor:"pointer"}} onClick={()=>{setCbo(v.cbo);setTab(1);}}>
                        <td style={{fontWeight:600,color:"var(--acc)"}}>{v.cbo}</td>
                        <td style={{textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10}}>€{(v.totInc/1e3).toFixed(1)}M</td>
                        <td style={{textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"#c084fc"}}>€{(v.incViaCbo/1e3).toFixed(1)}M</td>
                        <td style={{textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"var(--mt)"}}>{(v.aandeelViaCbo*100).toFixed(0)}%</td>
                        <td style={{textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"var(--wn)"}}>€{(v.eigenKst/1e3).toFixed(1)}M</td>
                        <td style={{textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:pI>n?"var(--dg)":"var(--tx)"}}>{pI.toFixed(1)}%</td>
                        <td style={{textAlign:"right",fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"var(--wn)"}} title={v.nKetens>1?`${v.cbo} verdeelt in ${v.nKetens} ketens — pro-rata toegerekend`:"Enige keten"}>€{(v.kstAanDezeKeten/1e3).toFixed(2)}M{v.nKetens>1?<span style={{fontSize:8,color:"var(--mt2)"}}>  /{v.nKetens}</span>:null}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      });
      })() : (
        <div className="cd" style={{textAlign:"center",padding:30,color:"var(--mt)",fontSize:12}}>
          Ketenkosten-weergave is alleen beschikbaar voor 2024 (bron: Herkomst Incasso 8.10 en Repartitie-onderverdeling 8.16). Selecteer 2024 in het jaarfilter.
        </div>
      )}
      <div style={{padding:"12px 16px",background:"var(--c2)",borderRadius:12,fontSize:10,color:"var(--mt)",lineHeight:1.8,marginTop:8}}>
        <b style={{color:"var(--tx)"}}>Methodiek ketenkosten:</b> Het getoonde ketenkosten-% is een <b>indicatie</b>, geen officiële CvTA-berekening. <b style={{color:"var(--tx)"}}>(1) Eerste schakel</b>: de kosten worden pro-rata toegerekend naar het aandeel van de incasso dat daadwerkelijk naar andere CBO's gaat (anders zou PRO's volledige €734K kost toegeschreven worden aan de €234K-flow naar IPRO). <b style={{color:"var(--tx)"}}>(2) Doorverdelende CBO's</b>: hun kost wordt vermenigvuldigd met het aandeel van hun incasso dat uit CBO-stromen komt (niet uit NL/buitenland), én dit wordt verdeeld over het aantal ketens waarin zij voorkomen (Lira zit in 4 ketens — zonder splitsing zou Lira's kost 4× dubbelgeteld worden). De werkelijke CvTA-berekening houdt ook rekening met inhoudings-percentages per schakel en administratieve vergoedingen tussen CBO's. Gebruik dit als signaalindicator, niet als harde norm-toetsing.
      </div>
    </div>
  )}

  {/* ═══ TAB 5: BENCHMARK ═══ */}
  {tab === 5 && (
    <div className="fu">
      {/* Peer-clusters */}
      <div className="cd" style={{marginBottom:18}}>
        <div className="ct">Peer-vergelijking per rechtendomein · {jr}</div>
        <div style={{fontSize:11,color:"var(--mt)",marginBottom:12,lineHeight:1.5}}>
          CBO's groeperen op type rechten geeft een eerlijker benchmark dan een sectorgemiddelde — een muziek-CBO en een thuiskopie-CBO hebben fundamenteel andere kostenstructuren.
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14}}>
          {PEER_GROUPS.map((pg, gi) => {
            const members = pg.cbos.filter(c => D[c] && D[c].inc[yi] && D[c].inc[yi] > 0);
            if (members.length === 0) return null;
            // Peer-statistieken
            const pcts = members.map(c => D[c].kst[yi] / D[c].inc[yi] * 100);
            const avgPct = pcts.reduce((s,v) => s+v, 0) / pcts.length;
            const minPct = Math.min(...pcts);
            const maxPct = Math.max(...pcts);
            const totInc = members.reduce((s,c) => s + (D[c].inc[yi]||0), 0);
            return (
              <div key={gi} style={{padding:"12px 14px",background:"var(--c2)",borderRadius:10,borderTop:"2px solid var(--acc)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{fontSize:12,fontWeight:700,color:"var(--tx)"}}>{pg.naam}</div>
                  <div style={{fontSize:10,color:"var(--mt)"}}>{members.length} CBO{members.length!==1?"'s":""} · €{(totInc/1e3).toFixed(0)}M incasso</div>
                </div>
                <div style={{display:"flex",gap:10,marginBottom:10,fontSize:10,color:"var(--mt)"}}>
                  <span>gem: <b style={{color:"var(--tx)"}}>{avgPct.toFixed(1)}%</b></span>
                  <span>min: <b style={{color:"var(--ok)"}}>{minPct.toFixed(1)}%</b></span>
                  <span>max: <b style={{color:"var(--dg)"}}>{maxPct.toFixed(1)}%</b></span>
                </div>
                {members.sort((a,b) => (D[b].kst[yi]/D[b].inc[yi]) - (D[a].kst[yi]/D[a].inc[yi])).map((c,i) => {
                  const pI = D[c].kst[yi]/D[c].inc[yi]*100;
                  const n = normFor(c);
                  const over = pI > n;
                  const dev = pI - avgPct;
                  return (
                    <div key={c} style={{display:"flex",alignItems:"center",gap:6,marginBottom:5,cursor:"pointer"}} onClick={()=>{setCbo(c);setTab(1);}}>
                      <div style={{flex:"0 0 80px",fontSize:10,fontWeight:600,color:cbo===c?"var(--acc)":"var(--tx)"}}>{c}</div>
                      <div style={{flex:1,position:"relative",background:"var(--bg)",borderRadius:3,height:6}}>
                        <div style={{height:6,borderRadius:3,width:Math.min(pI/25*100,100)+"%",background:over?"var(--dg)":"var(--acc)"}}/>
                        {/* avg-marker */}
                        <div style={{position:"absolute",top:-1,bottom:-1,left:Math.min(avgPct/25*100,100)+"%",width:1,background:"var(--mt)",opacity:.6}}/>
                      </div>
                      <div style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:over?"var(--dg)":"var(--tx)",width:46,textAlign:"right"}}>{pI.toFixed(1)}%</div>
                      <div style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:Math.abs(dev)<1?"var(--mt)":(dev>0?"var(--or)":"var(--ok)"),width:40,textAlign:"right"}}>{dev>0?"+":""}{dev.toFixed(1)}pp</div>
                    </div>
                  );
                })}
                <div style={{fontSize:9,color:"var(--mt2)",marginTop:6}}>Δ = afwijking t.o.v. peer-gemiddelde · verticale lijn = gemiddelde</div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="cd" style={{marginBottom:18}}>
        <div className="ct">Incasso vs Kosten · {jr}</div>
        <ResponsiveContainer width="100%" height={350}>
          <BarChart data={CBOS.filter(c=>(D[c]?.inc[yi]??0)>0).map(c=>({cbo:c.length>10?c.slice(0,9)+"…":c,inc:D[c].inc[yi],kst:D[c].kst[yi]})).sort((a,b)=>b.inc-a.inc)}>
            <CartesianGrid strokeDasharray="3 3" stroke="var(--gr)"/>
            <XAxis dataKey="cbo" stroke="var(--bd)" tick={{fill:"var(--mt)",fontSize:9}} angle={-35} textAnchor="end" height={60}/>
            <YAxis stroke="var(--bd)" tick={{fill:"var(--mt)",fontSize:10}} tickFormatter={v=>(v/1e3).toFixed(0)+"M"}/>
            <Tooltip content={<Tp/>}/><Legend wrapperStyle={{fontSize:11}}/>
            <Bar dataKey="inc" name="Incasso" fill="#3b82f680" radius={[4,4,0,0]} barSize={18}/>
            <Bar dataKey="kst" name="Kosten" fill="var(--wn)" radius={[4,4,0,0]} barSize={18}/>
          </BarChart>
        </ResponsiveContainer>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18}}>
        <div className="cd"><div className="ct">Liquiditeitsratio · {jr}</div>
          {CBOS.filter(c=>D[c]?.liq[yi]!==null).sort((a,b)=>(D[a].liq[yi]||99)-(D[b].liq[yi]||99)).map((c,i) => {
            const v=D[c].liq[yi]; const col=v>=1.2?"var(--ok)":v>=1?"var(--wn)":v>=.8?"var(--or)":"var(--dg)";
            return (<div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}><div style={{flex:"0 0 85px",fontSize:11,fontWeight:600}}>{c}</div><div style={{flex:1,background:"var(--c2)",borderRadius:3,height:7,overflow:"hidden"}}><div style={{height:7,borderRadius:3,width:Math.min(v/2*100,100)+"%",background:col,transition:"width .5s"}}/></div><div style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:col,width:40,textAlign:"right"}}>{v.toFixed(2)}</div></div>);
          })}
          {CBOS.filter(c=>D[c]?.liq[yi]!==null).length===0&&<div style={{color:"var(--mt)",fontSize:12,textAlign:"center",padding:20}}>Alleen beschikbaar voor 2022–2024</div>}
        </div>
        <div className="cd"><div className="ct">Reserve-dekking · {jr} <span style={{fontSize:9,fontWeight:400,color:"var(--mt)",marginLeft:6}}>(excl. CBO's zonder algemene reserve)</span></div>
          {CBOS.filter(c=>!NO_RESERVE.has(c) && D[c]?.evd[yi]!==null).sort((a,b)=>(D[a].evd[yi]||99)-(D[b].evd[yi]||99)).map((c,i) => {
            const v=D[c].evd[yi]; const col=v>=1.5?"var(--ok)":v>=1?"var(--wn)":v>=.5?"var(--or)":"var(--dg)";
            return (<div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}><div style={{flex:"0 0 85px",fontSize:11,fontWeight:600}}>{c}</div><div style={{flex:1,background:"var(--c2)",borderRadius:3,height:7,overflow:"hidden"}}><div style={{height:7,borderRadius:3,width:Math.min(Math.max(v,0)/3*100,100)+"%",background:col,transition:"width .5s"}}/></div><div style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:col,width:50,textAlign:"right"}}>{(v*100).toFixed(0)}%</div></div>);
          })}
          {CBOS.filter(c=>!NO_RESERVE.has(c) && D[c]?.evd[yi]!==null).length===0&&<div style={{color:"var(--mt)",fontSize:12,textAlign:"center",padding:20}}>Alleen beschikbaar voor 2022–2024</div>}
        </div>
      </div>
    </div>
  )}

  {/* ═══ TAB 6: SIGNALEN ═══ */}
  {tab === 6 && (
    <div className="fu">
      {(() => {
        const targets = isSec ? CBOS : [cbo];
        const allSignals = [];
        targets.forEach(c => {
          detectSignals(c, yi).forEach(s => allSignals.push({ ...s, cbo: c }));
        });
        allSignals.sort((a, b) => "KWAP".indexOf(a.sev) - "KWAP".indexOf(b.sev));
        const counts = { K: allSignals.filter(s=>s.sev==="K").length, W: allSignals.filter(s=>s.sev==="W").length, A: allSignals.filter(s=>s.sev==="A").length, P: allSignals.filter(s=>s.sev==="P").length };

        return (
          <>
          <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:18 }}>
            {[["Kritiek","K","var(--dg)"],["Waarschuwing","W","var(--or)"],["Aandachtspunt","A","var(--wn)"],["Positief","P","var(--ok)"]].map(([label, key, col]) => (
              <div key={key} className="kp" style={{ borderColor: counts[key] > 0 && key !== "P" ? col : "var(--bd)" }}>
                <div className="kl">{label}</div>
                <div className="kv" style={{ color: col }}>{counts[key]}</div>
                <div className="ks">{isSec ? "alle CBO's" : cbo} · {jr}</div>
              </div>
            ))}
          </div>

          {/* SECTOR TRENDS — only when viewing total sector */}
          {isSec && (() => {
            const trends = detectSectorTrends(yi);
            if (trends.length === 0) return null;
            return (
              <div className="cd" style={{ marginBottom:18 }}>
                <div className="ct" style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span>📊</span>
                  <span>Sectortrends · {jr}</span>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                  {trends.map((t, i) => (
                    <div key={i} style={{ padding:"14px 16px", background:"var(--c2)", borderRadius:12, borderLeft:"3px solid", borderLeftColor: t.color }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                        <span style={{ fontSize:16 }}>{t.icon}</span>
                        <span style={{ fontSize:12, fontWeight:700, color:"var(--tx)" }}>{t.title}</span>
                      </div>
                      <div style={{ fontSize:11, lineHeight:1.7, color:"var(--mt)" }}>{t.msg}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}

          {["K","W","A","P"].map(sev => {
            const items = allSignals.filter(s => s.sev === sev);
            if (items.length === 0) return null;
            return (
              <div key={sev} className="cd" style={{ marginBottom:16 }}>
                <div className="ct" style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span>{SEVICON[sev]}</span>
                  <span>{SEV[sev]} ({items.length})</span>
                </div>
                {items.map((s, i) => (
                  <div key={i} style={{ display:"flex", gap:12, alignItems:"flex-start", padding:"12px 14px", background: i%2===0 ? "transparent" : "var(--c2)", borderRadius:10, marginBottom:2 }}>
                    <div style={{ flex:"0 0 90px" }}>
                      <div style={{ fontSize:12, fontWeight:700, cursor: isSec?"pointer":"default", color:"var(--acc)" }} onClick={() => { if(isSec){setCbo(s.cbo);setTab(1);} }}>{s.cbo}</div>
                      <div style={{ fontSize:9, padding:"2px 6px", borderRadius:8, display:"inline-block", marginTop:3, background: SEVC[s.sev]+"15", color: SEVC[s.sev], fontWeight:600 }}>{s.cat}</div>
                    </div>
                    <div style={{ flex:1, fontSize:12, lineHeight:1.6, color:"var(--tx)" }}>{s.msg}</div>
                  </div>
                ))}
              </div>
            );
          })}

          {allSignals.length === 0 && (
            <div className="cd" style={{ textAlign:"center", padding:40, color:"var(--mt)" }}>Geen signalen voor {isSec?"de sector":cbo} in {jr}</div>
          )}

          <div style={{ padding:"12px 16px", background:"var(--c2)", borderRadius:12, fontSize:10, color:"var(--mt)", lineHeight:1.8, marginTop:8 }}>
            <b style={{ color:"var(--tx)" }}>Automatische signaaldetectie</b> — per CBO worden checks uitgevoerd op: kostennorm-overschrijding (individueel), kostenmutatie vs CPI, kosten t.o.v. repartitie, liquiditeitsratio en -trend (3 jaar), reserve-adequaatheid, verdeeltempo, NTV-ontwikkeling en incassomutatie. Reserve-indicator wordt overgeslagen voor CBO's zonder algemene reserve (StOP NL, Videma).
            <span style={{ color:"var(--dg)" }}> 🔴 Kritiek</span> · <span style={{ color:"var(--or)" }}>🟠 Waarschuwing</span> · <span style={{ color:"var(--wn)" }}>🟡 Aandachtspunt</span> · <span style={{ color:"var(--ok)" }}>🟢 Positief</span>.
            {isSec && " Klik op een CBO-naam om naar het risicoprofiel te navigeren."}
          </div>
          {yi === 9 && <div style={{ padding:"12px 16px", background:"var(--c2)", borderRadius:12, fontSize:10, color:"var(--mt)", lineHeight:1.8, marginTop:8 }}>
            <b style={{ color:"var(--tx)" }}>📋 Databronnen</b> — Financiële hoofdcijfers (incasso, kosten, repartitie, NTV, liquiditeit, reserve-dekking): CvTA-rapportage 2024. Herkomst incasso en repartitie-onderverdeling: CvTA-sheets 8.10 en 8.16.
          </div>}
          </>
        );
      })()}
    </div>
  )}

  {/* ═══ TAB 7: JAARVERSLAGEN ═══ */}
  {tab === 7 && (
    <div className="fu">
      {(() => {
        const SEV_COL = { K:"var(--dg)", W:"var(--or)", A:"var(--wn)", P:"var(--ok)" };
        const SEV_LBL = { K:"Kritiek", W:"Waarschuwing", A:"Aandachtspunt", P:"Positief" };
        const DIR_ICON = { up:"↑", down:"↓", flat:"→" };

        // Helper: gestandaardiseerde sectie-kaart
        const Section = ({ icon, titel, meta, children }) => (
          <div className="cd" style={{ marginBottom:18 }}>
            <div className="ct" style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
              <span style={{ fontSize:18 }}>{icon}</span>
              <span>{titel}</span>
              {meta && <span style={{ fontSize:10, fontWeight:400, color:"var(--mt)", marginLeft:"auto" }}>{meta}</span>}
            </div>
            {children}
          </div>
        );

        // SECTOR VIEW: status-grid voor alle CBO's
        if (isSec) {
          return (
            <>
              <Section icon="📚" titel="Jaarverslagen per CBO" meta="Kwalitatieve signalen uit publicaties">
                <div style={{ fontSize:11, color:"var(--mt)", marginBottom:14, lineHeight:1.6 }}>
                  Deze tab toont informatie die niet uit de CvTA-rapportage komt: strategie, risico-inventaris,
                  IT-transformatie, AI-positie, governance-wisselingen, incidenten en duurzaamheidsbeleid.
                  Alle content is rechtstreeks afkomstig uit het jaarverslag van de betreffende CBO over het betreffende jaar.
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(180px, 1fr))", gap:10 }}>
                  {CBOS.map(c => {
                    const has = !!JAARVERSLAGEN[c];
                    return (
                      <div
                        key={c}
                        onClick={() => has && (setCbo(c), setTab(7))}
                        style={{
                          padding:"14px 14px",
                          background: has ? "var(--c2)" : "var(--c3)",
                          borderRadius:12,
                          border:"1px solid " + (has ? "var(--ok)44" : "var(--bd)"),
                          cursor: has ? "pointer" : "default",
                          opacity: has ? 1 : 0.55,
                          transition:"transform .15s",
                        }}
                        onMouseEnter={e => { if (has) e.currentTarget.style.transform = "translateY(-2px)"; }}
                        onMouseLeave={e => e.currentTarget.style.transform = "translateY(0)"}
                      >
                        <div style={{ fontSize:13, fontWeight:700, color:"var(--tx)", marginBottom:4 }}>{c}</div>
                        <div style={{ fontSize:10, color: has ? "var(--ok)" : "var(--mt2)" }}>
                          {has ? `✓ ${JAARVERSLAGEN[c].jaar}${JAARVERSLAGEN[c].scope === "jaarrekening" ? " · concept-JR" : ""}` : "nog niet ingelezen"}
                        </div>
                        {has && (
                          <div style={{ fontSize:9, color:"var(--mt)", marginTop:6, lineHeight:1.4 }}>
                            {JAARVERSLAGEN[c].headline.slice(0, 80)}…
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </Section>

              <div style={{ padding:"12px 16px", background:"var(--c2)", borderRadius:12, fontSize:10, color:"var(--mt)", lineHeight:1.8 }}>
                <b style={{ color:"var(--tx)" }}>Methodiek</b> — Kwalitatieve signalen worden handmatig uit jaarverslagen gedestilleerd.
                Elk item is herleidbaar naar een passage in het betreffende jaarverslag. Klik op een CBO met groene rand om het detailbeeld te openen.
              </div>
            </>
          );
        }

        // SINGLE CBO VIEW
        const r = JAARVERSLAGEN[cbo];
        if (!r) {
          return (
            <div className="cd" style={{ textAlign:"center", padding:50 }}>
              <div style={{ fontSize:40, marginBottom:12 }}>📄</div>
              <div style={{ fontSize:14, fontWeight:600, color:"var(--tx)", marginBottom:8 }}>
                Geen jaarverslag-data ingelezen voor {cbo}
              </div>
              <div style={{ fontSize:11, color:"var(--mt)", maxWidth:500, margin:"0 auto", lineHeight:1.6 }}>
                Voor deze CBO is het jaarverslag nog niet verwerkt. Kwalitatieve signalen (strategie, risico's,
                IT-transformatie, AI-positie, governance, incidenten, duurzaamheid) zijn alleen beschikbaar
                nadat het relevante jaarverslag handmatig is ingelezen.
              </div>
              <div
                style={{ marginTop:18, fontSize:11, color:"var(--ac)", cursor:"pointer" }}
                onClick={() => setCbo("__ALL__")}
              >
                → Bekijk welke CBO's wél zijn ingelezen
              </div>
            </div>
          );
        }

        return (
          <>
            {/* HEADER */}
            <div className="cd" style={{ marginBottom:18, background:"linear-gradient(135deg, var(--c2), var(--c3))" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:12 }}>
                <div>
                  <div style={{ fontSize:10, color:"var(--mt)", marginBottom:4, textTransform:"uppercase", letterSpacing:.5 }}>
                    {r.bron}
                  </div>
                  <div style={{ fontSize:20, fontWeight:700, color:"var(--tx)" }}>{cbo} · {r.jaar}</div>
                  <div style={{ fontSize:11, color:"var(--mt)", marginTop:4 }}>Gepubliceerd: {r.publicatie}</div>
                </div>
                <div style={{ fontSize:10, color:"var(--mt)", textAlign:"right" }}>
                  <div style={{ marginBottom:4 }}>📊 {r.trends.length} trends · 🎯 {r.risicos.length} risico's</div>
                  <div>💻 {r.technologie.length} IT-trajecten · 👥 {r.governance.length} governance-items</div>
                </div>
              </div>
              <div style={{ marginTop:14, padding:"12px 14px", background:"var(--c3)", borderRadius:10, borderLeft:"3px solid var(--ac)", fontSize:12, color:"var(--tx)", lineHeight:1.55 }}>
                {r.headline}
              </div>
            </div>

            {/* SCOPE-BANNER — toont type bron en welke secties ontbreken */}
            {r.scopeNote && (
              <div style={{ marginBottom:18, padding:"14px 16px", background:"var(--wn)11", borderRadius:12, border:"1px solid var(--wn)44" }}>
                <div style={{ display:"flex", alignItems:"flex-start", gap:10 }}>
                  <span style={{ fontSize:16, lineHeight:1 }}>📋</span>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:11, fontWeight:700, color:"var(--wn)", marginBottom:4, textTransform:"uppercase", letterSpacing:.5 }}>
                      Beperkte bron · {r.scope}
                    </div>
                    <div style={{ fontSize:11, color:"var(--tx)", lineHeight:1.6 }}>{r.scopeNote}</div>
                  </div>
                </div>
              </div>
            )}

            {/* STRATEGIE */}
            {r.strategie && (
              <Section icon="🎯" titel="Strategie" meta={r.strategie.naam}>
                <div style={{ fontSize:12, color:"var(--tx)", lineHeight:1.6, marginBottom:14 }}>{r.strategie.samenvatting}</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                  {r.strategie.fases.map((f, i) => (
                    <div key={i} style={{ padding:"12px 14px", background:"var(--c2)", borderRadius:10, borderLeft:"3px solid var(--ac)" }}>
                      <div style={{ fontSize:11, fontWeight:700, color:"var(--tx)", marginBottom:4 }}>{f.titel}</div>
                      <div style={{ fontSize:10, color:"var(--mt)", marginBottom:6 }}>{f.periode}</div>
                      <div style={{ fontSize:11, color:"var(--tx)", lineHeight:1.5 }}>{f.focus}</div>
                    </div>
                  ))}
                </div>
              </Section>
            )}

            {/* TRENDS */}
            <Section icon="📈" titel="Trends & ontwikkelingen" meta={`${r.trends.length} items · bron: ${r.jaar}`}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                {r.trends.map((t, i) => (
                  <div key={i} style={{ padding:"12px 14px", background:"var(--c2)", borderRadius:10, borderLeft:`3px solid ${SEV_COL[t.impact]}` }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                      <span style={{ fontSize:16, color: SEV_COL[t.impact] }}>{DIR_ICON[t.richting]}</span>
                      <span style={{ fontSize:11, fontWeight:700, color:"var(--tx)" }}>{t.titel}</span>
                    </div>
                    <div style={{ fontSize:10, color:"var(--tx)", lineHeight:1.55 }}>{t.detail}</div>
                  </div>
                ))}
              </div>
            </Section>

            {/* RISICO'S */}
            <Section icon="⚠️" titel="Risico-inventaris" meta={`${r.risicos.length} items · gewogen naar ernst`}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr", gap:8 }}>
                {r.risicos.map((ri, i) => (
                  <div key={i} style={{ padding:"11px 14px", background:"var(--c2)", borderRadius:10, display:"grid", gridTemplateColumns:"auto 110px 1fr", gap:14, alignItems:"center" }}>
                    <span style={{ fontSize:9, padding:"3px 8px", borderRadius:10, background: `${SEV_COL[ri.sev]}22`, color: SEV_COL[ri.sev], fontWeight:700, whiteSpace:"nowrap" }}>
                      {SEV_LBL[ri.sev]}
                    </span>
                    <span style={{ fontSize:10, color:"var(--mt)", fontWeight:600 }}>{ri.cat}</span>
                    <div>
                      <div style={{ fontSize:11, fontWeight:600, color:"var(--tx)", marginBottom:3 }}>{ri.titel}</div>
                      <div style={{ fontSize:10, color:"var(--mt)", lineHeight:1.55 }}>{ri.detail}</div>
                    </div>
                  </div>
                ))}
              </div>
            </Section>

            {/* TECHNOLOGIE — alleen tonen als er trajecten zijn */}
            {r.technologie && r.technologie.length > 0 && (
            <Section icon="💻" titel="IT & transformatie" meta={`${r.technologie.length} trajecten`}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                {r.technologie.map((p, i) => (
                  <div key={i} style={{ padding:"12px 14px", background:"var(--c2)", borderRadius:10 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6, gap:8 }}>
                      <span style={{ fontSize:12, fontWeight:700, color:"var(--tx)" }}>{p.project}</span>
                      <span style={{ fontSize:9, padding:"2px 7px", borderRadius:8, background:"var(--ac)22", color:"var(--ac)", fontWeight:600, whiteSpace:"nowrap" }}>
                        {p.status}
                      </span>
                    </div>
                    <div style={{ fontSize:10, color:"var(--mt)", lineHeight:1.55 }}>{p.detail}</div>
                  </div>
                ))}
              </div>
            </Section>
            )}

            {/* AI */}
            {r.ai && (
              <Section icon="🤖" titel="AI-positie">
                <div style={{ padding:"12px 14px", background:"var(--c2)", borderRadius:10, marginBottom:12, fontSize:11, color:"var(--tx)", lineHeight:1.6 }}>
                  {r.ai.positie}
                </div>
                <div style={{ fontSize:10, fontWeight:600, color:"var(--mt)", textTransform:"uppercase", letterSpacing:.5, marginBottom:8 }}>Principes</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:12 }}>
                  {r.ai.principes.map((p, i) => (
                    <div key={i} style={{ padding:"10px 12px", background:"var(--c2)", borderRadius:8, fontSize:10, color:"var(--tx)", lineHeight:1.5, borderLeft:"2px solid var(--ac)" }}>
                      {p}
                    </div>
                  ))}
                </div>
                <div style={{ padding:"10px 14px", background:"var(--c3)", borderRadius:8, fontSize:10, color:"var(--mt)", lineHeight:1.55, fontStyle:"italic" }}>
                  {r.ai.concreet}
                </div>
              </Section>
            )}

            {/* GOVERNANCE */}
            <Section icon="👥" titel="Governance & personele wisselingen" meta={`${r.governance.length} items`}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr", gap:8 }}>
                {r.governance.map((g, i) => (
                  <div key={i} style={{ padding:"11px 14px", background:"var(--c2)", borderRadius:10, display:"grid", gridTemplateColumns:"110px 90px 1fr", gap:14, alignItems:"center" }}>
                    <span style={{ fontSize:10, fontWeight:600, color:"var(--tx)" }}>{g.rol}</span>
                    <span style={{ fontSize:10, color:"var(--mt)" }}>{g.datum}</span>
                    <span style={{ fontSize:11, color:"var(--tx)", lineHeight:1.55 }}>{g.details}</span>
                  </div>
                ))}
              </div>
            </Section>

            {/* INCIDENTEN */}
            {r.incidenten.length > 0 && (
              <Section icon="🚨" titel="Incidenten & specifieke gebeurtenissen">
                <div style={{ display:"grid", gridTemplateColumns:"1fr", gap:10 }}>
                  {r.incidenten.map((inc, i) => (
                    <div key={i} style={{ padding:"14px 16px", background:"var(--c2)", borderRadius:10, borderLeft:"3px solid var(--dg)" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6, gap:12, flexWrap:"wrap" }}>
                        <span style={{ fontSize:12, fontWeight:700, color:"var(--tx)" }}>{inc.titel}</span>
                        <span style={{ fontSize:9, padding:"2px 7px", borderRadius:8, background:"var(--dg)22", color:"var(--dg)", fontWeight:600 }}>{inc.datum}</span>
                      </div>
                      <div style={{ fontSize:10, color:"var(--dg)", fontWeight:600, marginBottom:6 }}>Impact: {inc.impact}</div>
                      <div style={{ fontSize:10, color:"var(--mt)", lineHeight:1.6 }}>{inc.detail}</div>
                    </div>
                  ))}
                </div>
              </Section>
            )}

            {/* DUURZAAMHEID */}
            {r.duurzaamheid && r.duurzaamheid.length > 0 && (
              <Section icon="🌱" titel="Duurzaamheid & inclusie">
                <div style={{ display:"grid", gridTemplateColumns:"1fr", gap:8 }}>
                  {r.duurzaamheid.map((d, i) => (
                    <div key={i} style={{ padding:"11px 14px", background:"var(--c2)", borderRadius:10, display:"grid", gridTemplateColumns:"180px 1fr", gap:14, alignItems:"flex-start" }}>
                      <span style={{ fontSize:10, fontWeight:700, color:"var(--ok)" }}>{d.sdg}</span>
                      <span style={{ fontSize:11, color:"var(--tx)", lineHeight:1.55 }}>{d.detail}</span>
                    </div>
                  ))}
                </div>
              </Section>
            )}

            {/* CLAIMS */}
            {r.claims && (
              <Section icon="📋" titel="Claims & klachten">
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10 }}>
                  {[["Aantal", r.claims.aantal], ["Trend", r.claims.trend], ["Formele klachten", r.claims.formeel]].map(([k, v], i) => (
                    <div key={i} style={{ padding:"11px 14px", background:"var(--c2)", borderRadius:10 }}>
                      <div style={{ fontSize:10, fontWeight:700, color:"var(--mt)", textTransform:"uppercase", letterSpacing:.5, marginBottom:6 }}>{k}</div>
                      <div style={{ fontSize:10, color:"var(--tx)", lineHeight:1.55 }}>{v}</div>
                    </div>
                  ))}
                </div>
              </Section>
            )}

            {/* FOOTER */}
            <div style={{ padding:"12px 16px", background:"var(--c2)", borderRadius:12, fontSize:10, color:"var(--mt)", lineHeight:1.8 }}>
              <b style={{ color:"var(--tx)" }}>Bron</b> — {r.bron}, gepubliceerd {r.publicatie}. Alle bovenstaande content is letterlijk herleidbaar naar passages in {r.scope === "jaarrekening" ? "de jaarrekening" : "het jaarverslag"}. Er zijn geen externe bronnen of eigen interpretaties toegevoegd{r.scope === "jaarrekening" ? " — waar een 'detail' iets concludeert, wordt dit expliciet gemarkeerd als niet-toegelicht in de bron" : ""}. Dit overzicht vult de financiële CvTA-cijfers aan met kwalitatieve signalen die niet uit getallen af te lezen zijn.
            </div>
          </>
        );
      })()}
    </div>
  )}

  </div>
  </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
