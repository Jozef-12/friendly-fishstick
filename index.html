      { titel: "Resultaat structureel €0 (by design)", richting: "flat", impact: "P", detail: "Bedrijfsresultaat -€25.200 · financiële baten +€25.200 (rente; banken afgeschaft negatieve rente per 1-10-2023) → netto resultaat €0. Budget 2024: -€12.500 bedrijfsresultaat + €12.500 rente = €0. 2023: -€15.055 + €15.055 = €0. Consistent sinds oprichting." },
      { titel: "Liquide middelen +56% naar €5,60M", richting: "up", impact: "P", detail: "€3,59M (2023) → €5,60M (2024). Netto kasstroom +€2,01M (was +€664K — drievoudige toename). Kasstroom uit incasso/verdeling +€1,55M (inning €11,76M minus repartitie €9,62M minus beroepsorganisaties €490K minus CBO's €101K). Kasstroom uit bedrijfsvoering +€454K (vs €177K in 2023). Current ratio 1,0 (stabiel) — 'zeer goed in staat om aan kortlopende verplichtingen te voldoen'. Liquide middelen vrij beschikbaar." },
      { titel: "Historisch 95% verdeeld binnen 9 maanden", richting: "flat", impact: "A", detail: "Verdelingspercentages binnen jaar 1 per inningsjaar: 2018 36% · 2019 29% · 2020 63% · 2021 89% · 2022 93% · 2023 94% · 2024 92%. Cumulatief verdeeld (inclusief latere jaren): 2018 100% · 2019 100% · 2020 93% · 2021 96% · 2022 96% · 2023 87% · 2024 97%. Gemiddeld 95% over €79,2M totaal geïncasseerd sinds 2018. Niet-100%: naclaimreserve + langere doorlooptijd bij dubbelclaims/niet-identificeerbare rechthebbenden (binnen 3 jaar afgerond; na 5 jaar pro rato uitkering)." },
      { titel: "Aangeslotenen 1.892 · uitgekeerd 417 (22%)", richting: "flat", impact: "A", detail: "1.892 aangeslotenen totaal · 417 aangeslotenen (22%) ontvingen in 2024 een gereparteerde vergoeding. Gefactureerde gebruikers: 18 distributeurs (BMS-exploitanten). Aantal werknemers: 0 FTE (volledig via SBF — zoals SEKAM). Representativiteit: bestuur schat ca 95% van NL onafhankelijke producenten wier werk via BMS verspreid wordt; alle op reguliere basis actieve en alle grote producenten zijn aangesloten." },
      { titel: "Crediteuren +131% naar €2,34M", richting: "up", impact: "A", detail: "€1,01M (2023) → €2,34M (2024) — ruim verdubbeld. Betreft reeds gereparteerde maar nog niet uitbetaalde vergoedingen (betaling begin 2025). Omzetbelasting-schuld €340K (was nul; was vordering €345K in 2023 — verschuiving door timing kwartaalaangifte i.v.m. omvang eind-jaar-gereparteerde gelden). Overige kortlopende schulden: €33K (was €19K). Totaal overige kortlopende schulden: €2,71M (was €1,03M, +163%)." },
      { titel: "Inkomstenbron 100% NL-distributeurs (BMS)", richting: "flat", impact: "A", detail: "Unieke concentratie: StOPnl ontvangt 100% van inkomsten van Nederlandse distributeurs voor doorgifte van filmwerken via BMS (lineaire TV + uitzending gemist). Geen buitenlandse gebruik, geen CBO's Nederland als bron, geen CBO's buitenland. Repartitie volledig direct aan rechthebbenden (€9,6M) plus bijdragen beroepsorganisaties (€490K) en Pictoright (€105K). StOPnl int en reparteert op basis van last en volmacht." },
      { titel: "Bijdrage RoDAP €63K — 58% over budget", richting: "up", impact: "P", detail: "€40K (2023) → €63K (2024) — contributie voor vereniging RoDAP hoger dan begrote €40K. StOPnl is sinds oprichting lid van RoDAP en heeft twee bestuursleden op voordracht daarin. Bijdrage beroepsorganisaties NCP+NAPA bleef exact stabiel op €489.995 (NCP €291K + NAPA €198K) — 'naar rato van geïncasseerde rechtengelden en naar aantal leden vertegenwoordigd door beroepsorganisaties'. Additionele bijdrage voor gezamenlijke belangenbehartiging 'bloedgroep overstijgende dossiers' sinds 2019." },
      { titel: "Nog te realiseren kostendekking €36K", richting: "down", impact: "P", detail: "€41K (2023) → €36K (2024). Vordering op SBF die betrekking heeft op toekomstige inkomsten die in opvolgend jaar (2025, 100%) worden geïncasseerd. Deel van kosten databeheer en incasso (resp. 20% en 30%) betreft toekomstige inkomsten, toegerekend aan boekjaar waarop deze betrekking hebben." },
    ],
    risicos: [
      { cat: "Concentratie", sev: "W", titel: "Één rechtencategorie + één type bron (BMS)", detail: "StOPnl kent uitsluitend één rechtencategorie (BMS-vergoedingen) en ontvangt 100% van inkomsten van Nederlandse distributeurs — alle andere CBO's hebben meerdere rechtencategorieën of bronnen. Wegvallen van BMS-inningsbasis zou StOPnl's bedrijfsmodel volledig ondermijnen. Mitigatie: langdurige vergoedingsovereenkomsten, streven tarievenafspraken tot 2029. Niet alle distributeurs hebben nieuwe addendum per ultimo 2024 getekend." },
      { cat: "Operationeel", sev: "W", titel: "Volledige afhankelijkheid SBF — geen eigen personeel", detail: "StOPnl heeft géén personeel in dienst. Alle operatie (repartitie, administratie, rechthebbendenbestand, incasso) via service-overeenkomst met SBF (sinds 1-10-2012, geactualiseerd begin 2021, onbepaalde tijd, geen vast bedrag). SBF bedient óók SEKAM, SEKAM Video, VIDEMA en FAIR. Directeur SBF Pieter Eversdijk toehoorder bij bestuursvergaderingen. Bij vertrek key-medewerkers SBF: extra kosten voor vervanging." },
      { cat: "Wetgeving", sev: "W", titel: "Wet ACR II parlementaire behandeling", detail: "Wetsontwerp Wet ACR II aangeboden aan Tweede Kamer op 15-4-2024. Introduceert wettelijke bewijsvermoedens (een vergoeding via vereniging van makers 'vermoed billijk te zijn') + verdere uitbreiding wettelijk verplicht collectief beheer voor proportionele vergoedingen voor ALLE makers (inclusief producent in die hoedanigheid) voor 'mededeling aan publiek op andere wijze dan directe injectie of doorgifte via kabel'. Bestuur zal parlementaire behandeling nauwgezet volgen — effect komende jaren beslag krijgen." },
      { cat: "Contractueel", sev: "A", titel: "Addendum vergoedingsovereenkomst tot 2029 onvolledig ondertekend", detail: "Niet alle distributeurs hebben nieuwe addendum bij doorlopende vergoedingsovereenkomst over tarieven tot 2029 getekend per ultimo 2024. Verwachting beslag voorjaar 2025. Per 1-1-2020 eerste Convenant RoDAP/PAM ten einde; in 2020 betalingen gecontinueerd op 2019-niveau; verlengingsakkoord begin 2021 tot en met 2024 (€95M totaal). VoD-akkoord hoofdlijnen 26-3-2024 — ondertekening collectieve overeenkomst verwacht vóór zomer 2025." },
      { cat: "IT", sev: "A", titel: "Discontinuïteit + logische toegangsbeveiliging bij SBF", detail: "Risicoanalyse IT-omgeving: discontinuïteit (data-verlies, systeemuitval, ontevreden klanten), cybersecurity, AVG-compliance. Beheersmaatregelen: periodieke back-ups + recoverytests · serverbeheer uitbesteed aan betrouwbare Cloud-provider · cyberverzekering · functiescheiding · wachtwoordprocedure · 2FA · rechtenbeheer. Periodiek gestandaardiseerde check op opslagruimte, kwaliteit, capaciteit, betrouwbaarheid IT + beveiliging SBF. In Q1 2024 nieuw digitaal identificatieproces rechthebbenden (AVG-conform, positieve feedback)." },
      { cat: "AVG", sev: "A", titel: "AVG-compliance · kwartaalaudits SBF + CBO's", detail: "Compliance continu getoetst: kwartaalcontroles, waar nodig aanpassingen. Externe expertise ingeschakeld. Jaarlijkse trainingen privacy-/gegevensbescherming voor personeel. Beveiliging bedrijfskritische gegevens, monitoring verdachte activiteiten, beoordeling veranderingen wet-/regelgeving. Geen specifiek AVG-incident in 2024." },
      { cat: "Financieel", sev: "P", titel: "Géén continuïteitsreserve", detail: "StOPnl houdt géén continuïteitsreserve aan (in tegenstelling tot bijv. SEKAM €200K + gereserveerde gelden €120K). In scenario dat geen vergoedingen meer worden ontvangen zal StOPnl de voor afwikkeling benodigde middelen onttrekken aan gelden ter zake doorbetaling. Bestuur stelt: 'middels dit uitgangspunt is StOPnl in staat afwikkeling lopende repartitieschuld te realiseren'. Cashflow 2024 geeft vertrouwen going-concern komende 12 maanden." },
      { cat: "WNT", sev: "P", titel: "WNT-complexiteit — expliciet risico benoemd", detail: "Bestuursverslag §5 'Financiële verslaggevingsrisico's': 'Vanwege de complexiteit van de regelgeving onderkennen wij het risico dat er een onjuiste toelichting en/of terugbetalingsverplichting van de beloning van topfunctionarissen is. Bestuur is niet bekend met enige vorm van fraude.' Begin 2024 externe fiscale en juridische Wet DBA-toets uitgevoerd. CvTA hanteert vermoeden dat ureninzet niet-uitvoerend bestuurders zodanig is dat WNT-maximum (€233K in 2024) niet wordt overschreden — geen urenadministratie nodig." },
      { cat: "Strategisch", sev: "P", titel: "Geen grote investeringen 2025 · focus op inning", detail: "Bestuur voorziet 'komende jaren geen aanpassingen in financiering bedrijfsactiviteiten en heeft daarnaast geen investeringen gepland'. 2025 in teken van nieuwe afspraken met distributeurs over addendum bij doorlopende vergoedingsovereenkomst; streven langdurige afspraken bijv. tot 2029. Focus op maximaliseren inning voor rechthebbenden." },
    ],
    technologie: [
      { project: "FReD-portal (Filmwerken Registratie en Declaratie systeem)", status: "Operationeel · doorontwikkeling via SBF", detail: "Online systeem waarin geregistreerde rechthebbenden direct inzicht hebben in status van betalingen via SBF. Ontwikkelkosten afgeschreven/afgelost in 5 jaar via rekening-courant SBF. Achterliggende database en inningsprocessen door SBF beheerd. Stijging rekening-courant SBF: €76K (2023) → €178K (2024) gerelateerd aan FReD-portal doorontwikkeling." },
      { project: "Nieuw digitaal identificatieproces", status: "Geïmplementeerd Q1 2024", detail: "SBF implementeerde in eerste kwartaal 2024 nieuw digitaal identificatieproces voor registratie rechthebbenden. Verwerking persoonsgegevens conform AVG. Gebruikersfeedback positief. Onderdeel van doorlopende security-/AVG-verbeteringen (2FA, functiescheiding, kwartaalcontroles)." },
      { project: "Online managementsysteem", status: "Doorlopend · beslispunten", detail: "Operationeel beheer en bestuur ondersteund door online managementsysteem waarin informatie en documentatie permanent en gestructureerd beschikbaar is voor besluit- en beleidsvorming. SBF verstrekt repartitie-informatie via dit systeem. Periodiek gestandaardiseerde check op opslagruimte, kwaliteit, capaciteit en betrouwbaarheid IT-omgeving." },
      { project: "SBF service-infrastructuur", status: "Doorlopend · kernafhankelijkheid", detail: "SBF verzorgt in opdracht volledige repartitie, administratief beheer, allocatie gelden aan specifieke rechthebbenden. SBF bedient 5 CBO's (SEKAM, SEKAM Video, StOPnl, VIDEMA, FAIR) — schaalvoordelen + gedeelde afhankelijkheid. Servicecontract onbepaalde tijd, geen vast bedrag, jaarlijks vastgesteld door gezamenlijke besturen. 2024 bijdrage: €364K (was €411K, begroot €440K)." },

      { type: "zittend", rol: "Penningmeester/Secretaris (niet-uitvoerend)", datum: "doorlopend sinds 2-2-2022", details: "Jacqueline Gerritsma — 1e termijn t/m 2-2-2026. Bezoldiging 2024: €2.785,63 (max €23.300). Onafhankelijk adviseur en management coach, tevens niet-uitvoerend bestuurder SEKAM en SEKAM Video, directeur-bestuurder Stichting SEC, uitvoerend secretaris Stichting Brave New Works, bestuurslid Stichting Via Nobel. Per 1-4-2025 aangetreden als penningmeester bij SEKAM." },
      { type: "zittend", rol: "Bestuurslid (niet-uitvoerend)", datum: "doorlopend sinds 2-2-2022", details: "Willem Zijlstra — 1e termijn t/m 2-2-2026. Bezoldiging 2024: €2.785,63 (max €23.300). CEO Blooming Media, tevens niet-uitvoerend bestuurder SEKAM (tot 1-4-2025 voorzitter SEKAM; per 1-4-2025 schuift naar secretaris SEKAM)." },
      { type: "zittend", rol: "Uitvoerend bestuurder", datum: "doorlopend sinds 2-2-2022", details: "Arie Landsmeer — 1e termijn t/m 2-2-2026. 0,28 FTE (gebaseerd op gemiddeld 32 uur/maand). Bezoldiging 2024: €55.739,13 (max €65.595,31 WNT bij deze deeltijdfactor = 28% van €233K). Geen dienstbetrekking (forfaitaire vergoeding). Directeur NCP, tevens uitvoerend bestuurder SEKAM en SEKAM Video, bestuurslid SBF/RoDAP/PCMI/VOI©E/Federatie Auteursrechtenbelangen, lid Commissie Rechthebbenden Videma, adviseur Vf/Ziggo, vrijwilliger Staatsbosbeheer, voorzitter Dorpsraad Watergang. Bezoldiging gestegen van €39.993 (2023) naar €55.739 (+39%) bij gelijke 0,28 FTE — nog ruim onder WNT-maximum." },
      { type: "bestuurssecretaris", rol: "Bestuurssecretaris", datum: "heel 2024", details: "Alexandra Parie-van Dam vervulde functie van bestuurssecretaris gedurende 2024. Géén bestuurder. (Dezelfde functie als bij zuster-CBO's SEKAM en SEKAM Video — gedeelde dienstverlening via SBF.)" },
      { type: "externe", rol: "SBF-directeur (toehoorder)", datum: "doorlopend", details: "Pieter Eversdijk, directeur SBF, toehoorder bij bestuursvergaderingen StOPnl. Tevens toehoorder bij gerelateerde SEKAM/SEKAM Video-vergaderingen. In juni 2024 gezamenlijke vergadering StOPnl + SEKAM + SEKAM Video + SBF met accountant EY voor vaststelling transparantieverslagen 2023." },
      { type: "structuur", rol: "Monistisch/one-tier governance", datum: "sinds 2-2-2022 · aangepast 2024", details: "One-tier structuur ingevoerd op basis van VOI©E Governance Code CBO's (2021). Statutenwijziging per 2-2-2023: onderscheid uitvoerend bestuurder (leidinggevende topfunctionaris) vs niet-uitvoerende bestuurders (toezichthoudende topfunctionarissen). In 3e kwartaal 2024 bezoldigingen en rooster van aftreden aangepast als gevolg van implementatie monistisch governance-model." },
      { type: "vergaderingen", rol: "Bestuursvergaderingen 2024", datum: "4x in 2024", details: "Bestuur viermaal vergaderd in 2024, alle online. Eén vergadering gecombineerd met presentatie van Telecompaper. Juni 2024: gecombineerde vergadering met SEKAM Video, SEKAM en SBF met accountant EY. Q3 2024: evaluatie samenwerking externe partijen (accountant, SBF). Q4 2024: zelfevaluatie bestuur + vaststelling begroting en beleid 2024 op hoofdlijnen." },

    incidenten: [
      { type: "regelgeving", titel: "Wetsontwerp Wet ACR II aangeboden aan Tweede Kamer op 15-4-2024", impact: "Wettelijke bewijsvermoedens voor billijke vergoeding + uitbreiding verplicht collectief beheer voor álle makers (inclusief producent) bij mededeling aan publiek", datum: "15 april 2024", detail: "Wet ACR II bevat flankerend beleid voor totstandkoming collectieve overeenkomsten over billijke vergoedingen: vergoeding voor overdracht/verlening exploitatiebevoegdheden door makers vermoed billijk bij overeenkomst met vereniging van makers + voor VoD passend/evenredig (proportioneel). Daarnaast verdere uitbreiding wettelijk verplicht collectief beheer voor proportionele billijke vergoedingen alle makers (inclusief producent in die hoedanigheid) voor 'mededeling aan publiek op andere wijze dan directe injectie of doorgifte via kabel of andere weg'. Effect komende jaren beslag krijgen. Bestuur volgt parlementaire behandeling nauwgezet." },
      { type: "contractueel", titel: "Akkoord op hoofdlijnen VoD-collectieve overeenkomst op 26-3-2024", impact: "Doorbraak na ronde onderhandelingen sinds mei 2023 o.l.v. OCW/Justitie-procesbegeleider", datum: "26 maart 2024", detail: "Op 26-3-2024 akkoord op hoofdlijnen tussen onderhandelingsdelegaties RoDAP/PCMI en PAM/FAIR over collectieve overeenkomst VoD-exploitatie. Niet langer beperkt tot aanspraken scenaristen/hoofdrolacteurs/hoofdregisseurs — omvat vergoedingsaanspraken alle makers bij VoD. Nieuwe leden VoD-diensten bij RoDAP aangemeld; andere VoD-exploitanten willen zich aansluiten bij 'brede coalitie'. Onderhandelingen bij publicatie nog niet afgerond; verwachting ondertekening vóór zomer 2025." },
      { type: "governance", titel: "Statutenwijziging per 2-2-2023 + bezoldigingsaanpassing Q3 2024", impact: "Onderscheid uitvoerend vs niet-uitvoerend bestuurder verwerkt; bezoldigingen en rooster van aftreden aangepast", datum: "Q3 2024", detail: "Per 2-2-2023 nieuwe statuten met onderscheid uitvoerend bestuurder (leidinggevende topfunctionaris) en niet-uitvoerende bestuurders (toezichthoudende topfunctionarissen). Rapportage WNT sluit hierop aan: Landsmeer gekwalificeerd als leidinggevende topfunctionaris, Van der Hoek/Gerritsma/Zijlstra als toezichthoudende topfunctionarissen. In 3e kwartaal 2024 bezoldigingen en rooster van aftreden aangepast. Bezoldiging Landsmeer steeg van €39.993 (2023) naar €55.739 (2024) bij gelijke 0,28 FTE." },
      { type: "operationeel", titel: "Nieuw digitaal identificatieproces SBF in Q1 2024", impact: "AVG-conforme verwerking · positieve gebruikersfeedback", datum: "Q1 2024", detail: "SBF implementeerde eerste kwartaal 2024 nieuw digitaal identificatieproces voor registratie rechthebbenden. Verwerking persoonsgegevens conform AVG. Gebruikersfeedback positief. Onderdeel van doorlopende AVG-/security-investeringen." },
      { type: "regelgeving", titel: "VOI©E CBO-Keurmerk vervallen per 1-10-2023 · handvest zelfregulering", impact: "Overstap naar zelfregulering o.b.v. VOI©E-richtlijnen voor intern toezicht", datum: "1 oktober 2023 (doorwerkend 2024)", detail: "VOI©E CBO-Keurmerk tot 1-10-2023 geldig; vervangen door handvest voor interne controle en toezicht. Moet vertrouwen bieden aan rechthebbenden, gebruikers, overheid en toezichthouder. StOPnl blijft 'onafhankelijke organisatie gericht op verbetering kwaliteit en veiligheid van producten, diensten en organisaties'. Per 2021 onderschrijft bestuur tevens Governance Code CBO's + Gedragscode VOI©E voor Collectieve Beheersorganisaties op terrein van Auteursrecht en naburige rechten." },
      { type: "bestuurlijk", titel: "4 bestuursvergaderingen in 2024 · allemaal online", impact: "Normaal vergaderritme + evaluaties + begroting 2024", datum: "gedurende 2024", detail: "Bestuur vergaderde viermaal in 2024, geheel online. Eén vergadering gecombineerd met Telecompaper-presentatie. In juni 2024 deels gezamenlijke vergadering met SEKAM Video + SEKAM + SBF + accountant EY voor vaststelling transparantieverslagen 2023. Q3 2024: evaluatie samenwerking externe partijen. Q4 2024: zelfevaluatie bestuur + vaststelling begroting/beleid 2024." },
      { type: "communicatie", titel: "Jaarlijkse openbare informatiebijeenkomst rechthebbenden najaar 2024 Amsterdam", impact: "Presentaties over ontwikkelingen SKV/SEKAM/StOPnl + internationale context", datum: "najaar 2024", detail: "In najaar 2024 jaarlijkse openbare informatiebijeenkomst voor rechthebbenden in Amsterdam. Breed scala aan genodigden; korte presentaties ontwikkelingen binnen SKV (SEKAM Video), SEKAM en StOPnl. Internationale context besproken. StOPnl betaalt maandelijks vergoedingen; via FReD-portal geregistreerde rechthebbenden direct inzicht in betalingen. Periodieke informatieverstrekking conform wettelijke vereisten." },

    duurzaamheid: [
      { sdg: "Representativiteit · ca 95% Nederlandse producenten", detail: "Bestuur schat representativiteit op ca 95% van alle Nederlandse producenten wier werk via BMS wordt verspreid — 'alle op reguliere basis actieve en alle grote producenten zijn aangesloten'. Totaal aan Nederlandse producenten niet met zekerheid vast te stellen maar inschatting mogelijk. 1.892 aangeslotenen totaal · 417 aangeslotenen ontvingen in 2024 een repartitie (22%). Representativiteit intern getoetst aan percentage van repartitie dat aan rechthebbenden wordt uitgekeerd." },
      { sdg: "Bijdragen beroepsorganisaties €490K · NCP €291K + NAPA €198K", detail: "Bijdragen aan Nederlandse Content Producenten (NCP) en Nederlandse Audiovisuele Producenten Alliantie (NAPA) — stabiel sinds meerdere jaren. Bijdrage naar rato van geïncasseerde rechtengelden en aantal leden vertegenwoordigd. Sinds 2019 additionele bijdrage voor samenwerkingsovereenkomst NCP+NAPA (gezamenlijke belangenbehartiging 'bloedgroep overstijgende dossiers'); in 2021 niet gecontinueerd maar verhoogde meerjarige bijdrage toegezegd (vanwege COVID-19 onzekerheid contributie-inkomsten). Extra financiële bijdrage aan NCP voor RoDAP-bestuur (twee bestuursleden op voordracht StOPnl)." },
      { sdg: "Bijdrage Pictoright €105K", detail: "€105.414 in 2024 (was €101K in 2023). Pictoright is CBO voor beeldmakers; bijdrage gekwalificeerd samen met bijdragen beroepsorganisaties als 'overige inhoudingen' (4,8% van geïncasseerde gelden in 2024, was 4,9%)." },
      { sdg: "Bijdrage RoDAP €63K · lidmaatschap sinds oprichting", detail: "Contributie RoDAP (Rechtenoverleg voor Distributie van Audiovisuele Producties) — €63K in 2024 (was €40K in 2023). StOPnl lid sinds oprichting; streeft statutaire doelstellingen RoDAP na. Twee StOPnl-bestuursleden op voordracht vertegenwoordigd in RoDAP-bestuur. RoDAP verenigt omroepen, producenten en distributeurs; in 2021 onder nieuwe voorzitter ingezet op verbetering VCB-model (Vrijwillig Collectief Beheer) voor VoD-exploitatie." },
      { sdg: "Informatiebijeenkomst + FReD-portal communicatie", detail: "Jaarlijkse openbare informatiebijeenkomst rechthebbenden in Amsterdam (najaar 2024). StOPnl betaalt maandelijks vergoedingen aan rechthebbenden. Via FReD-portal hebben geregistreerde rechthebbenden direct inzicht in status van betalingen die worden gedaan via SBF. Periodieke informatieverstrekking met inhoudingspercentages en -bedragen conform wettelijke vereisten." },

    claims: {
      aantal: "Geen geschillen of incidenten in 2024 · geen gerealiseerde risico's",
      trend: "Expliciete verklaring bestuursverslag §5.3: 'Geen van de geïdentificeerde risico's heeft zich in het afgelopen jaar voorgedaan. Derhalve waren er geen verstoringen in relaties met rechthebbenden en vertegenwoordigers, zijn er geen vaste medewerkers vertrokken bij SBF, hebben zich geen IT-storingen voorgedaan en is geen sprake geweest van overtredingen van wet- en regelgeving. Ook is er geen negatief resultaat over het boekjaar.' Bestuur is niet bekend met enige vorm van fraude. Bestuur acht gehanteerde interne risicobeheersings- en controlesystemen 'redelijke mate van zekerheid geven dat financiële verslaggeving geen afwijkingen van materieel belang bevat'.",

      { type: "zittend", rol: "Penningmeester (niet-uitvoerend)", datum: "heel 2024", details: "Arie Landsmeer — bezoldiging 2024: €2.785,69 (max €23.300 WNT). Tevens uitvoerend bestuurder SEKAM en StOPnl. Directeur NCP. Bestuurslid SBF/RoDAP/PCMI/VOI©E/Federatie Auteursrechtbelangen, lid Commissie Rechthebbenden Videma. (N.B. bestuursverslag-introductie noemt Van der Hoek als niet-uitvoerend bestuurder SKV in 2024, maar WNT-rapportage 2024 toont Landsmeer in penningmeester-rol voor het volledige boekjaar.)" },
      { type: "zittend", rol: "Secretaris (niet-uitvoerend)", datum: "2-2-2022 t/m 2-2-2026", details: "Jacqueline Gerritsma — 1e termijn. Bezoldiging 2024: €2.785,63 (max €23.300). Onafhankelijk adviseur en management coach, tevens niet-uitvoerend bestuurder StOPnl en SEKAM, directeur-bestuurder Stichting SEC, uitvoerend secretaris Stichting Brave New Works, bestuurslid Stichting Via Nobel." },
      { type: "zittend", rol: "Uitvoerend bestuurder (dagelijks bestuurder)", datum: "2-2-2022 t/m 2-2-2026", details: "Gamila Ylstra — 1e termijn. 0,28 FTE (gemiddeld 32 uur/maand). Bezoldiging 2024: €39.993,13 (max €65.595 WNT bij deze deeltijdfactor). Geen dienstbetrekking (forfaitaire vergoeding). Projectleider en adviseur Y-ma; voorzitter Fairspace, Binger Filmlab; bestuurslid SBF, Abraham Tuschinski Fonds, PCMI, Brein; lid sectieraad Video Stichting Leenrecht, lid Vergadering van Aangeslotenen Federatie Auteursrechtbelangen; adviseur Raad voor Cultuur. Bezoldiging stabiel t.o.v. 2023 (€39.993)." },
      { type: "instroom", rol: "Voorzitter (niet-uitvoerend)", datum: "per 1 april 2025", details: "Manon van der Hoek aangetreden als voorzitter — 1e termijn t/m 1-4-2029. Chief Commercial & Legal Officer Fremantle Northern Europe, voorzitter NCP; tevens niet-uitvoerend bestuurder SEKAM en StOPnl. Per 1-4-2025 óók aangetreden als voorzitter SEKAM. Voorgedragen door NCP+NAPA conform statuten." },
      { type: "adviseur", rol: "Bestuursadviseur", datum: "doorlopend", details: "San Fu Maltha — filmproducent, bestuurslid STK + SONT-lid — adviseur van het SKV bestuur. Uitvoerend bestuurder Ylstra vergaderde periodiek, voorafgaand aan bestuursvergadering, met bestuursadviseur Maltha." },
      { type: "adviseur", rol: "Extern juridisch adviseur", datum: "doorlopend", details: "Hugo Klaassen van DenKK Juristen treedt op als extern juridisch adviseur van het bestuur; toehoorder bij bestuursvergaderingen (geen stemrecht, geen bestuurlijke verantwoordelijkheid)." },
      { type: "bestuurssecretaris", rol: "Bestuurssecretaris", datum: "heel 2024", details: "Alexandra Parie-van Dam vervulde functie van bestuurssecretaris gedurende 2024. Géén bestuurder. (Dezelfde functie als bij zuster-CBO's StOPnl en SEKAM — gedeelde dienstverlening via SBF.)" },
      { type: "externe", rol: "SBF-directeur (toehoorder)", datum: "doorlopend", details: "Pieter Eversdijk, directeur SBF, toehoorder bij bestuursvergaderingen SKV. Tevens toehoorder bij SEKAM- en StOPnl-vergaderingen. In juni 2024 deels gezamenlijke vergadering met SEKAM en StOPnl met accountant EY om Transparantieverslagen 2023 definitief vast te stellen." },
      { type: "structuur", rol: "Monistisch/one-tier governance", datum: "sinds 2-2-2022", details: "Per 2-2-2022 na instemming CvTA one-tier bestuursmodel doorgevoerd. Drie niet-uitvoerende bestuurders (voorgedragen door NCP + NAPA) gezamenlijk verantwoordelijk voor intern toezicht + één uitvoerend bestuurder (benoemd met algemene stemmen na overleg NCP/NAPA). Governance Code CBO's VOI©E sinds 2021 normatief kader voor goed bestuur en toezicht." },
      { type: "vergaderingen", rol: "Bestuursvergaderingen 2024", datum: "5 reguliere + 1 extra", details: "Vijf reguliere online bestuursvergaderingen + 1 extra in januari (gewijd aan CFAP-evaluatie en financieel/inhoudelijk kader). Advisering door niet-uitvoerend bestuurders over CFAP-aanvragen vast agendapunt. Juni 2024: gecombineerde vergadering met SEKAM + StOPnl voor vaststelling Transparantieverslagen 2023. Overleg met accountant EY over specifieke fiscale aspecten. Q3 2024: zelfevaluatie niet-uitvoerend bestuurders (evaluatiegesprek uitvoerend bestuurder begin 2025). Q4 2024: begroting 2025 op hoofdlijnen, SoCu-bijdrage, kostendekking, beheerskosten, bestuursvergoedingen vastgesteld; periodieke risico-inventarisatie en -evaluatie." },

    incidenten: [
      { type: "contractueel", titel: "Vrijval STK-reserveringen 2019-2020 — uitkering begin 2024", impact: "€1.541.863 nabetaling geïnd door SKV eind 2023 → begin 2024 uitgekeerd aan rechthebbenden", datum: "eind 2023 ontvangen · begin 2024 uitgekeerd", detail: "STK reserveert substantieel (20%) op inning door verdeelorganisaties in afwachting definitieve vaststelling hoofdverdeelsleutel (Audio/AV/Geschriften/Beeld). Reserveringen 2019-2020 eind 2023 vrijgevallen en als nabetaling geïnd door SKV (€1.541.863) — uitgekeerd aan rechthebbenden begin 2024. Verklaart dalende rechtenopbrengst 2024 t.o.v. uitzonderlijk 2023. STK werkt met CvTA aan nieuwe hoofdverdeelsleutel-methode: mogelijke correctie achteraf 2019-2020 met bijstelling/verrekening van reeds gereparteerde gelden vanaf 2021." },
      { type: "juridisch", titel: "Hoge Raad prejudiciële vragen aan EU Hof van Justitie over tethered downloads", impact: "Vergoedingsplicht bij offline streamingkopieën nog juridisch onduidelijk — uitkomst afwachten", datum: "zomer 2024", detail: "In lopende rechtszaak heeft Hoge Raad zomer 2024 prejudiciële vragen aan Europese Hof van Justitie gesteld over de vergoedingsplicht bij offline streamingkopieën ('tethered downloads'). Uitkomsten moeten worden afgewacht. Thuiskopietarieven tot eind 2024 gepubliceerd in Staatscourant nr. 30241 (refurbished-tarieven per 1-1-2023 verlaagd). SONT-tarieven per 1-1-2025 iets verhoogd. Ontwikkeling tarieven heeft afgelopen jaren geleid tot daling incasso door STK." },
      { type: "evaluatie", titel: "GfK opdracht tot herijking genrewaardering thuiskopie-repartitiemodel", impact: "Periodieke evaluatie repartitiemodel 2018 in gang gezet; meerdere grondslagen in 2025 herijken", datum: "2024", detail: "SKV heeft in 2024 GfK opdracht gegeven tot herijking van de genrewaardering. Daarmee periodieke evaluatie huidige repartitiemodel 2018 gestart. Drie grondslagen huidige model: Uitgesteld Kijken (UgK, ondergrens 0,3% kijkdichtheid), DVD-Verkooplijsten, VOD-basisvergoeding. Bij UgK en DVD-lijsten genreweging toegepast op basis van GfK-onderzoek naar genrewaardering. Evaluatie wordt in 2025 voortgezet, meerdere grondslagen in 2025 herijken — na goedkeuring STK en CvTA doorgevoerd." },
      { type: "governance", titel: "Bestuurswissel 1-4-2025: Van der Veen → Van der Hoek als voorzitter", impact: "Eerste grote bestuursmutatie sinds invoering one-tier model", datum: "bestuursbesluit 2024 · effectief 1 april 2025", detail: "Edwin van der Veen (voorzitter sinds 2-2-2022, 1e termijn) treedt af per 1-4-2025. Manon van der Hoek treedt aan als voorzitter (1e termijn t/m 1-4-2029). Per dezelfde datum óók aangetreden bij SEKAM als voorzitter. Landsmeer (penningmeester) + Gerritsma (secretaris) + Ylstra (uitvoerend) zittend (1e termijn t/m 2-2-2026)." },
      { type: "communicatie", titel: "CFAP Prijs 2024 — 5e editie jubileumjaar", impact: "€25K hoofdprijs (verhoogd vanaf €10K) naar Rogier Kramer (Labyrinth Film)", datum: "medio oktober 2024", detail: "Vijfde editie CFAP Prijs in jubileumjaar met verhoogde hoofdprijs. Prijsuitreiking medio oktober Documentaire Paviljoen Amsterdam, presentatie Hadassah de Boer. Ruim 180 voordrachten → jury shortlist 10 producenten → bijna 500 vakgenoten-stemmen. Winnaar €25K: Rogier Kramer (Labyrinth Film). Speciale juryprijs €10K: New Producers Academy (Rotterdams initiatief 2021 met CFAP-steun door Loretta van der Horst + Claudio Montesano Casillas + Yassin Karmoudi). Shortlist 10x €5K. Jury 2024: Van der Veen (voorzitter SKV), Corine Meijers (NAPA), Michel Nelissen (NCP)." },
      { type: "regelgeving", titel: "FAIR opdracht aan SBF in 2024 · EU-richtlijn 2019/789", impact: "Mogelijk effect op SKV-inning nog niet bekend", datum: "2024", detail: "Wet ter implementatie EU-richtlijn 2019/789 Online Omroepdiensten (2021 in werking) creëerde billijke vergoedingsaanspraak alle filmmakers bij lineaire (kabel)doorgifte. Stichting FAIR (Film Auteurs In Recht) als nieuwe CBO aangewezen. In 2024 FAIR opdracht gegeven aan Servicebureau Filmrechten (SBF) om uitvoerende werkzaamheden op zich te nemen — vijfde CBO in SBF-portfolio naast SKV, SEKAM, StOPnl, Videma. Mogelijke effecten op inning door SKV nog niet bekend." },
      { type: "communicatie", titel: "Jaarlijkse informatiebijeenkomst rechthebbenden najaar 2024 Amsterdam", impact: "Keynote-presentaties BREIN + Reconfirm + uitreiking CFAP Prijs 2024", datum: "najaar 2024", detail: "Jaarlijkse openbare informatiebijeenkomst voor rechthebbenden in Amsterdam. Breed scala aan relaties en rechthebbenden. Presentatie over financiële ontwikkelingen SKV + SEKAM + StOPnl; gelegenheid tot vragen. Keynote Bastiaan van Ramshorst (nieuw aangestelde directeur BREIN) over bescherming legaal aanbod tegen illegale concurrentie inclusief impact GenAI. Presentatie Raphael de la Vienne (CTO Reconfirm) over AI en cybersecurity. Aansluitend uitreiking jaarlijkse CFAP Prijs." },
      { type: "operationeel", titel: "Nieuw digitaal identificatieproces SBF in Q1 2024", impact: "AVG-conforme verwerking · positieve gebruikersfeedback", datum: "Q1 2024", detail: "SBF implementeerde eerste kwartaal 2024 nieuw digitaal proces voor registratie rechthebbenden. Verwerking persoonsgegevens conform AVG. Gebruikersfeedback positief. Onderdeel doorlopende AVG-/security-verbeteringen." },

    duurzaamheid: [
      { sdg: "CFAP — bijdrage aan audiovisuele productiesector", detail: "Cultureel Fonds Audiovisuele Producenten (CFAP) sinds fusie 2023 binnen SKV gecontinueerd. In 2024 €212.522 beschikbaar gesteld aan CFAP (6% van rechteninkomsten) voor sociaal-culturele en educatieve projecten, piraterij-bestrijding, en CFAP Prijs. Totaal toekenningen €356,6K: €226K projectaanvragen + €50K piraterij-project + €80K CFAP Prijs jubileumjaar. Begunstigden o.a. NBD Biblion Biblioscoop (€50K), TV Academy (€40K), Kaboom Benelux Animation Pitch (€35K), Cinekid Medialab (€30K), Een van de Jongens Impact Lab II (€30K), Qissa Agentschap & community AV (€30K), NFF NFFxSeries Gouden Kalf (€25K). Nieuw CFAP-reglement begin 2024 — NAPA/NCP uitgesloten van aanvragen. SoCu-inhouding verlaagd naar 6% na fusie." },
      { sdg: "Bijdrage NCP + NAPA €154K · structureel + incidenteel arbeidsmarktbeleid", detail: "Bijdrage beroepsorganisaties 2024: €153.937 (4,35% van STK-gelden). Plus 'incidentele collectieve bestedingen' van €30.000 per organisatie (NCP + NAPA elk) voor nieuwe arbeidsmarktbeleid-projecten: ontwikkelen begrippenkader, implementeren praktijkinstrumenten Leidraad Veilig en Gezond Werken én Fair Pay. Totaal bijdragepercentage 4,7% (stabiel t.o.v. 2023)." },
      { sdg: "Internationale samenwerking · Eurocopya + MPA", detail: "Nauwe contacten met Motion Picture Association (MPA). Lid van Eurocopya (internationale organisatie voor Europese audiovisuele producenten-collectief rechtenbeheer). Eurocopya bevordert bilaterale afstemming over rechtenbeheer tussen landen. Samenwerking met 16 buitenlandse zusterorganisaties voor wederzijdse thuiskopie-claims (Australia, Austria, Canada, Denmark, Germany, Hungary, Poland, Spain, Sweden, Switzerland, USA — waaronder MPAA, België, Frankrijk). Ontvangen buitenland 2024: €442K · uitgekeerd buitenland (MPAA via STK): €691K." },
      { sdg: "Representativiteit ≥95% · 383 rechthebbenden gereparteerd", detail: "Bestuur schat ≥95% van rechthebbenden heeft zich geregistreerd — alle op reguliere basis opererende audiovisuele producenten, inclusief omroepen in hun hoedanigheid van (co-)producent. 383 rechthebbenden ontvingen in 2024 een repartitie. Aansluiting bij SKV niet verplicht (vergoeding volgt rechtstreeks uit Auteurswet); registratie wel noodzakelijk voor uitkering. Niet-uitvoerend bestuurders beslissen over bestemming van gelden die na 3 jaar onverdeelbaar blijven." },
      { sdg: "Informatiebijeenkomst + FReD-portal + website-transparantie", detail: "Jaarlijkse openbare informatiebijeenkomst rechthebbenden in Amsterdam (najaar 2024). SKV betaalt maandelijks vergoedingen zodra gelden ontvangen van STK, SLR en buitenlandse zusterorganisaties. Frequentie: thuiskopie alle 4 kwartalen + leenrecht Q3-Q4 + buitenland alle 4 kwartalen. Via FReD-portal direct inzicht status betalingen. Op website openbare informatie over niet-verdeelbare gelden (versnelde afhandeling via SBF). Q&A-sectie beschrijft procedures voorkomen/oplossen dubbelclaims. SBF informeert rechthebbenden over dubbelclaim-reserveringen." },

    claims: {
      aantal: "Geen geschillen of incidenten in 2024 · geen gerealiseerde risico's",
      trend: "Expliciete verklaring bestuursverslag §7 'Risicobeheersing in 2024': 'Geen van de geïdentificeerde risico's heeft zich in het afgelopen jaar voorgedaan. Er waren geen verstoringen in relaties met rechthebbenden en hun vertegenwoordigers; er zijn geen vaste medewerkers vertrokken bij SBF; er hebben zich geen IT-storingen voorgedaan; en er is geen sprake geweest van overtredingen van wet- en regelgeving of van bestuurlijke conflicten. Ook is er geen negatief resultaat geboekt over het boekjaar.' Meldregeling voor vermoeden misstand/integriteitsschending sinds 2023 vastgesteld.",
      formeel: "Geen geweigerde licenties in 2024 (wettelijke verplichte vermelding; SKV licentieert niet — int via STK en SLR). Aanspraken verjaren na 3 kalenderjaren. Verplichting ter zake doorbetaling is inclusief naclaimreserve 10% van thuiskopiegelden — binnen 2 jaar na afsluiting repartitiejaar afgewikkeld. Niet binnen 5 kalenderjaren volgend op jaar van inning door STK uitgekeerde naclaim-gelden worden pro rato aan rechthebbenden uitgekeerd. Niet-uitvoerend bestuurders beslissen over bestemming na 3 jaar onverdeelbare gelden. Ongebruikte CFAP-gelden komen 5 jaar na afsluiting boekjaar vrij ten gunste van verdeling onder rechthebbenden (besluit 2023 bestuur: vrijval tot boekjaar 2021). Repartitiereglement STK vastgesteld 2018, goedgekeurd CvTA+STK; SLR-reglement goedgekeurd 2021.",

  PRO: {
    jaar: 2024,
    publicatie: "7 juli 2025",
    bron: "Jaarverslag 2024 Stichting Publicatie- en Reproductierechten Organisatie (PRO) — goedkeurende controleverklaring Flynth Audit B.V. (L.J.M. Schram RA), Utrecht 7 juli 2025",
    headline: "Recordrepartitie €19,1M (+6,6%) — hoogste bedrag ooit aan uitgevers uitgekeerd · rechtenopbrengst €18,2M (-2,8%) · Reprorecht +14% naar €13,1M door incidentele meevallers · Thuiskopie -52% naar €1,9M na normalisatie 2023-piek · Leenrecht stabiel €3,2M · bedrijfslasten +15% naar €734K (personeel +6%, FTE 2,7→3,1, BREIN-financiering +56%) · stelselwijziging presentatie admin.vergoeding · €200K onttrekking eigen vermogen naar te verdelen rechten · nieuwe voorzitter Bernt Schneiders per januari 2024 · nieuw bestuurslid Ariën Prins (sectie Thuiskopie) · afscheid Arno Reekers (max zittingstermijnen) · strategisch plan 2025–2027 afgerond · nieuwe website en nieuw logo · separate sectie Thuiskopie opgericht (was onderdeel PRO Mandaat) · enquête rechthebbenden: 7,6 belangenbehartiging / 8,2 facturen / 7,2 transparantie kosten · 926 uitgekeerde uitgevers (was 1.180, -21%) · ketenkosten Reprorecht 17% (net boven norm 15%) door fijnmazige facturatie · Hoofdlijnenakkoord Reprorecht II meegetekend",
    strategie: {
      naam: "Strategisch plan 2025–2027 — eerlijk, transparant en efficiënt verdelen",
      samenvatting: "In 2024 is het strategisch plan voor 2025–2027 succesvol afgerond — volgens voorzitter Schneiders 'een heldere en ambitieuze koers'. Uitgevers en rechthebbenden zijn actief betrokken via enquêtes (belangenbehartiging 7,6 / facturen 8,2 / transparantie kosten 7,2). Kern van de koers: optimale incasso faciliteren bij de drie incasserende CBO's, gelden eerlijk en efficiënt verdelen onder uitgevers, en uitgevers beter en transparanter informeren over de collectieve regelingen. In 2025 evalueert PRO de portals en bijbehorende processen; het bestuur heeft tevens de ambitie om de risicoanalyse verder uit te werken.",
      fases: [
        { titel: "Fase 1 · Nieuwe technische basis website + rebrand", periode: "2024 afgerond", focus: "Implementatie nieuwe technische basis voor website, vernieuwde vormgeving communicatiemiddelen, en krachtig nieuw logo dat uiting geeft aan waarden en ambities. Nieuwe website live december 2024. Persoonlijk uitgeversoverzicht beschikbaar in portal sinds januari 2024." },
        { titel: "Fase 2 · Separate sectie Thuiskopie", periode: "vanaf 2024", focus: "Sinds 2018 keerde PRO thuiskopiegelden uit; aanvankelijk nam sectie PRO Mandaat deze taak op zich. Vanaf 2024 is er een aparte sectie Thuiskopie met Prins (voorzitter), Schinkel, Kropman en David (juridisch adviseur). Sectie vergadert tweemaal per jaar. Benoeming door betrokken organisaties en stakeholders (uitgevers nieuwsmedia en magazines)." },
        { titel: "Fase 3 · Evaluatie portals en processen", periode: "2025", focus: "Evaluatie van de PRO-portals (waar uitgevers omzet opgeven voor reprorecht/thuiskopie en uitleningen controleren voor leenrecht) en de bijbehorende operationele processen. Parallel: in kaart brengen hoe werkprocessen efficiënter ingericht kunnen worden om kosten structureel onder controle te houden." },
        { titel: "Fase 4 · Risicoanalyse verder uitwerken", periode: "vanaf 2025", focus: "Bestuur heeft ambitie om risicoanalyse (voor het eerst vastgesteld in 2023 en jaarlijks geëvalueerd) in meer detail uit te werken. Onderdelen: strategisch, governance, financieel, operationeel. Risicobereidheid van de stichting getypeerd als 'risicomijdend'." },
      ],
    },
    trends: [
      { titel: "Recordrepartitie €19,1M (+6,6%) — hoogste ooit", richting: "up", impact: "P", detail: "€17,93M (2023) → €19,11M (2024). 'Niet eerder werd er zo'n hoog bedrag aan uitgevers aangeboden.' Samenstelling: rechthebbenden €18,79M (was €17,73M) · NL CBO's €234K (was €123K) · buitenlandse CBO's €88K (was €76K). Per regeling: Reprorecht €13,22M (+15%) · Leenrecht €3,08M (stabiel) · Thuiskopie €2,81M (-10%, incl. €883K vrijval Thuiskopie-reservering 2019–2020 uit eind 2023 die in 2024 is verdeeld). Recorduitkering 'met name veroorzaakt door de incidenteel hoge incasso vanuit Reprorecht'." },
      { titel: "Rechtenopbrengst -2,8% naar €18,25M (normalisatie)", richting: "down", impact: "A", detail: "€18,76M (2023) → €18,25M (2024). Ontvangen van NL CBO's €18,09M (was €18,47M) · buitenland €159K (was €290K). 2023-niveau was incidenteel hoog door eenmalige vrijval reservering binnen Thuiskopie. PRO gaat op jaarbasis uit van incasso rond €17,5M — 2024 dus bovengemiddeld. Per regeling: Reprorecht €13,09M (+14%) · Leenrecht €3,24M (stabiel) · Thuiskopie €1,92M (-52%)." },
      { titel: "Reprorecht-incasso +14% naar €13,09M (incidentele meevallers)", richting: "up", impact: "P", detail: "€11,47M (2023) → €13,09M (2024). 'Door enkele incidentele meevallers bij Reprorecht steeg deze incasso met €1,6 mln.' Binnen Reprorecht is in 2024 akkoord bereikt op geactualiseerde gebruiksvoorwaarden én nieuwe verdelingen per categorie; tevens 50/50 verdeling tussen makers en uitgevers overeengekomen tussen PRO, Lira en Pictoright. Herverdeling per categorie: vak/studie/wetenschappelijk tekst 10% · vaktijdschriften tekst 18% · schoolboeken tekst 21% · kranten tekst 11% · beeld-categorieën totaal ca 34%." },
      { titel: "Thuiskopie-incasso -52% naar €1,92M (normalisatie)", richting: "down", impact: "A", detail: "€4,02M (2023) → €1,92M (2024). Twee oorzaken: (1) CvTA-goedkeuring van de door HP/Reprobelfix geconsolideerde 50/50-verdeling makers/uitgevers — Thuiskopie kon de nieuwe verhouding in 2024 toepassen op inclusief incassojaren 2021–2022, wat in 2023 de €4M-piek had opgeleverd (met terugwerkende kracht); (2) overeenstemming over beschikbaar stellen deel gereserveerde gelden 2019–2020 van €883K, in 2023 kort voor jaareinde aangeboden en alsnog in 2024 verdeeld. 2024 weer 'normaal jaar' voor thuiskopiegelden — uitgevers verzekerd van stabiele inkomstenstroom." },
      { titel: "Leenrecht-incasso stabiel €3,24M (neerwaartse trend uitleningen)", richting: "flat", impact: "A", detail: "€3,27M (2023) → €3,24M (2024). Aantal uitleningen door bibliotheken daalt minder sterk dan in voorgaande jaren maar blijft dalend; structurele druk door bibliotheeksluitingen, niet-meer-afrekenen van verlengingen en verschuiving naar e-books (die buiten Leenrecht om worden afgerekend met individuele uitgevers). Stabilisatie verklaard door indexatie van tarieven per uitlening (vastgesteld door StOL). Ministerie OCW compenseert uitleningen via schoolbibliotheken (dBoS-regeling): uitgeversaandeel €506K in 2024." },
      { titel: "Bedrijfslasten +15% naar €734K (stijging personeel + BREIN)", richting: "up", impact: "A", detail: "€639K (2023) → €734K (2024). Cedar-kosten €373K → €436K (+17%): personele inzet €238K → €281K (personele lasten +6% in 2024, 0,4 FTE meer), huisvesting €18K → €20K, automatisering €75K → €93K. Kosten bestuur en toezicht €49K → €42K. Advies €51K → €47K. Contributies/bijdragen €84K → €131K (+56%): bijdrage BREIN €56K → €100K door aangepaste financieringsstructuur voor piraterijbestrijding door de gehele branche. 'Gestegen financiering aan Brein is verantwoordelijk voor de helft van de totale kostenstijging.' Verwachting: BREIN-kosten komende jaren stabiel." },
      { titel: "FTE 2,7 → 3,1 (+15%) via Cedar", richting: "up", impact: "A", detail: "Gemiddelde personele inzet via Cedar: 2,7 FTE (2023) → 3,1 FTE (2024). 'Toenemende complexiteit van de verdeling van de gelden vraagt om uitbreiding van de administratieve ondersteuning.' Deel van inzet komt door inwerken nieuwe medewerkers 'waardoor de operatie minder efficiënt is dan voorgaande jaren'. Tegelijkertijd wordt in kaart gebracht hoe werkprocessen efficiënter ingericht kunnen worden. Begroting 2025: verdere toename personele kosten voorzien." },
      { titel: "Baten +14% naar €927K (volgt recordrepartitie)", richting: "up", impact: "P", detail: "€810K (2023) → €927K (2024). Samenstelling: administratievergoeding €814K (was €810K) + inhouding BREIN €113K (was €0 — nieuwe afzonderlijke presentatie van de 0,6% extra inhouding voor antipiraterij-activiteiten). Administratievergoedingen worden ingehouden op gelden die aan rechthebbenden worden aangeboden. Feitelijke inhoudingen: Reprorechtregeling 3% · Thuiskopie 7,5% · Leenrecht 7,5% (dBoS-gelden afwijkend 3,5%). Stijging baten 'direct gevolg van de recorduitkering' — €1M meer uitgekeerd dan vorig jaar." },
      { titel: "Financieel resultaat +217% naar €111K (rente)", richting: "up", impact: "P", detail: "€35K (2023) → €111K (2024) · begroot slechts €10K. 'Door de opgelopen rente op banktegoeden gedurende 2024 is het financieel resultaat substantieel hoger dan bij het opstellen van de begroting ingeschat kon worden.' Liquide middelen ultimo 2024: €1,55M (was €2,12M) — €1,54M op spaarrekeningen, €2K op bank. Daling door €569K negatieve netto-kasstroom (repartitie €19,1M versus rechtenopbrengst €18,2M + €200K EV-onttrekking). Begroting 2025: €30K rentebaten — neerwaarts verwacht." },
      { titel: "Resultaat €304K (was €206K) — fors positief tegen ambitie kostenneutraal", richting: "up", impact: "A", detail: "Saldo baten/lasten €193K + financieel resultaat €111K = netto €304K. Begroting 2024 was €71K (+€61K saldo + €10K rente). 'De ambitie is om jaarlijks een kostenneutrale exploitatie te begroten en te realiseren. Dit jaar is er echter een flink positief resultaat gerealiseerd.' Oorzaken: hogere vergoeding Reprorecht + flink meer rentebaten. Toegevoegd aan algemene reserve. EV-doelstelling: 1,0–1,5× jaarlijkse lasten (waarbij rekening wordt gehouden met mogelijk te verdelen gelden). Bij overschrijding 1,5× vloeit overschot terug naar te verdelen rechten (zie €200K-onttrekking 2024)." },
      { titel: "Uitgekeerde uitgevers -21% naar 926 (was 1.180)", richting: "down", impact: "A", detail: "Aantal vertegenwoordigde rechthebbenden onveranderd 1.310. Aantal dat in 2024 een uitkering ontving daalde fors: 926 (was 1.180). Toelichting: 'Het aantal uitgevers dat een vergoeding ontvangt is gedaald naar 926.' Met name bij dBoS-leenrechtgelden veel uitgevers onder grensbedrag €50: van 427 uitgevers in dBoS-verdeling kregen er slechts 156 uiteindelijk uitkering (rest onder bagatellenregeling). Ontvangers per branche: 28% vak/studie/wetenschappelijk · 24% kranten/nieuwsmedia · 23% schoolboeken · 18% algemene boeken · 7% publiekstijdschriften · 0% multimedia." },
      { titel: "Ketenkosten Reprorecht 17% — net boven 15%-norm", richting: "flat", impact: "A", detail: "Uitbetaling reprogelden: inhouding 3,0% bij PRO; inhouding 14% bij Stichting Reprorecht zelf → totale ketenkosten ca 17%, boven gewenste 15%. Verklaring: 'fijnmazige facturatie door Stichting Reprorecht met groot aantal gefactureerde relaties en relatief lage gemiddelde factuurbedragen'. Overige ketens binnen norm: Leenrecht 7,5% (PRO) + 6% (SLR) = 13,5% · Thuiskopie 7,5% (PRO) + 5% (STK) = 12,5%. Kostennorm en ketenkosten getoetst door toezichthoudend bestuur met sectie-ondersteuning." },
      { titel: "Algemene reserve +€104K netto naar €1,09M (€200K EV-onttrekking)", richting: "flat", impact: "P", detail: "€990K (1/1/2024) → €1,09M (31/12/2024). Mutatie: +€304K (resultaat) -€200K (onttrekking naar te verdelen rechten). Methode EV-onttrekking: rechtstreeks via vermindering algemene reserve naar te verdelen rechten (niet via staat van baten en lasten) — 'op vergelijkbare wijze als uitkeringen aan belanghebbenden bij andere rechtspersoonsvormen'. Doel EV: 1–1,5× jaarlijkse lasten. Gebruikt voor extra uitkering aan rechthebbenden zonder verstoring exploitatierekening." },
      { titel: "Begroting 2025: bijna kostenneutraal · resultaat €37K", richting: "flat", impact: "A", detail: "Baten €734K (alleen admin.vergoeding; BREIN-inhouding apart). Lasten €727K: Cedar €440K · bestuur/toezicht €48K · adviseurs €52K · contributies/bijdragen €120K · overige €67K. Saldo €7K · financieel resultaat €30K · resultaat €37K. Toenemende complexiteit verdeling vraagt uitbreiding administratieve ondersteuning; parallel kosten onder controle houden via efficiëntie-analyse werkprocessen." },
    ],
    risicos: [
      { cat: "Regeling", sev: "W", titel: "Thuiskopieregeling 'vrijwel continu onder vuur'", detail: "Expliciete kader-tekst: 'De thuiskopieregeling ligt de afgelopen jaren vrijwel continu onder vuur.' (1) Discussie over implementatie Europese richtlijnen door NL-wetgever: 'er wordt bij elke herziening serieus overwogen om het verbodsrecht in te voeren om af te zijn van deze heffing'. (2) Onenigheid over wijze waarop gebruikers privékopieën maken, op welke apparaten, in hoeverre onder thuiskopie-exceptie. (3) Gebruik verandert dermate snel dat 'veel rechtszaken over de thuiskopieheffing zijn gevoerd en nog steeds gaande zijn, zowel op nationaal als internationaal niveau'. (4) Binnen Thuiskopie discussie verdeelsleutel (welke rechthebbendengroepen, welk aandeel) nog niet afgerond." },
      { cat: "Regeling", sev: "W", titel: "Leenrechtregeling structureel onder druk", detail: "'Rechtenopbrengst vanuit leenrechtregeling staat structureel onder druk.' (1) Al jaren dalend aantal uitleningen openbare bibliotheken. (2) Veel kleine bibliotheekvestigingen gesloten door bezuinigingen. (3) Verlengingen niet langer afgerekend. (4) Groei e-book-uitleningen, maar deze digitale uitleningen worden direct afgehandeld met individuele uitgevers en Lira (voor auteurs) — niet via Stichting Leenrecht. Totale incasso 'wel redelijk stabiel' door jaarlijkse indexatie tarieven + dBoS-compensatie OCW (€506K in 2024)." },
      { cat: "Strategisch", sev: "A", titel: "Afhankelijkheid wet- en regelgeving en (technologische) ontwikkelingen", detail: "Risicoregister: 'Stichting PRO is sterk afhankelijk van wet- en regelgeving op auteursrechtelijk gebied, alsmede van (technologische) ontwikkelingen in het gebruik van auteursrechtelijk beschermde werken.' Hierbij horen AI-ontwikkelingen die door uitgevers in enquête expliciet als aandachtspunt zijn genoemd naast digitale verspreiding. Geen concrete Stichting PRO-maatregelen gerapporteerd — signalering blijft op strategisch niveau." },
      { cat: "Operationeel", sev: "A", titel: "Afhankelijkheid Cedar als uitvoeringsorganisatie", detail: "Volledige operationele uitvoering ondergebracht bij Cedar B.V. via dienstverleningsovereenkomst. 'Stichting PRO maakt gebruik van de dienstverlening van Cedar, waarbij gebruik gemaakt wordt van complexe geautomatiseerde systemen. De beschikbaarheid en betrouwbaarheid van deze systemen is van groot belang.' Niet-uit-balans-blijkende verplichting bij beëindiging DVO: €110K (2023: €132K) conform vastgestelde berekeningswijze — opvraagbaar na opzegging. Cedar verzorgt ook tekenbevoegdheid voor bankrekeningen. Stichting PRO vertegenwoordigd in bestuur Stichting Cedar (aandeelhouder Cedar B.V.)." },
      { cat: "Perceptie", sev: "A", titel: "'Zwarte-doos'-perceptie bij uitgevers — uit enquête eind 2024", detail: "Enquête onder groot deel rechthebbenden eind 2024. Hoewel scores gemiddeld positief (belangenbehartiging 7,6 · facturen/uitleg kosten 8,2 · transparantie kosten 7,2), expliciete kritiek genoteerd: 'Voor [ons] is de berekening van de vergoeding eigenlijk een black-box. We geven jaarlijks de benodigde info door en dan is het afwachten wat de uitkomst is.' Ook behoefte aan 'meer gedetailleerde informatie op onze factuur, waaronder overzicht van administratiekosten per titel of regel'. PRO gaat 'uiteraard met deze conclusies aan de slag'." },
      { cat: "Governance", sev: "A", titel: "Complexe governance-structuur — 3 secties + PRO Mandaat", detail: "Bestuur + directiemodel sinds WTCBO-wijziging 2016. Drie aparte secties (PLU Leenrecht · Thuiskopie sinds 2024 afzonderlijk · PRO Mandaat Reprorecht). Sectievoorzitters + onafhankelijk voorzitter vormen toezichthoudend bestuur. Elke sectie eigen overlegstructuur + begroting. Sectieleden benoemd door verschillende groepen binnen Mediafederatie: Groep Media voor Vak en Wetenschap, Groep Educatieve Uitgeverijen, NDP Nieuwsmedia, Groep Algemene Uitgevers, Groep Media Magazine Associatie, Vereniging van Muziekuitgevers. Complexiteit geadresseerd in zelfevaluatie: e.e.a. 'als bureaucratisch bestempeld'." },
      { cat: "Financieel", sev: "P", titel: "Risicomijdend middelenbeheer — Statuut middelenbeheer", detail: "Bestuur heeft Statuut middelenbeheer vastgesteld. 'Met betrekking tot het beheerde vermogen is gekozen voor een risicomijdend middelenbeheer.' Beoordelingscriteria afgeleid van Wet FIDO (Wet Financiering Decentrale Overheden). Gelden direct opeisbaar bij meerdere grote NL-banken; verdeeld over bankrekeningen €2K en spaarrekeningen €1,54M. Geen obligaties of deposito's (anders dan bij vergelijkbare distributeur-CBO's). Bij beleggingsproducten vereist 'grote mate van zekerheid met betrekking tot het garanderen van de hoofdsom op einddatum'. Uitvoering via Cedar (tekenbevoegd); verantwoordelijkheid bij directie PRO + controller Cedar." },
      { cat: "Governance", sev: "P", titel: "Geen tegenstrijdige belangen in 2024 · WNT binnen norm", detail: "'In het verslagjaar hebben zich geen kwesties van mogelijk tegenstrijdige belangen voorgedaan.' Bestuursleden (met uitzondering onafhankelijk voorzitter) voeren taak onbezoldigd uit — geen vergoedingen of vacatiegelden van PRO. Bestuursleden ontvangen 'niet persoonlijk geld uit onze repartitie' maar werken bij uitgevers die wél uitgeversaandeel ontvangen. WNT-toetsing: directeur Pijnacker €79K (max €105K bij 0,45 FTE via Cedar). Voorzitter Schneiders €15K (max €35K). Overige bestuursleden Bon/Hoek/Jonkers/Reekers <€2.100." },

    technologie: [
      { project: "Nieuwe technische basis website + rebrand", status: "Live december 2024", detail: "Implementatie nieuwe technische basis voor website, vernieuwde vormgeving communicatiemiddelen, en krachtig nieuw logo. Oude logo (met boom) vervangen door nieuw beeldmerk in PRO-huisstijl. 'Geeft uiting aan onze waarden en ambities.' Onderdeel van strategisch plan 2025–2027." },
      { project: "Persoonlijk uitgeversoverzicht in PRO-portal", status: "Live januari 2024", detail: "Uitgevers kunnen persoonlijk uitgeversoverzicht downloaden in portal — met overzicht van alle ontvangen vergoedingen per regeling en categorie. Onderdeel van voortdurende verbetering informatievoorziening. Uit enquête: behoefte aan meer gedetailleerde factuurinformatie (overzicht administratiekosten per titel of regel) — verder werk aan de winkel." },
      { project: "PRO/UvO-podcast", status: "Actief sinds mei 2024", detail: "Mei 2024: interview met Hanneke Holthuis (Pictoright). Onderdeel van communicatiestrategie om rechthebbenden beter te informeren over vergoedingen naast nieuwsbrief en individuele gesprekken." },
      { project: "Portal-evaluatie + procesverbeter-traject", status: "Gepland 2025", detail: "PRO evalueert in 2025 de portals en processen die daarmee samenhangen. Uitgevers gebruiken de portal om omzet op te geven (basis voor verdeelsleutel reprorecht/thuiskopie) en om controlespecificaties leenrecht na te lopen. Doel: werkprocessen efficiënter inrichten om kosten onder controle te houden." },

    ai: {
      positie: "AI is niet expliciet als eigen risico of kernproject benoemd in het bestuursverslag, maar komt indirect naar voren. In de enquête onder rechthebbenden eind 2024 is 'aandacht voor nieuwe ontwikkelingen zoals AI en digitale verspreiding' genoemd als expliciet aandachtspunt waar PRO 'de komende tijd actief mee aan de slag' gaat. In de risicoanalyse is de afhankelijkheid van '(technologische) ontwikkelingen in het gebruik van auteursrechtelijk beschermde werken' als strategisch risico benoemd — zonder specifieke AI-invulling of concrete maatregelen. Operationele AI-projecten zouden via Cedar ontwikkeld worden (zoals bij Leenrecht).",
      principes: [

        "Onderdeel strategisch risico '(technologische) ontwikkelingen in gebruik van auteursrechtelijk beschermde werken'",
        "Commitment: betere en transparantere informatievoorziening aan uitgevers over collectieve regelingen — ook bij nieuwe vraagstukken",

    },
    governance: [
      { type: "instroom", rol: "Onafhankelijk voorzitter", datum: "per januari 2024", details: "B. Schneiders nieuw aangetreden als onafhankelijk voorzitter, 1e termijn t/m januari 2027. Jurist met achtergrond openbaar bestuur: directeur Stichting VSBfonds, voormalig burgemeester van Haarlem. Toezichthouder in diverse sectoren: Raad van Commissarissen Woonzorg Nederland, president-commissaris PWN N.V., voorzitter Monitoringscommissie Landelijke Eenheid Nationale Politie, voorzitter Raad van Toezicht Spaarne Ziekenhuis, voorzitter Stichting Leefomgeving Schiphol. Onbezoldigd: Bevrijdingspop Haarlem, Lokale Omroep Haarlem 105, Weeshuis Doopsgezinden Haarlem, Voedselbank Haarlem. Bezoldiging PRO 2024: €15.000 (max €34.950)." },
      { type: "instroom", rol: "Bestuurslid sectie Thuiskopie", datum: "december 2024", details: "A. Prins nieuw aangetreden, 1e termijn t/m december 2027. Teamleider dataredactie DPG Media Nederland, journalist AD.nl. Ervaring als journalist, redactiechef en projectmanager in uitgeverswereld. 'Zorgt voor een frisse kijk op het bestuur en de organisatie.' Tevens voorzitter nieuwe sectie Thuiskopie." },
      { type: "vertrek", rol: "Bestuurslid", datum: "2024", details: "A.J. Reekers afgetreden omdat hij het maximaal aantal zittingstermijnen heeft gediend. 'Het bestuur is de heer Reekers veel dank verschuldigd voor zijn inzet.' Bezoldiging 2024: <€2.100." },
      { type: "zittend", rol: "Bestuurslid sectie Reprorecht / penningmeester", datum: "t/m juli 2026 (1e termijn)", details: "P.H. Bon bestuurslid PRO (onbezoldigd) + voorzitter sectie PRO Mandaat (Reprorechtgelden) + bestuurslid Stichting Reprorecht (bezoldigd) + lid Presidium Reprorecht + senior uitgever Wolters Kluwer. Nevenfuncties volledig transparant gepubliceerd." },
      { type: "zittend", rol: "Bestuurslid sectie Leenrecht", datum: "t/m juli 2026 (1e termijn)", details: "J.M. Hoek bestuurslid PRO (onbezoldigd) + operationeel directeur Singel Uitgeverijen (bezoldigd) + sectielid PLU (Leenrechtgelden)." },
      { type: "directeur", rol: "Directeur", datum: "doorlopend", details: "B. Pijnacker (in loondienst Cedar, doorbelast via functietarief). Bezoldiging 2024: €79.185 bij 0,45 FTE (max €104.850 binnen WNT). Directeur is tevens bestuurslid van VOI©E." },
      { type: "sectie", rol: "Sectie PLU (Leenrecht)", datum: "samenstelling 2024", details: "Sinds 1996. Voorzitter F.H. Jonkers + leden M. van Campen, J.J. Keijzer, M. David (juridisch adviseur namens Mediafederatie), J. Hoek. Benoeming door Groep Algemene Uitgevers Mediafederatie (algemene/kinderboeken doorgaans meest uitgeleend). Vergadert 2× per jaar. Verdeelt 30% leenrechtvergoeding (uitgeversdeel)." },
      { type: "sectie", rol: "Sectie PRO Mandaat (Reprorecht)", datum: "samenstelling 2024", details: "Voor werving/beheer uitgever-mandaten voor digitaal hergebruik bedrijfsleven (sinds 2013). Voorzitter P. Bon + leden C. Balk, J. Duurinck, E. Janssen, G.J. Schinkel, J. Leenaars, I. Terpstra. 8 uitgeversvertegenwoordigers — idem samenstelling als Toezichthoudend Bestuur Reprorecht. Benoeming door Mediafederatie (3× MEVW, 1× GEU, 1× NDP, 1× GAU, 1× MMA, 1× NMUV). >500 uitgevers mandaat via PRO — vrijwaart Reprorecht 100% behalve blacklist. Hoofdlijnenakkoord Reprorecht II meegetekend 2024." },
      { type: "sectie", rol: "Sectie Thuiskopie (nieuw)", datum: "separate sectie sinds 2024", details: "Voorheen onderdeel PRO Mandaat. Separate sectie sinds 2024. Voorzitter A. Prins + leden G.J. Schinkel, A. Kropman, M. David (juridisch adviseur). Vergadert 2× per jaar. Benoeming door betrokken organisaties (uitgevers nieuwsmedia en magazines)." },
      { type: "zelfevaluatie", rol: "Bestuur · zelfevaluatie 2025 over 2024", datum: "in 2025 uitgevoerd", details: "Prettige en professionele samenwerking; geen potentiële tegenstrijdige belangen in 2024. Bestuur positief over scheiding toezicht/uitvoering, samenstelling (evenwichtig, divers), contact externe belanghebbenden, rooster van aftreden (up-to-date). Vergaderfrequentie 4×/jaar als voldoende beoordeeld. Voorzitter Schneiders 8 gemiddeld. Directeur Pijnacker 8. Dienstverlening Cedar 8. Governance-aspecten goed beoordeeld — wel 'e.e.a. als bureaucratisch bestempeld'. Belangrijke verbetering t.o.v. vorig jaar: alle leden op de hoogte van aansprakelijkheidsverzekering. Geen verbeterpunten aangedragen." },
      { type: "reglement-evaluatie", rol: "Repartitiereglementen Reprorecht + Leenrecht geëvalueerd", datum: "verslagjaar 2024", details: "Driejaarlijkse evaluatie — slechts enkele tekstuele wijzigingen voorgesteld. Proces om wijzigingen door te voeren aangehouden. Reglementen worden opnieuw geëvalueerd in 2026. Alle repartitiereglementen beschikbaar via website." },

    incidenten: [
      { type: "stelselwijziging", titel: "Stelselwijziging presentatie administratievergoeding", impact: "Geen invloed op resultaat of eigen vermogen · vergelijkende 2023-cijfers aangepast", datum: "per boekjaar 2024", detail: "Bij uitkering in te houden administratievergoeding wordt niet langer in mindering gebracht op te verdelen rechten en apart gepresenteerd onder overlopende passiva. 'Omdat over te verdelen rechten verder steeds over bruto bedragen wordt gesproken is besloten deze presentatie te wijzigen.' Presentatie sluit beter aan bij brancheusance. Parallel uitgevoerd bij Reprorecht, Leenrecht en andere gelieerde CBO's." },
      { type: "EV-mutatie", titel: "€200K onttrekking algemene reserve naar te verdelen rechten", impact: "EV-afbouw via rechtstreekse onttrekking · gelijkwaardig aan Reprorecht/Lira-patroon", datum: "bestuursbesluit 2024", detail: "Verwerking rechtstreeks via vermindering algemene reserve naar te verdelen rechten (niet via staat van baten en lasten). Parallel aan Reprorecht (€912K) en Lira (€625K). Doelstelling PRO-EV: 1–1,5× jaarlijkse lasten. Bij overschrijding 1,5× van sectie-exploitatie → overschot teruggesluisd naar rechthebbenden. Bestuur kiest voor geleidelijke afbouw i.p.v. eenmalige uitkering." },
      { type: "regeling", titel: "Separate sectie Thuiskopie opgericht (voorheen onderdeel PRO Mandaat)", impact: "Helderder governance-structuur voor Thuiskopie-uitkering; beter passend bij stakeholders nieuwsmedia/magazines", datum: "vanaf 2024", detail: "Sinds 2018 keert PRO thuiskopiegelden uit; aanvankelijk behandelde sectie PRO Mandaat deze taak. Vanaf 2024 eigen sectie met voorzitter Prins. Leden benoemd door betrokken organisaties/stakeholders uitgevers nieuwsmedia/magazines. Vergadert 2×/jaar." },
      { type: "regeling", titel: "HP/Reprobelfix-implementatie voltooid — CvTA goedkeurt 50/50-verdeling", impact: "€883K vrijval Thuiskopie-reservering 2019–2020 in 2024 verdeeld · nieuwe verhouding op incassojaren 2021–2022 toegepast", datum: "gedurende 2024", detail: "CvTA keurde nieuwe 50/50-verdelingssleutel makers/uitgevers goed — tussen PRO, Lira en Pictoright overeengekomen. Thuiskopie kon nieuwe verhouding toepassen op verdeling incl. incassojaren 2021–2022 (met terugwerkende kracht) — dit veroorzaakte de 2023-piek. Aanvullende €883.292 uit gereserveerde gelden 2019–2020 eind 2023 aangeboden; in 2024 aan reguliere repartitie toegevoegd. 2024 weer 'normaal jaar' voor thuiskopiegelden." },
      { type: "afspraak", titel: "Hoofdlijnenakkoord Reprorecht II getekend (mandaatpartner)", impact: "Meerjarenafspraken met Reprorecht over samenwerking en uitkering + 50/50 makers/uitgevers + regeling Zakelijk per 2025 uitgebreid + verdeelmatrix geactualiseerd", datum: "2024 getekend", detail: "Na 2 jaar voorbereiding (Verian-onderzoek 2022–2023) heeft PRO samen met Lira, Pictoright en FEMU het Hoofdlijnenakkoord II met Reprorecht getekend. Vernieuwde mandaatovereenkomsten + aanwijzingsovereenkomsten. Verdeelmatrix geactualiseerd per 2024 op basis marktonderzoek. Uitbreiding regeling Zakelijk per 2025 met presentaties, vertoon presentaties + internet-content. CvTA-goedkeuring verkregen." },
      { type: "regeling", titel: "dBoS-compensatie OCW voor schoolbibliotheken: uitgeversaandeel €506K", impact: "Compenseert structureel wegvallende leenrecht-incasso door bibliotheek-op-school-regeling · 1% reservering voor potentiële claims", datum: "verslagjaar 2024", detail: "Openbare bibliotheken brengen collectie onder bij schoolbibliotheken (dBoS), die wettelijk vrijgesteld zijn van leenrechtvergoeding. Ministerie OCW stelt wederom vergoeding beschikbaar. Uitgeversaandeel: €506K. Verdeling gebaseerd op data openbare bibliotheken over werken die dBoS-collecties vormen (geen data schoolbibliotheek-uitleningen zelf beschikbaar). Inhoudingspercentage 3,5% (afwijkend van reguliere 7,5% Leenrecht). Uitkering aan 156 uitgevers van 427 in dBoS-bronbestand (rest onder bagatellenregeling <€50). Reservering 1% voor claims." },
      { type: "communicatie", titel: "Uitgevers-enquête eind 2024 (eerste grootschalige peiling)", impact: "Input voor strategisch plan 2025–2027 · strategische koersbepaling", datum: "eind 2024", detail: "Enquête onder groot deel rechthebbenden. Scores: belangenbehartiging 7,6 · facturen/uitleg kosten 8,2 · transparantie kosten 7,2. Drie kernpunten voor verbetering: meer gedetailleerde factuurinformatie (per titel/regel admin.kosten) · meer handvatten om vergoedingen in te schatten (reduceert 'black-box'-perceptie) · aandacht nieuwe ontwikkelingen AI en digitale verspreiding. Specifiek onderzoek gedaan bij groep uitgevers die niet participeerde in thuiskopieverdeling — input gebruikt om dienstverlening te verbeteren." },
      { type: "bijdrage", titel: "Bijdrage BREIN fors verhoogd (+56% naar €100K)", impact: "Piraterijbestrijding branchebreed · 0,6% extra inhouding bovenop admin.vergoeding", datum: "verslagjaar 2024", detail: "Financiering antipiraterij-activiteiten BREIN aangepast: 'activiteiten die door de gehele branche worden gedragen'. Bijdrage PRO aan BREIN 2023 €56K → 2024 €100K. Totale contributies/bijdragen inclusief VOI©E: €84K (2023) → €131K (2024). Helft van totale kostenstijging PRO verklaard door BREIN-financiering. 0,6% inhouding op repartitie specifiek voor BREIN — apart gepresenteerd in staat van baten en lasten (€113K). Verwachting komende jaren: BREIN-kosten stabiel." },
      { type: "communicatie", titel: "Uitkering compensatie kinderboekenuitgevers december 2024", impact: "Extra uitkeringscyclus in december voor specifieke groep uitgevers", datum: "december 2024", detail: "Naast reguliere repartities (thuiskopie augustus · reprorecht oktober · leenrecht november · extra thuiskopievergoedingen november) werd in december 2024 compensatie aan kinderboekenuitgevers uitgekeerd. Onderdeel van dBoS-regeling — dBoS-gelden specifiek voor kinderboekenuitgevers (bibliotheek op school)." },

    duurzaamheid: [
      { sdg: "Mediafederatie · branchevertegenwoordiging", detail: "PRO opgericht in 1997 door Mediafederatie (voorheen Nederlands Uitgeversverbond NUV — vereniging van brancheorganisaties uitgeverij/mediabedrijven NL). Secties vertegenwoordigd in toezichthoudend bestuur onder leiding onafhankelijk voorzitter. Leden secties benoemd door verschillende groepen binnen Mediafederatie: Groep Media voor Vak en Wetenschap (MEVW), Groep Educatieve Uitgeverijen (GEU), NDP Nieuwsmedia, Groep Algemene Uitgevers (GAU), Groep Media Magazine Associatie (MMA), Vereniging van Muziekuitgevers (VMN) en Nederlandse MusicUitgeversVereniging (NMUV)." },
      { sdg: "VOI©E-lidmaatschap · Governance Code CBO's 2021", detail: "PRO lid van Vereniging van Organisaties die het Intellectueel eigendom Collectief Exploiteren (VOI©E) — 'streeft ernaar begrip voor uitoefening auteursrecht en naburige rechten te vergroten'. VOI©E fungeert namens CBO's als aanspreekpunt en meldpunt voor kritiek/klachten. Praktisch alle NL CBO's lid. PRO volgt VOI©E Governance Code CBO's 2021 als uitgangspunt goed bestuur. Directeur Pijnacker tevens bestuurslid VOI©E. Via VOI©E-contributie betaalt PRO aandeel in financiering piraterijbestrijding door BREIN." },
      { sdg: "Indirecte sociaal-culturele gelden · GAU + MMA", detail: "'Stichting PRO voert zelf geen sociaal-culturele activiteiten uit. Wel worden er indirect gelden beschikbaar gesteld.' Reprorechtgelden voor uitgevers algemene boeken en publiekstijdschriften ter beschikking gesteld aan respectievelijk Groep GAU en MMA van Mediafederatie. Groot deel VOI©E-contributie gaat naar BREIN (piraterijbestrijding) — vertegenwoordiger namens uitgevers in toezichthoudend bestuur BREIN. Grensbedrag €50 per 3 jaar voor individuele uitkering." },
      { sdg: "Klachten- en geschillencommissie · Theo Röell voorzitter", detail: "Separaat orgaan voor behandeling klachten/bezwaren rechthebbenden. Voorzitter geschillencommissie: dhr. Theo Röell (vicepresident Rechtbank Haarlem). Voor gebruikers-klachten: officiële klachten- en bezwarenprocedure conform VOI©E-gedragscode. Geen licenties geweigerd (PRO is verdeelorganisatie, geen licentieverstrekker). Reservering claims rechthebbenden: aandeel onbekende rechthebbenden 3 jaar beschikbaar; daarna toegevoegd aan repartitie volgende jaar. €39K leenrechtgelden ouder dan 3 jaar in 2024 alsnog toegevoegd (doorgaans <€50 per rechthebbende in 3 jaar)." },
      { sdg: "Verdeling over diverse uitgeefbranches 2024 · bouwstenen gezonde sector", detail: "In 2024 uitkering aan 926 uitgevers/rechthebbenden/brancheorganisaties in uitgeefsector. 28% naar vak-/studie-/wetenschappelijke uitgaven (boeken + tijdschriften). 24% naar kranten en (lokale) nieuwsmedia. 23% naar educatieve uitgevers (schoolboeken). 18% naar algemene boeken. 7% naar publiekstijdschriften. 0% overig (multimedia). 'Zo dragen de gelden die Stichting PRO uitkeert bij aan een diverse en gezonde uitgeefsector.'" },

  UvO: {
    jaar: 2024,
    publicatie: "10 juni 2025",
    bron: "Jaarverslag 2024 Stichting UvO — goedkeurende controleverklaring Flynth Audit B.V. (L.J.M. Schram RA), Utrecht 11 juni 2025",
    headline: "Recordincasso €11,2M (+6%) én recordrepartitie €11,4M (+4%) — hoogste bedrag ooit uitgekeerd aan uitgevers · inhoudingspercentage gedaald naar 9,5% (was 10,5%) · bedrijfslasten €911K (+0,7%, nagenoeg vlak) · resultaat €189K toegevoegd aan algemene reserve · €500K EV-onttrekking naar te verdelen rechten (bestuursbesluit 2024) · nieuwe Easy Access-regeling 2023–2025 UNL met jaarlijks groeiend afkoopbedrag én verlaging max pagina's 50→40 · hogescholen-afkoop €4,82M (+2,3%) · universiteiten-afkoop €5,97M (+8,5%) · alle hogescholen rapportages aangeleverd over hergebruik · CopyrightCheck-tool SURF 'begint z'n vruchten af te werpen' · vijfjarig jubileum gevierd in Utrecht · nieuwe bestuursleden Ineke Lip (februari) en André de Klerk (december) · afscheid Aernout Pilot en Geert Noorman (architect Easy Access) · nieuwe website live december 2024 · podcast-serie PRO/UvO opgestart (Hanneke Holthuis mei, Ingrid Klok oktober) · ketenkosten readergelden 16,2% (boven 15%-norm door IPRO + Pictoright) · stelselwijziging presentatie admin.vergoeding · financieel resultaat €177K door hogere rente (was €53K) · 142 gefactureerde gebruikers · 493 uitgekeerde rechthebbenden · 5,3 FTE via Cedar",
    strategie: {
      naam: "Easy Access-model consolideren · meten-is-weten-agenda",
      samenvatting: "Voorzitter Bruinsma typeert 2024 als 'een jaar met twee gezichten': recordincasso én recordrepartitie, maar tegelijk werd 'opnieuw duidelijk hoe lastig het is om de feitelijke omvang van dat gebruik door onderwijsinstellingen eenduidig vast te stellen'. UvO blijft geloven in het huidige Easy Access-model met afkoopsommen — vereenvoudigt proces onderwijsinstellingen, biedt rechthebbenden eerlijke vergoeding, beperkt inbreuken — maar brengt vraagstuk van gedetailleerde hergebruikdata met zich mee. Kern van de koers: correcte naleving afspraken, verdere digitalisering, versterken banden stakeholders, AI-impact analyseren. 'Meten is weten, en in ons geval ook eerlijk verdelen.'",
      fases: [
        { titel: "Fase 1 · Easy Access UNL 2023–2025 geïmplementeerd", periode: "mei 2024 ondertekend", focus: "Nieuwe driejarige afkoopregeling 2023–2025 getekend met Universiteiten van Nederland (UNL namens 14 publieke universiteiten). Groeimodel: afkoopbedrag stijgt jaarlijks. Tegemoetkoming aan uitgeverszorgen over vervangend hergebruik: maximum pagina's onder regeling verlaagd van 50 naar 40 (mits ≤20% van origineel werk). Dekt papier én digitaal, inclusief afbeeldingen in PowerPoints." },
        { titel: "Fase 2 · Hogescholen-afkoopregeling voortgezet 2024", periode: "maart 2024", focus: "Voortzetting afkoopregeling auteursrechten hogescholen 2024 met Vereniging Hogescholen (36 aangesloten hogescholen). Docenten kunnen tot 50 pagina's overnemen (max 25% van werk). Tot 50 afbeeldingen in PowerPoints. Alle hogescholen hebben in 2024 rapportages aangeleverd — 'belangrijke stap' volgens voorzitter." },
        { titel: "Fase 3 · CopyrightCheck-tool SURF rendeert", periode: "gedurende 2024", focus: "Inzet van CopyrightCheck-tool ontwikkeld door SURF begint vruchten af te werpen. Verwacht in nabije toekomst nog meer inzicht te geven: wat wordt gebruikt, hoe vaak, wat is de waarde. Basis voor eerlijker verdelen onder uitgevers." },
        { titel: "Fase 4 · Contactverbetering uitgevers + digitalisering", periode: "2024 doorlopend", focus: "In 2024 rechthebbenden beter geïnformeerd via nieuwsbrief, PRO/UvO-podcast (mei: Hanneke Holthuis/Pictoright; oktober: Ingrid Klok/TU Delft) en individuele gesprekken. Persoonlijk uitgeversoverzicht beschikbaar in portal sinds januari 2024. Nieuwe website live december 2024." },
        { titel: "Fase 5 · Onderhandelingen 2025 + AI-agenda", periode: "2025 vooruit", focus: "Belangrijke onderhandelingen met universiteiten én hogescholen voor nieuwe regelingen. Focus: correcte naleving afspraken, verdere digitalisering, versterken stakeholder-banden. AI-opkomst: vraagstuk over hergebruik, auteursrechtelijke aspecten, rol AI bij analyse hergebruiksgegevens." },
