      { type: "directeur", rol: "Directeur (doorlopend)", datum: "2024 · doorlopend", details: "Dhr. V.F.R.M. van den Eijnde (0,9 FTE). Totale bezoldiging 2024: €198.100 (beloning €177.222 + termijn €20.878). Individueel max €209.700 — binnen WNT-norm (94,5% gebruikt). +5,8% t.o.v. 2023 (€187.230). Nevenfuncties: Vice-voorzitter European Visual Artists (EVA), Voorzitter IFRRO visuele werkgroep, lid adviesraad Stichting Forhanna — allen onbezoldigd." },
      { type: "voorzitter", rol: "Onafhankelijk voorzitter", datum: "2024 · doorlopend", details: "Dhr. D. van Leeuwen. Totale bezoldiging 2024: €22.869 (max €34.950 — 65,4% gebruikt). Hoofdfunctie: Interim Directeur Ministerie van Binnenlandse Zaken en Koninkrijksrelaties (bezoldigd). Nevenfunctie: Voorzitter Federatie Beeldrechten (vacatievergoeding)." },
      { type: "onafhankelijk lid", rol: "Penningmeester (onafhankelijk)", datum: "2024 · doorlopend", details: "Mw. F. Imak. Bezoldiging 2024: €3.325 (max €23.300). Hoofdfunctie: Afdelingshoofd Interne Audit & Beleidsonderzoek Gemeente Amsterdam (bezoldigd). Geen nevenfuncties vermeld." },
      { type: "aantreden", rol: "Secretaris (onafhankelijk · aantreden)", datum: "per 1 juli 2024", details: "Dhr. Th. van Weeren aangetreden per 1 juli 2024 als onafhankelijk lid/secretaris, opvolger van mw. C. Wildeman. Hoofdfunctie: Advocaat bij De Koning Vergouwen Advocaten (bezoldigd). Bezoldiging onder WNT-drempel €1.700 — individueel niet gespecificeerd." },
      { type: "vertrek", rol: "Lid RvT (vertrek)", datum: "per 1 juli 2024", details: "Mw. C. Wildeman afgetreden halverwege 2024. Bezoldiging 2024 (halfjaar): €5.110 (max €11.650 voor deelperiode). Opgevolgd door Th. van Weeren." },
      { type: "vertrek", rol: "Lid RvT fotografie (vertrek)", datum: "per 3 september 2024 → 1 januari 2025", details: "Mw. S. Henning (categorie fotografie) afgetreden per 3 september 2024. Per 1 januari 2025 officieel opgevolgd door dhr. Max van Olden (nieuwe directeur Dupho). Bezoldiging Henning 2024: onder WNT-drempel." },
      { type: "vertrek", rol: "Leden RvT beeldend kunstenaars (vertrek)", datum: "per 1 januari 2025", details: "Beide bestuursleden namens beeldend kunstenaars zijn volgens rooster van aftreden opgevolgd: dhr. P. Dikker door mw. J. Hattink, en mw. J. Hootsmans door dhr. J. Groen. Bezoldigingen Dikker €7.835 + Hootsmans onder WNT-drempel." },
      { type: "RvT zittend", rol: "Overige zittende leden RvT 2024", datum: "31-12-2024", details: "Dhr. P. Dikker (beeldend kunstenaar, tot 1-1-2025 — bezoldiging €7.835; nevenfuncties: Adviescommissie Pictoright Fonds, Bestuurslid Federatie Beeldrechten, Raadslid Stichting Leenrecht, Voorzitter BBK), mw. J. Hootsmans (beeldend kunstenaar, tot 1-1-2025 — Advocaat Kunstenbond), dhr. R. Rogier (fotograaf — €4.804; nevenfuncties: Voorzitter Stichting NVF-Fonds, Bestuurslid Paul Peters Cultuurfonds, Bestuurslid Federatie Beeldrechten), mw. D. Janssen (ontwerpers/illustratoren — Directeur BNO), dhr. L. Deltrap (ontwerpers/illustratoren — €3.540; Illustrator + Docent Willem de Kooning academie + Bestuurslid Stichting Leenrecht)." },
      { type: "accountant", rol: "Accountant", datum: "controle 2024", details: "Forvis Mazars N.V. — goedkeurende controleverklaring afgegeven. Gewaarmerkt voor identificatiedoeleinden 12 november 2025. Accountantskosten 2024: €45.762 (was €61.776 in 2023 — opvallende daling -26%). Accountant heeft in 2024 in bijzijn van bestuur verslag gedaan van bevindingen controle transparantieverslag." },
      { type: "vergadering", rol: "Jaarvergadering aangeslotenen", datum: "13 juni 2024", details: "Gehouden in West-Indisch Huis, Amsterdam. ~110 aangeslotenen, gastsprekers en bureau. Themaprogramma 'Markt, Maker & Macht — Big tech: zijn er nog grenzen?' met presentaties van illustrator Mei-Li Nieuwland, hoogleraar Reijer Passchier (digitalisering en democratische rechtsstaat) en Pictoright-juristen Hanneke Holthuis en Luna Schumacher. Presentatie: Tirsa With. Bestuur vergaderde in 2024 zeven maal." },
      { type: "bestuursmodel", rol: "Transitie naar Raad van Toezicht", datum: "besluit 2025 · afronding 2026", details: "Bestuur heeft in 2025 besloten het huidige Bestuur+Directiemodel te wijzigen naar een Raad van Toezicht-model. Introductie verwacht afgerond in 2026. Parallel: jaarlijkse zelfevaluatie bestuur 2024 onder begeleiding extern bureau; taken compliance officer verdeeld over personen belast met juridische- en financiële zaken; ge-updatete bestuursprofielen 2024; introductieprogramma voor nieuwe leden (ingezet in 2025 voor recent benoemden)." },
    ],
    incidenten: [
      { type: "onregelmatigheden", titel: "Fotobureau-onderzoek · juridische procedure gestart (februari 2025)", impact: "Publicatie transparantieverslag vertraagd (6 november 2025) · aanvullende maatregelen · juridische procedure tegen één fotobureau · mogelijk latere uitkering aan fotobureaus in toekomst", datum: "begin 2025 · lopend", detail: "Begin 2025 hebben meerdere fotografen contact met Pictoright opgenomen. Zij vermoedden dat een fotobureau op hun naam vergoedingen heeft geclaimd bij Pictoright zonder doorbetaling aan de fotografen. Pictoright startte omvangrijk onderzoek: bureaus moesten aantonen dat (a) opgegeven publicaties/uitzendingen hebben plaatsgevonden, (b) bureau bevoegd was namens fotografen claims in te dienen, (c) aan fotografen is doorbetaald. Onderzoek uitgewezen: diverse bureaus hebben niet gehandeld volgens grondslagen/reglementen/individuele afspraken. Enkele bureaus schonden afspraken EN werkten niet mee → vergoedingen teruggevorderd. Tegen één fotobureau gerechtelijke procedure gestart. Financiële consequenties 'naar verwachting niet materieel'. Andere bureaus met administratieve onregelmatigheden hebben wel meegewerkt — afspraken maken tot herstel. Maatregelen genomen om herhaling te voorkomen; komende tijd verdere uitbreiding. Mogelijk worden rechtenvergoedingen in vervolg later uitgekeerd aan fotobureaus. In 2025 regelmatig overleg met CvTA over deze kwestie." },
      { type: "juridisch", titel: "Meta-vonnis 7 november 2024: platforms onder Auteurswet", impact: "Meta moet passende vergoeding betalen vanaf 21 juni 2021 · drie deskundigen aangewezen april 2025 · onderzoek 8 maanden · Pictoright draagt 1/3 kosten deskundigen", datum: "7 november 2024 · verdere fases 2025", detail: "Rechtszaak aangespannen najaar 2023. Rechtbank Amsterdam 7 november 2024 vonnis: Meta-platforms Facebook en Instagram ZIJN 'aanbieders van onlinediensten voor het delen van inhoud' (platforms) onder Auteurswet en hebben verplichting zich 'voldoende in te spannen om een licentie te verkrijgen'. Meta moet vanaf invoeringsdatum Auteursrechtrichtlijn-wijziging (21 juni 2021) passende vergoeding betalen aan door Pictoright vertegenwoordigde makers. Methode Meta moet transparant + passend + door Pictoright te controleren zijn. Aanvullend vonnis april 2025: drie deskundigen aangewezen om partijen te laten verder spreken. September 2025 vonnis: vergoeding deskundigen vastgesteld — Pictoright betaalt 1/3. Onderzoek 8 maanden met rapport als basis voor verdere onderhandelingen. Najaar 2025: parallel onderhandelingen gaande tussen partijen. Ook gesprekken met Pinterest (vroeg stadium)." },
      { type: "overname", titel: "Overname BeeldAnoniem per 1 januari 2025", impact: "Verbreding dienstverlening · vrijwaringsfonds voor onbekende makers", datum: "per 1 januari 2025", detail: "Activiteiten Stichting BeeldAnoniem per 1 januari 2025 overgenomen door Pictoright. BeeldAnoniem regelt auteursrecht voor beeld waarvan de maker onbekend is of niet gevonden kan worden. BeeldAnoniem geeft vrijwaring af indien potentiële gebruiker aan voorwaarden voldoet. Vergoeding wordt beheerd in vrijwaringsfonds — als auteursrechthebbende zich alsnog meldt worden gebruiksrechten alsnog voldaan. Kosten BeeldAnoniem (exploitatie): €825 in 2024 (pre-overname). Wordt een nieuwe service-lijn binnen Pictoright in 2025." },
      { type: "stelselwijziging", titel: "Inhoudingspercentage collectieve rechten verhoogd 9% → 10%", impact: "+€200K admin-vergoeding per €20M collectieve inning · eerste toepassing bij repartitie 2023-jaar in december 2024", datum: "besluit 2024 · eerste toepassing dec 2024", detail: "In 2024 heeft bestuur besloten om percentage totale collectieve inning voor ingehouden administratiekosten vast te stellen op 10%. Voor het eerst gehanteerd bij repartitie met betrekking tot jaar van recht 2023 in december 2024. Bij uitkering van collectieve rechten over eerdere jaren is nog 9%-inhouding gehanteerd. Feitelijk ingehouden kostenpercentage collectief: 12,41% in 2024 (was 10,58% in 2023). Op jaarvergadering 13 juni 2024 toegelicht aan aangeslotenen." },
      { type: "wetgeving", titel: "Wet versterking auteurscontractenrecht · persoonlijkheidsrechten nabestaanden", impact: "Beter erfgoed-beheer beeldmakers · makkelijker optreden tegen verminking/aantasting werk", datum: "besloten 2024", detail: "Positief nieuws 2024: wetsvoorstel 'Wet versterking auteurscontractenrecht' bepaalt dat bij overlijden maker de persoonlijkheidsrechten automatisch toekomen aan nabestaanden, tenzij iets anders geregeld. Eerder moest dit expliciet in testament/codicil — wat vaak niet gebeurde, waardoor rechten vervielen. Nu makkelijker optreden tegen verminking/aantasting werk overleden kunstenaars (slecht onderhoud, schadelijke aanpassingen voor reputatie). Pictoright verwelkomt wijziging 'zeker in het tijdperk van kunstmatige intelligentie'." },
      { type: "samenwerking", titel: "Nieuwe KB-Pictoright-Lira koepelovereenkomst — digitale kranten/tijdschriften", impact: "Meer periodieken online beschikbaar via erfgoedinstellingen · nationale werking", datum: "2024", detail: "In 2024 nieuwe koepelovereenkomst Koninklijke Bibliotheek, Pictoright en Lira getekend voor het online zetten van kranten en tijdschriften (periodieken) die niet meer in de handel zijn. Nationale koepelovereenkomst — ook andere Nederlandse erfgoedinstellingen kunnen toetreden. Maakt mogelijk dat erfgoedinstellingen veel meer recente kranten/tijdschriften beschikbaar stellen op internet dan voorheen." },
      { type: "CvTA", titel: "CvTA heroriëntatie naar risicogericht toezicht · nadruk op algemene reserve", impact: "Pictoright overweegt maatregelen die bijdragen aan niveau algemene reserve · mogelijk impact voor makers", datum: "verslagjaar 2024", detail: "CvTA heeft in 2024 zijn visie op publiek toezicht herijkt en gaat zich meer richten op risicogericht toezicht. In toezichtrapport 2023 meer nadruk op financiële aspecten van CBO's: financiële robuustheid via niveau beheerskosten t.o.v. algemene reserve. Voor Pictoright zeer relevant, nu kosten al enkele jaren baten overstijgen. Meermaals aan bod in overleg met CvTA — Pictoright overweegt maatregelen die bijdragen aan niveau algemene reserve. In 2025 ook regelmatig overleg met College over fotobureau-kwestie." },
      { type: "fondsen", titel: "Fonds Boekuitgave + Steunfonds Covid-19 afgesloten · Fonds Principiële Procedures uitgeput", impact: "Saldo's €10K + €30K + €20K toegevoegd aan Fonds Principiële Procedures → volledig benut voor juridische kosten Meta", datum: "boekjaar 2024", detail: "Fonds Boekuitgave afgesloten — besloten boekuitgave voor beeldend kunstenaars niet meer te maken; saldo €30.000 overgeboekt naar Fonds Principiële Procedures. Steunfonds Covid-19 afgesloten — werkzaamheden/verantwoording rondom steunfonds afgerond; saldo €19.808 overgeboekt. Fonds Principiële Procedures per 1-1-2024 €10.135 + overboekingen €49.808 = totaal €59.943 — in 2024 volledig aangewend voor additionele juridische kosten (primair Meta-zaak). Saldo 31-12-2024: €0. Toekomstige principiële procedures zonder buffer." },
      { type: "governance", titel: "Besluit bestuursmodel-wijziging naar Raad van Toezicht (2025)", impact: "Structurele governance-overgang · afronding verwacht 2026", datum: "besluit 2025", detail: "In 2025 is besloten om het bestuursmodel te wijzigen naar een Raad van Toezicht-model. Introductie van dit nieuwe model zal naar verwachting in 2026 worden afgerond. Pictoright hanteert momenteel Bestuur+Directiemodel met onafhankelijk voorzitter (Van Leeuwen), onafhankelijke penningmeester (Imak) en onafhankelijke secretaris (Van Weeren) naast door beroepsorganisaties voorgedragen bestuursleden (2 beeldend kunstenaars, 2 fotografen, 2 ontwerpers/illustratoren). Op brancheniveau is besloten om met CBO Keurmerk te stoppen." },
    ],
    duurzaamheid: [
      { sdg: "Federatie Beeldrechten · samenwerking 7 beroepsorganisaties", detail: "Samenwerkingsverband tussen Pictoright en zeven beroepsorganisaties die ontwerpers, illustratoren, fotografen, fotojournalisten en beeldend kunstenaars vertegenwoordigen. Tweejarig bestaan in 2024. Periodiek overleg met betrokken ministeries. In 2024 activiteiten op AI & Beeldrecht (Opt Out Now!), Value Gap (#eerlijkdelensocialmedia-campagne ter ondersteuning Meta-zaak) en Online Inbreuken (onderzoek Atlas Research/IVIR — publicatie 2025). Voorzitter: D. van Leeuwen (Pictoright)." },
      { sdg: "Pictoright Fonds · ~50 projecten ondersteund in 2024", detail: "Totaal toegekend 2024: €1,02 mln (Beeldende Kunst €118K · Illustratie/Ontwerp €515K · Fotografie €390K). Ondersteuning van projecten in drie disciplines via aparte adviescommissie (6× bijeen in 2024). Gefinancierd via 10%-inhouding SoCu-gelden op collectieve rechten. Eind 2024 nieuwe verdelingsgrondslag vastgesteld (werking 1-1-2025). Eerste €100.000 in gelijke delen, daarna 46,75% I/O · 46,75% Fotografie · 6,5% Beeldende Kunst." },
      { sdg: "Werkgroep Diversiteit en Inclusiviteit", detail: "Pictoright heeft werkgroep diversiteit en inclusiviteit ingesteld; verschillende aanbevelingen in loop van 2024 geïmplementeerd. Onderdeel van VOI©E Governancecode CBO's 2021 'pas-toe-of-leg-uit'-benadering. Jaarlijkse ethiekbespreking ingesteld waarin medewerkers zonder bijzijn directie ethische kwesties kunnen aandragen — vertrouwenspersoon Integriteit (VPI) aanwezig." },
      { sdg: "Schoolbibliotheek-uitleningen · €160K aan 1.500 beeldmakers (illustratoren)", detail: "Pictoright heeft in 2024 wederom beeldmakers vergoed voor uitleningen door schoolbibliotheken. Gelden via ministerie OCW → Stichting Leenrecht → Pictoright. Bijna 1.500 makers (met name illustratoren) kregen vergoeding. Verdeling op basis van uitleengegevens openbare bibliotheken voor (kinder)boeken. Totaal €160.000 gereparteerd." },
      { sdg: "VOI©E-gedragscode · VPI · ethiekbespreking", detail: "Pictoright hanteert inhoudelijk VOI©E Governancecode CBO's 2021 'pas-toe-of-leg-uit'; richtlijnen verwerkt in statuten, bestuurs-/directiereglementen en personeelshandboek. Jaarlijkse zelfevaluatie bestuur 2024 onder begeleiding extern bureau. Jaarlijks evalueert bestuur werkzaamheden directie. Taken compliance officer ondergebracht bij personen met juridische/financiële portefeuille." },

    claims: {
      aantal: "Geen exact aantal in transparantieverslag. Statistieken gereparteerde makers 2024: 31.246 (was 30.141) · aangeslotenen 7.992 · gefactureerde gebruikers 447 (was 431). 9.119 totaal vertegenwoordigde rechthebbenden in 2024 (aangeslotenen/zusterorganisaties/fotopersbureaus) — 6.709 alleen collectief, 2.188 individueel (incl. eventueel volgrecht/collectief), 241 volgrecht. Voor buitenland: tientallen zusterorganisaties, ~130.000 beeldmakers wereldwijd via lumpsum-betalingen.",
      trend: "Klachten/claims-stroom gedomineerd door 2025-fotobureau-onderzoek (zie Incidenten). Pictoright heeft in 2024 geen collectieve licenties geweigerd. Incidenteel individuele rechten-licentie niet verleend wanneer aangeslotene geen toestemming wil verlenen (wens aangeslotene leidend — geen Pictoright-beslissing). Repartitie binnen wettelijke termijnen: individuele rechten/volgrecht >90%, leenrecht >90%, reprorecht snel na ontvangst, kabel versnipperd — termijnen niet altijd gehaald. Thuiskopie: grote historische bedragen met terugwerkende kracht — afstemming wordt komende jaren verbeterd.",
      formeel: "Geen concreet klachtenaantal gerapporteerd. Pictoright volgt VOI©E-gedragscode en de daarmee samenhangende klachten-/geschillenprocedure. Aparte vertrouwenspersoon Integriteit (VPI) voor medewerkers. Financieel belang bestuur en directie transparant via staffelmodel (3 bestuursleden ontvingen rechtenvergoedingen: P. Dikker <€1K · R. Rogier <€1K · L. Deltrap tussen €1K-€10K; overige bestuursleden en directie €0). Bestuursleden hebben geen direct of indirect persoonlijk tegenstrijdig belang. Individuele rechten: aangeslotenen hebben exclusieve last en volmacht aan Pictoright verleend. Collectieve aangeslotenen hebben veelal rechten overgedragen. Iedere nieuwe aangeslotene tekent aansluitingsovereenkomst. Vergoedingen betaald aan zusterorganisaties via wederkerigheidsovereenkomsten met 45 buitenlandse CBO's (zie bijlagen 1/2).",
    },

  Norma: {

    headline: "Incasso vlak op €13,44 mln (-1,5%) · beheerskosten 16,3% ruim onder CvTA-norm 17,7% · bedrijfsresultaat -€96K door eenmalige €400K extra afschrijving IT · beleggingsresultaat +€1,14 mln · RODAP-contract eind 2024 afgelopen, VoD-akkoord verwacht 2025 · afsluittermijn verkort van 5 naar 3 jaar",
    strategie: {
      naam: "Strategisch meerjarenplan 2024",
      samenvatting: "In de eerste helft van 2024 heeft de directeur-bestuurder een strategisch meerjarenplan opgesteld, in juni met de RvT besproken en vastgesteld. Verschillende scenario's zijn uitgewerkt om inkomstenstromen op gewenst niveau te houden en continuïteit op lange termijn te waarborgen. In de tweede helft van 2024 is een start gemaakt met de realisatie van de voorkeurscenario's, waarin groei van inkomstenstromen en dekking van organisatiekosten centraal staan.",
      fases: [
        { titel: "Fase 1 · Plan opstellen & vaststellen", periode: "H1 2024", focus: "Meerjarenplan met scenario's voor inkomstenstromen; bespreking en vaststelling juni 2024 door RvT." },
        { titel: "Fase 2 · Realisatie voorkeurscenario's", periode: "vanaf H2 2024", focus: "Groei inkomstenstromen, dekking organisatiekosten, optimalisatie bedrijfsprocessen en (kosten)efficiënte verdeling van rechtengelden." },

    trends: [
      { titel: "Rechtenopbrengsten -1,5% naar €13,44 mln", richting: "flat", impact: "A", detail: "€13,64 mln → €13,44 mln. Nederlands gebruik +15,7% (€6,36M → €7,36M), CBO's Nederland -30,5% (€7,21M → €5,01M), CBO's buitenland sterk omhoog (€78K → €1,08M). Faseringsverschillen tussen kanalen domineren — totaal per saldo vlak." },
      { titel: "Beheerkosten -9,9% naar €2,56 mln", richting: "down", impact: "P", detail: "€2,85 mln → €2,56 mln. Beheerkosten als % van repartitie incl. servicevergoeding daalde van 17,4% naar 16,3%. Ruim onder individuele CvTA-kostennorm 17,7% voor 2024. Operationele bedrijfslasten lager dan begroot." },
      { titel: "Bedrijfsresultaat -€96K door extra IT-afschrijving", richting: "down", impact: "A", detail: "-€10K (2023) → -€96K (2024). Negatief resultaat vrijwel geheel verklaard door eenmalige herijking afschrijving IT-systeem van €400K. Zonder deze post was bedrijfsresultaat positief. Afschrijvingen stegen van €535K naar €592K." },
      { titel: "Beleggingsresultaat +€1,14 mln", richting: "up", impact: "P", detail: "€747K → €1,14 mln. Gerealiseerde opbrengsten effecten €726K (2023: -€1K), waardeverandering €361K (2023: €773K). Netto resultaat €1,04 mln — volledig toegevoegd aan algemene reserve, die groeit van €489K naar €1,53 mln." },
      { titel: "Repartitie -4,1% naar €15,70 mln", richting: "down", impact: "A", detail: "€16,37 mln → €15,70 mln. Rechthebbenden binnenland €8,89M → €8,39M, rechthebbenden buitenland €1,77M → €2,09M (+18%), CBO's buitenland €5,71M → €5,21M. SoCu-toevoeging €1,07 mln (2023: €1,04M). Totaal uitbetaald aan rechthebbenden 'ruim €15,5 mln'." },
      { titel: "Afsluittermijn verkort van 5 naar 3 jaar", richting: "up", impact: "P", detail: "In 2024 heeft Norma de termijn waarop een jaar wat verdeling betreft wordt afgesloten vervroegd: van 5 jaar naar 3 jaar. Concreet zijn in 2024 de jaren 2019, 2020 en 2021 afgesloten. Dit had een positief effect op de hoogte van de repartitie." },
      { titel: "64% binnen wettelijke termijnen verdeeld", richting: "up", impact: "P", detail: "61% (2023) → 64% (2024) van rechtengelden binnen wettelijke termijnen (6 mnd wettelijke / 9 mnd niet-wettelijke vergoedingen) verdeeld. Na termijn alsnog verdeeld: 39%. Nog niet toegeschreven ultimo 2024: beperkt aandeel. Norma houdt naclaim-dotatie aan — volledige uitbetaling binnen termijn zou leiden tot onwenselijk aantal neerwaartse correcties." },
      { titel: "Aangeslotenen +5,2% naar 22.230", richting: "up", impact: "P", detail: "21.122 → 22.230 aangeslotenen. Groeilijn voortgezet (2020: 18.932 · 2021: 19.350 · 2022: 20.261 · 2023: 21.122). In 2024 bijna 19.000 claims via MyNorma-portal ingediend, plus groot aantal aanmeldingen via buitenlandse zusterorganisaties." },
      { titel: "Te verdelen rechten -13,7% naar €15,71 mln", richting: "down", impact: "P", detail: "€18,19 mln → €15,71 mln. Oudste jaren (2019-2021) zijn in 2024 afgesloten; nu oudste open repartitiejaar 2021 met €561K. Thuiskopie-stroom: €9,16M → €6,93M. TV-uitzending juist toegenomen: €7,39M → €8,01M. Schuldsaldo over 5 jaar (2020-2024) inmiddels teruggebracht." },
      { titel: "FTE -0,7 naar 10,3", richting: "down", impact: "A", detail: "11,0 → 10,3 FTE gemiddeld. Lonen, salarissen en sociale lasten €940K → €806K (-14,3%). Verdeling: directie 0,8 · staf 2,0 · juridische zaken 0,9 · repartitie 6,6. Binnen bureauorganisatie aandacht voor teamontwikkeling, HR-cyclus en functiewaardering." },
      { titel: "Voorziening naclaims ruim verzesvoudigd", richting: "up", impact: "W", detail: "€56K → €352K (+€296K). Dotatie vrijval onbekende betalingen €296K. Oploop hangt samen met verkorting afsluittermijn naar 3 jaar — grotere reservering nodig voor terechte naclaims voordat budget definitief wordt afgesloten. Vordering op rechthebbenden blijft met €200K voorzien voor oninbaarheid." },
      { titel: "SoCu-bestedingen +21% naar €989K", richting: "up", impact: "P", detail: "€818K → €989K. Norma fonds: 603 aanvragen, 94 toegekend, 509 afgewezen — totaal €803.037 toegekend. Norma PLUS Fonds: 11 aanvragen, €186.006 uitgekeerd. Stand SoCu-reserve blijft op reglementair maximum €1,0 mln. Aantal aanvragen sterk gestegen; fondsen ruim overvraagd." },
      { titel: "Bestemmingsfonds OCW (Corona) volledig uitgeput", richting: "down", impact: "A", detail: "€25K (1-1-2024) → €0 (31-12-2024). Van oorspronkelijke €1,1 mln (2021) + €2,8 mln (2022) Corona-steun via Steunfonds Federatie Auteursrechtbelangen resteert ultimo 2024 niets. Kosten van €14K in 2024 ten laste gebracht, €11K toegevoegd aan SoCu." },
      { titel: "Onverdeeld-na-3-jaar: €0 (ook 2023: €0)", richting: "flat", impact: "P", detail: "Op grond van art. 2i lid 8 Wet toezicht worden bedragen die drie jaar na afloop van boekjaar van incasso niet kunnen worden verdeeld als onverdeeld beschouwd. Jaarverslag 2024: 'In 2024 waren er geen gelden die niet binnen deze termijn konden worden verdeeld (in 2023 was dit ook nihil) ... Ultimo boekjaar is het bedrag dat ouder is dan drie jaar € 0 (2023: € 0)'. Uitzondering: gelden uit buitenland waar geen specificatie van aanwezig is. Rechthebbenden kunnen rechten claimen op betreffende werken via portal." },

    risicos: [
      { cat: "Incasso", sev: "W", titel: "RODAP-contract TV-uitzendingen eind 2024 afgelopen", detail: "Vijfjarige overeenkomst met RODAP (koepel producenten/omroepen/distributeurs) voor TV-uitzendingen — gezamenlijk met Lira en Vevam — liep eind 2024 af. Onderhandelingen over nieuwe regeling zijn gestart, ook FAIR neemt deel. Vergoeding is gebaseerd op wettelijke regeling voor collectief beheer. Kans ingeschat als gemiddeld (ongewijzigd t.o.v. 2023)." },
      { cat: "Incasso", sev: "W", titel: "VoD-vergoeding op basis van vrijwilligheid — onzekerder", detail: "Geen wettelijke regeling voor Video on Demand. Partijen startten in 2023 onderhandelingen; in 2024 goede vorderingen gemaakt, akkoord verwacht in 2025. Vergoedingen zullen voor Norma substantieel zijn gezien (meer dan) volwassen streaming-markt. Norma zal met andere filmmaker-CBO's nauwlettend volgen hoe regeling op basis van vrijwilligheid in praktijk uitwerkt en hierover met wetgever in gesprek blijven." },
      { cat: "Incasso", sev: "A", titel: "Thuiskopie lichte daling", detail: "Thuiskopievergoedingen worden opgebracht door heffingen op apparaten waarmee beschermde werken worden gekopieerd. Norma fungeert voor Thuiskopie als verdeelorganisatie voor uitvoerende kunstenaars. In 2024 lichte daling. Geen gedetailleerde cijfermatige toelichting op oorzaak." },
      { cat: "IT", sev: "W", titel: "Eenmalige herijking IT-systeem €400K extra afschrijving", detail: "In 2024 heeft herijking van het repartitiesysteem plaatsgevonden met een eenmalig hogere afschrijvingslast van €400K. Software heeft afschrijvingspercentage 16,67%. Boekwaarde immateriële vaste activa: €735K → €331K. Investeringen 2024: €179K. Norma streeft naar operational excellence bij doorontwikkeling verdeelsysteem." },
      { cat: "Datakwaliteit", sev: "W", titel: "Beperkte betrouwbare data voor repartitie — dwingt tot claimsystematiek", detail: "Beperkte beschikbaarheid van betrouwbare data voor repartitie blijft groot obstakel. Norma ontvangt geen kwalitatieve gegevens van gebruikers met namen van rechthebbenden. Dwingt tot claimsystematiek en handmatige dataverrijking — arbeidsintensief, vergroot foutkans. Gesprekken met producenten en geluidsstudio's over gestandaardiseerde data lopen." },
      { cat: "Compliance", sev: "W", titel: "Spanning tussen wettelijke termijnen (6/9 mnd) en zorgvuldige repartitie", detail: "Op grond van Wet toezicht moeten geldstromen binnen 6 mnd (wettelijke) of 9 mnd (niet-wettelijke) na boekjaar van incasso worden verdeeld. Gegeven claimsystematiek en dataafhankelijkheid zou volledige uitkering binnen termijnen leiden tot onwenselijk aantal neerwaartse correcties op rekening-courantstanden. 64% binnen termijnen uitbetaald — rest kent 'objectieve reden van verhindering'." },
      { cat: "Operationeel", sev: "A", titel: "Debiteurenrisico bij naclaims en terugvorderingen", detail: "Als aangeslotenen na termijn claimen of aantal claims hoger is dan reserveringen, moet worden verrekend met reeds verrichte uitbetalingen. Dat kan leiden tot negatieve rekening-courantstanden en vordering van Norma op rechthebbenden. Vooralsnog 'klein ingeschat' maar heeft Norma's bijzondere aandacht. Voorziening oninbaarheid vordering rechthebbenden: €200K (onveranderd)." },
      { cat: "Concentratie", sev: "A", titel: "Kleine, specialistische organisatie — kwetsbaar", detail: "Norma is kleine, specialistische organisatie (10,3 FTE). Deels afhankelijk van externe dienstverleners; eigen medewerkers hoog gespecialiseerd op eigen werkterrein. Norma werkt aan kennisdeling, delegeren van taken, checks and balances en vastleggen van kennis en procedures. Kans beoordeeld als gemiddeld." },
      { cat: "AI", sev: "A", titel: "AI als opkomend strategisch thema", detail: "Kunstmatige intelligentie zal ook toekomst en werkveld van Norma beïnvloeden. Norma monitort kansen en bedreigingen die AI met zich meebrengt. Geen concrete maatregelen in 2024; signalering als opkomend strategisch thema in risicomanagement-paragraaf." },
      { cat: "Keten", sev: "W", titel: "Claims tegen Stichting de Thuiskopie — risico voor toekomstige uitkeringen", detail: "Als reparterende CBO van thuiskopiegelden is Norma in 2022 door Stichting de Thuiskopie op de hoogte gesteld van omvangrijke claims door betalingsplichtigen. Stichting de Thuiskopie beraadt zich op reservering van niet-uitgekeerde gelden of opschorting toekomstige uitkeringen. Ondanks vertrouwen in goede afloop procedures — risico voor toekomstige uitkeringen aan Stichting Norma. (Opgenomen als gebeurtenis na balansdatum.)" },
      { cat: "Financieel", sev: "A", titel: "Beleggingen — defensief tot neutraal, horizon 7 jaar", detail: "Beschikbare liquide middelen worden belegd met horizon van ten minste 7 jaar, doel: inflatievolgend rendement. Strategie defensief tot neutraal. Portefeuille 31-12-2024: aandelenfondsen €3,72 mln, vastrentend/IG €4,14 mln, alternatieve beleggingen €852K, liquiditeiten €221K — totaal €8,94 mln. 100% beursgenoteerd. Kans grote waardedaling ingeschat als gemiddeld." },
      { cat: "Governance", sev: "P", titel: "Bestuurder en RvT ruim binnen WNT-normen", detail: "Directeur-bestuurder T. Nauta: €163.028 (beloning €139.521 + op termijn €23.507) bij 0,8 FTE. Individueel WNT-max €186.400. Voorzitter RvT G. Faber: €13.586 (max €34.950). Overige RvT-leden tussen €8.500 en €11.000 (max €23.300 elk). R&SC-commissie: voorzitter J. Theuns €5.811, leden €3.238-€4.885. Alle ruim binnen normen." },

      { project: "MyNorma 2.0 portal", status: "Verbeteringen doorgevoerd 2024", detail: "Bijna 19.000 claims in 2024 via MyNorma-portal ingediend. Verbeteringen doorgevoerd om claimen sneller en makkelijker te maken. Nog-niet-toegeschreven werken inzichtelijk voor rechthebbenden. Risico beschikbaarheid beoordeeld als gemiddeld (ongewijzigd)." },
      { project: "Gestandaardiseerde data van producenten", status: "Gesprekken lopen", detail: "Norma streeft ernaar rechtengelden in de toekomst te verdelen op basis van betrouwbare en gestandaardiseerde data over filmwerken. Gesprekken met producenten en geluidsstudio's gaande. Doel: claimen voor rechthebbenden makkelijker maken en rechtengelden sneller uitbetalen. Voor efficiencyverbetering afhankelijk van medewerking producenten." },
      { project: "Penetratietests & AVG", status: "Uitgevoerd 2024", detail: "Om risico's rond beveiliging en privacy te mitigeren heeft Norma ook in 2024 penetratietests laten uitvoeren. Kans op niet-voldoen aan AVG-bepalingen ingeschat als gering. Interne maatregelen getroffen; bewustzijn rond beveiligingsrisico's en datalekken actief gehouden." },
      { project: "SCAPR VRDB & internationale standaarden", status: "Norma voorloper onder AV-CBO's", detail: "SCAPR is mondiaal samenwerkingsverband voor internationale uitwisseling rechtengelden. Norma is binnen SCAPR voorloper onder audiovisuele rechtenorganisaties en aanjager van innovaties voor soepele en snellere internationale uitwisseling. Contractuele relatie met tal van buitenlandse zusterorganisaties verstevigd in 2024." },

      { type: "beleidswijziging", titel: "Afsluittermijn repartitie verkort van 5 naar 3 jaar", impact: "Positief effect op hoogte repartitie 2024 · tegelijk hogere naclaimvoorziening nodig", datum: "2024", detail: "Voorheen sloot Norma een repartitiejaar pas na 5 jaar af. Die termijn is in 2024 verkort tot 3 jaar. Concreet zijn in 2024 jaren 2019, 2020 en 2021 afgesloten. Versnelling droeg bij aan hogere repartitie én een forse oploop van de voorziening naclaims (€56K → €352K)." },

  Thuiskopie: {
    jaar: 2024,
    publicatie: "12 juni 2025",
    bron: "Jaarverslag 2024 Stichting de Thuiskopie",
    headline: "Rechtenopbrengst +5,4% naar €32,8 mln (PC/laptops/tablets herstel post-Covid, smartphones licht dalend) · repartitie -35,6% naar €24,4 mln omdat €40,4 mln bruto bewust wordt achtergehouden i.v.m. lopende procedures en nog vast te stellen verdeelsleutel · te verdelen rechten opgelopen naar €70,6 mln · HP c.s.-cassatie → Hoge Raad tussenarrest 24 mei 2024 met prejudiciële vragen aan HvJ EU · stelselwijziging administratievergoeding → resultaat structureel op 0 · inhouding 2025-repartitie verlaagd naar 3,1% (was 6,7%) · drie directeuren in één jaar",
    strategie: null,
    trends: [
      { titel: "Rechtenopbrengst +5,4% naar €32,8 mln", richting: "up", impact: "P", detail: "€31,1 mln → €32,8 mln bij ongewijzigde tarieven. Stijging met name door hogere opbrengsten voor PC/laptops en tablets, waarvan de verkopen na sterke stijging in 2020 (Covid) in de jaren daarna een dip vertoonden. Smartphones — voor Thuiskopie belangrijke categorie — vertonen zeer licht dalende trend door steeds langere gebruiksduur." },
      { titel: "Repartitie -35,6% naar €24,4 mln", richting: "down", impact: "A", detail: "€37,9 mln → €24,4 mln bruto. Geen operationeel probleem: het bestuur heeft bewust besloten €40,4 mln bruto niet uit te keren zolang procedures lopen en hoofdverdeelsleutel nog niet definitief is. Op in 2024 gereparteerde bedragen (tijdvak 2023) 6,7% admin.vergoeding ingehouden." },
      { titel: "Te verdelen rechten +14,1% naar €70,6 mln", richting: "up", impact: "A", detail: "€61,9 mln → €70,6 mln. Opbouw per jaarlaag: 2020 en ouder -€1K (effectief 0) · 2021 €17,7 mln · 2022 €16,5 mln · 2023 €6,2 mln · 2024 €30,2 mln. De 2021-laag is 3 jaar na incassojaar nog onverdeeld — niet omdat onverdeelbaar, maar omdat € 11,0 mln t.l.v. 2021 achtergehouden i.v.m. lopende incassoprocedures en € 6,7 mln i.v.m. nog vast te stellen hoofdverdeelsleutel." },
      { titel: "€40,4 mln bruto bewust achtergehouden", richting: "flat", impact: "W", detail: "Detail: €11,0M t.l.v. 2021 (incassoprocedures) · €6,7M t.l.v. 2021 (verdeelsleutel) · €10,2M t.l.v. 2022 (incassoprocedures) · €6,3M t.l.v. 2022 (verdeelsleutel) · €6,2M t.l.v. 2023 (verdeelsleutel). Doel: voorkomen dat eventuele verwezenlijking van risico's eenzijdig ten laste komt van rechthebbenden van één specifiek jaar. CvTA is geïnformeerd. Bestuur heeft op basis van juridisch advies expliciet geen voorziening(en) of afwentelingsvorderingen gevormd." },
      { titel: "Stelselwijziging admin.vergoeding → resultaat op 0", richting: "flat", impact: "A", detail: "Admin.vergoeding wordt vanaf 2024 volledig toegerekend aan het boekjaar waarin rechtenopbrengst gerealiseerd is (voorheen 80%/20% verdeling). Gevolg: resultaat komt in principe structureel op nul uit. Correctie eigen vermogen €1,104 mln: €425K nog te realiseren baten 2023 + €663K verhoging admin.vergoeding 2023-gelden + €16K overig. Presentatie te verdelen rechten ook gewijzigd (bruto i.p.v. netto)." },
      { titel: "Inhouding 2025-repartitie verlaagd naar 3,1%", richting: "down", impact: "P", detail: "Inhoudingspercentage voor repartitie van incasso 2024 (uit te voeren in 2025) vastgesteld op 3,1% vs 6,7% in 2024 over incasso 2023. Feitelijke inhoudingspercentages over 2024 blijven 6,7% — bedrijfslasten 6,0% van rechtenopbrengsten. Jaarlijks fluctuerend percentage, bepaald door aan inningsjaar toegerekende lasten minus financieel resultaat." },
      { titel: "Financieel resultaat €1,176 mln — nieuwe rente-toerekening", richting: "up", impact: "P", detail: "Bruto rente €1.492K (2023: €659K) door combinatie hoge marktrente en hoge liquiditeiten (€70,2 mln). Bestuur heeft nieuw besloten €316K rente toe te rekenen aan te verdelen rechten (gereserveerd voor nog vast te stellen hoofdverdeelsleutel) — deze rente wordt niet als eigen exploitatie beschouwd. Netto financieel resultaat: €1,176 mln." },
      { titel: "Contributies -79% naar €38K", richting: "down", impact: "P", detail: "€184K → €38K. Door wijziging in financieringsstructuur Stichting BREIN draagt Thuiskopie hier vanaf 2024 niet meer aan bij. Contributies en bijdragen hierdoor substantieel lager dan voorgaande jaren. Geen andere toelichting gegeven op wijziging." },
      { titel: "Kosten SONT +49% naar €201K", richting: "up", impact: "A", detail: "€135K → €201K (begroting €175K). Thuiskopie betaalt kosten van SONT-tarieforgaan (niet de voorzitter — die wordt door Ministerie van Justitie en Veiligheid betaald). Betreft voornamelijk marktonderzoek en juridische/economische adviseurs van voorzitter. SONT heeft aanvullend onderzoek geëntameerd voor onderhandelingen tarieven na 2025." },
      { titel: "Advieskosten +26% naar €411K", richting: "up", impact: "W", detail: "€327K → €411K. Juridisch advies €312K → €395K (+27%) — reflecteert aanhoudende procedures. Overig advies €16K (2023: €15K). Totaal onder begroting €500K." },
      { titel: "Liquide middelen +12% naar €70,2 mln", richting: "up", impact: "A", detail: "€62,7 mln → €70,2 mln. Samenstelling: bankrekeningen €114K + spaarrekeningen €20,1 mln + deposito's €50,0 mln. Deposito's met vaste looptijden max 12 maanden. Groei hangt direct samen met achtergehouden €40,4 mln bruto gelden." },
      { titel: "SONT tarieven 2025 geïndexeerd verlengd", richting: "flat", impact: "P", detail: "In SONT-besluit voor tarieven 2023-2024 was al rekening gehouden met mogelijkheid van verlenging. Bestuur SONT besloot op 23 september 2024 daarvan gebruik te maken en geïndexeerde tarieven voor 2025 vastgesteld. SONT gebruikt periode t/m 2025 voor bredere herijking — naast HP-cassatie-uitkomst ook andere inzichten meewegen." },
      { titel: "FAIR en DAMD Kunstenbond betrokken bij repartitie", richting: "up", impact: "A", detail: "In de repartitie zullen rechthebbenden vertegenwoordigd door nieuw opgerichte CBO FAIR en rechthebbenden vertegenwoordigd door vakgroep DAMD van Kunstenbond worden betrokken. Proces tot vaststellen van verdeelsleutels is gaande. Uitbreiding van het aantal verdeelorganisaties (nu 9 aangewezen: Stemra, SEKAM Video, Lira, Pictoright, Norma, STAP, SCGO, PRO, VEVAM)." },
      { titel: "FTE 5,6 (was 6,0) · eigen directeur vanaf 16 aug 2024", richting: "flat", impact: "A", detail: "Gemiddeld 5,3 FTE via Cedar (2023: 6,0) + 0,3 FTE eigen dienstverband. Structurele verschuiving: t/m maart 2024 was directeur in loondienst Cedar (doorbelast via functietarief), vanaf 16 augustus 2024 is Zijlmans in directe loondienst Thuiskopie. Personeelskosten €147K (2023: €0) — kosten Cedar tegelijk gedaald (€862K → €831K)." },

    risicos: [
      { cat: "Juridisch", sev: "W", titel: "HP c.s.-cassatie → prejudiciële vragen aan HvJ EU", detail: "Hoge Raad heeft op 24 mei 2024 tussenarrest gewezen en kondigde voornemen aan om vragen van uitleg aan Europese Hof van Justitie te stellen over 'offline streaming copies/tethered downloads'. Hof Den Haag had 22 maart 2022 geoordeeld dat daarvoor geen thuiskopievergoeding verschuldigd is. Thuiskopie heeft cassatie ingesteld (De Brauw Blackstone Westbroek gaf positief cassatieadvies). Uitspraak HvJ EU niet vóór 2025 verwacht. Arrest is niet uitvoerbaar bij voorraad — geen concrete bedragen toegewezen." },
      { cat: "Juridisch", sev: "W", titel: "MobielWerkt/Websend en Apple-zaken lopen", detail: "MobielWerkt B.V. en Websend B.V. zijn in april 2021 procedure gestart tegen SONT-besluit vanaf 2021 (heffingen hoofdzakelijk op smartphones). Apple Distribution International Ltd. heeft grotendeels gelijkluidende dagvaarding uitgebracht. In beide zaken nog geen vonnis — rechtbank wacht eerst HP c.s.-uitspraak Hoge Raad af. Vordering: verklaring voor recht dat betalingen onverschuldigd zijn betaald of Thuiskopie ongerechtvaardigd verrijkt wordt." },
      { cat: "Incasso", sev: "A", titel: "€40,4 mln bewust achtergehouden — geen voorziening", detail: "Bestuur heeft op basis van juridische adviezen besloten géén voorziening(en) of afwentelingsvorderingen te vormen voor lopende procedures. Achtergehouden gelden zijn 'geen inschatting van mogelijke verplichtingen' uit procedures, maar bestuursbesluit om risico's over jaren te spreiden. Verwachting bestuur: eventuele verplichtingen kunnen uit toekomstige incasso-inkomsten worden voldaan. CvTA is hierover geïnformeerd. Als risico's zich niet materialiseren worden inhoudingen alsnog uitgekeerd." },
      { cat: "Marktdynamiek", sev: "A", titel: "Smartphones structureel licht dalend", detail: "Smartphones zijn voor Thuiskopie belangrijke categorie. Verslag constateert: 'zeer licht dalende trend door steeds langere gebruiksduur'. In combinatie met cloud-verschuiving (onderzoek SONT/Verian toont toenemend gebruik cloud-opslag) lange-termijn bedreiging voor incassobasis — terwijl tarieven juist hoofdzakelijk op smartphones/laptops/tablets rusten (argument van Apple/MobielWerkt in hun procedures)." },
      { cat: "Governance", sev: "A", titel: "Drie directeuren in 12 maanden + voorzitter vacant", detail: "Mw. Wijminga vertrok per 31 maart 2024. Dhr. Solleveld interim 1 april - 15 augustus 2024. Dhr. Zijlmans vanaf 16 augustus 2024. Voorzitter dhr. Van den Heuvel vertrok eind maart 2025 — positie vacant, sollicitatieprocedure lopend. Discontinuïteit in dagelijkse leiding en strategische aansturing over 12 maanden." },
      { cat: "Operationeel", sev: "A", titel: "Cedar-afhankelijkheid — verplichting €253K bij beëindiging", detail: "Operationele activiteiten volledig via Cedar B.V. (gezamenlijke dienstverlener 7 CBO's: Leenrecht, Lira, PRO, Reprorecht, Thuiskopie, UvO, VEVAM). Bij beëindiging dienstverleningsovereenkomst: vergoeding voor aandeel in langlopende huisvestingskosten Cedar + beëindigingskosten arbeidsovereenkomsten van direct werkzame medewerkers. Ultimo 2024: €253.509 (2023: €308.447)." },
      { cat: "Tarieven", sev: "A", titel: "SONT-herijking tarieven na 2025 in voorbereiding", detail: "Naast jaarlijkse consumentenonderzoek door Verian heeft SONT aanvullend onderzoek geëntameerd waarvan uitkomsten gebruikt worden bij onderhandelingen over tarieven periode na 2025. Uitkomst HP-cassatie en andere inzichten worden meegenomen. Onderhandeling in tarieforgaan met betalingsplichtigen die tegelijkertijd procederen — structurele spanning." },
      { cat: "Governance", sev: "P", titel: "Statutenwijziging ter CvTA-goedkeuring", detail: "In verslagjaar gewerkt aan verbetering governance, resulterend in statutenwijziging die in 2023 ter goedkeuring aan CvTA is voorgelegd. Aanpassingen betreffen onder andere zittingstermijnen van bestuursleden en onafhankelijk extern advies voor de verdeling van thuiskopiegelden. Status eind 2024: nog niet afgerond." },
      { cat: "Governance", sev: "P", titel: "Zelfevaluatie bestuur 2024 met externe deskundige", detail: "Regelmatig vindt zelfevaluatie naar functioneren van toezichthoudend bestuur plaats onder begeleiding van externe deskundige — zo ook in 2024. Bestuursleden zijn generalisten met enkele relevante kennisgebieden, streven naar diversiteit via profielschetsen." },
      { cat: "Financieel", sev: "P", titel: "Algemene reserve €1,678 mln — ruim boven doelstelling", detail: "Vermogensdoelstelling €750K (≈ halfjaar bedrijfslasten) — werkelijke algemene reserve €1,678 mln (2,2x doelstelling). Eigen vermogen uitsluitend ter borging continuïteit. Statuten bieden geen directe mogelijkheid om vermogensoverschot aan belanghebbenden uit te keren — bij overschot kan bestuursbesluit via rechtstreekse vermogensmutatie naar te verdelen rechten." },

      { titel: "20% van gereserveerde Thuiskopie-gelden 2021-2024 nog niet uitgekeerd", richting: "flat", impact: "A", detail: "Stichting de Thuiskopie heeft over de jaren 2021 t/m 2024 slechts 80% van de gereserveerde gelden aan SCGO uitgekeerd i.v.m. ontbreken definitieve verdeelsleutels. SCGO verwacht ca. €800K nog te ontvangen over 2021-2024 m.b.t. de 20%-reservering. In januari 2025 is opnieuw 80% van gereserveerde 2024-gelden uitgekeerd: €839.007 — basis voor budget 2025." },
      { titel: "Inhoudingspercentage SCGO verhoogd 8,7% → 11,66%", richting: "up", impact: "A", detail: "Bestuur heeft voorstel van directie goedgekeurd om inhoudingspercentage te verhogen. In lijn met verhoging door Stichting de Thuiskopie van eigen inhoudingspercentage; noodzakelijk geacht ter dekking van kosten SCGO ook nu repartitie achterblijft. Op netto €723.187 is 11,66% ingehouden → €638.878 uitgekeerd aan omroepen. Van de totale ontvangst wordt uiteindelijk 88,34% doorgesluisd naar omroepen (2024: 81,2%)." },
      { titel: "Totale kostenratio 24,05% (was 15,66%)", richting: "up", impact: "W", detail: "Kosten Stg. Thuiskopie / totale incasso: 8,11% (was 7,33%). Kosten SCGO / totale incasso: 15,95% (was 8,33%). Totaal: 24,05% — bijna 1,5× hoger dan 2023. Stijging vooral door lagere incassobasis (noemer) bij relatief vaste kosten en eenmalige afboeking kosten voorgaande jaren €13.575 (debiteuren)." },
      { titel: "Resultaat -€41K (was +€32K)", richting: "down", impact: "A", detail: "Bedrijfsresultaat uit gewone bedrijfsuitoefening -€41.179 (2023: +€31.770). Ter dekking operationele kosten: €84.310 (was €142.447, -41%). Totaal der kosten €125.284 (2023: €110.483, +13%). Bankkosten €205. Mutatie toegerekend aan algemene reserve (nu negatief)." },

      { titel: "Uitkering aan omroepen: NPO grootste ontvanger (€257K, 40% van totaal)", richting: "flat", impact: "A", detail: "Totaal €638.878 verdeeld over ruim 25 binnen- en buitenlandse omroepen. Top 3: NPO €256.581 (€235.179 AV + €21.402 online) · RTL €141.414 (€134.738 AV + €6.676 online) · Talpa €108.312 (€105.341 AV + €2.971 online) — samen 79% van repartitie. Kleinere posten: Discovery Channel €19.598, Be Viacom €18.986, RPO €14.086, BBC First €12.249, ESPN €12.861, Disney Channel €8.574, Canvas/Ziggo Sport elk €6.737, BBC €4.900, History €3.062, 192TV €3.062, ARD/WDR €2.450, ZDF €1.837, overige posten <€1K (RTL+, SAT 1, CNN, ONS)." },
      { titel: "Budget 2025 -€5K · budget 2026 +€18K na VOICE-opzegging", richting: "flat", impact: "P", detail: "Budget 2025: te ontvangen €839.007 (januari 2025 reeds ontvangen, 80% van 2024-gereserveerde gelden) · kosten SCGO €98.711 · netto -€4.568. Budget 2026: kosten SCGO €77.061 (-€21.650 door opzegging VOICE-lidmaatschap per 1-1-2026) · netto +€17.951. Liquide middelen 31-12-2024: €32.847 (was €301.174, -89%) — zeer laag niveau; kortlopende schulden €55.200." },

      { titel: "Rente op tijdsdeposito's €84K (was €31K)", richting: "up", impact: "P", detail: "Financieel resultaat +€83K in 2024 versus +€30K in 2023 — positief rente-effect meer dan €50K. Beleggingsstatuut vereist ten minste 50% van liquide middelen in cash, rest conservatief (tijd-deposito's of veilige Euro-obligaties). IPRO houdt géén obligaties. €7,29 mln van €7,38 mln bankbalans vastgezet in deposito's (6–12 mnd looptijd). Beleid alleen zinvol zolang depositorente significant hoger dan spaarrente — minder waar in 2025." },
      { titel: "Netto nieuw surplus €204K in 2024", richting: "up", impact: "P", detail: "Surplus = inhouding minus werkelijke kosten. Wordt teruggesluisd naar toekomstige repartities. Bestuur stelt voor surplus 2024 €203.584 uit te keren aan rechthebbenden (verwerkt in balans als 'Obligations to rightsholders'). Historisch patroon: 2021: €52K · 2022: €99K · 2023: €93K · 2024: €204K." },
      { titel: "100% pay-out binnen 6 maanden", richting: "flat", impact: "P", detail: "Alle in 2024 ontvangen incasso (€5.393K) uitbetaald binnen 6 maanden. NL-lump-sum van okt 2023 (€4.298K) uitgekeerd feb 2024; NL-lump-sum van nov 2024 (€4.886K) uitgekeerd feb 2025. France Pharma dec 2023 (€334K) maart 2024; France Pharma aug 2024 (€337K) okt 2024. Repartitie-praktijk gemiddeld binnen 4 maanden — ruim binnen EU-CMO-termijn." },
      { titel: "Hoog aandeel niet-Nederlands bronmateriaal", richting: "up", impact: "P", detail: "Uit meest recente markt-surveys (2021): aan universiteiten steeg re-use van niet-Nederlandse bronnen van ~60% (2017) naar 85% (2021). Aan HBO's van 25% naar 35%. Engels wordt lingua franca in NL hoger onderwijs — structureel positief voor IPRO dat internationale uitgevers vertegenwoordigt. Verdeelsleutels 2021-survey toegepast voor incasso's 2021-2024." },
      { titel: "FTE stabiel 1,11 · 2 werknemers", richting: "flat", impact: "A", detail: "2024: 2 werknemers, gemiddeld 1,11 FTE (gelijk aan 2023: 1,11 FTE). Managing Director Eefke Smit werkt 0,67 FTE. Extreme slanke operatie — IPRO's relatieve kosten stabiel ruim onder 5%." },
      { titel: "Budget 2025: surplus €147K (was €204K)", richting: "down", impact: "A", detail: "Begroting 2025: netto collecties voor repartitie €5.371K (was 2024: €5.708K — referentie gebaseerd op gereparteerde collecties, niet ontvangen). IPRO-inkomen €300K (was €278K). IPRO-kosten €233K (was €189K in 2024). Surplus French repartitions: €20K (was €32K). Bankrente: €60K (was €83K). Verwachte daling bankrente door normaliserende rentemarkten." },
      { titel: "Repartitie naar 41 organisaties · >150 rechthebbenden", richting: "flat", impact: "P", detail: "Aantal repartitie-ontvangers: 41 in 2024 (was 45 in 2023, 40 in 2022, 31 in 2021). >150 vertegenwoordigde rechthebbenden. 6 vertegenwoordigde RRO's: mandaten via STM-leden plus indirect via CCC, CLA, CFC, VG Wort, Reprobel. IPRO heeft geen overeenkomsten met individuele rechthebbenden — alleen met organisaties." },
      { titel: "Cumulatieve operationele kostenmutatie -47,2%", richting: "down", impact: "P", detail: "Operationele kosten dalen van €180K (2021) → €179K (2022) → €224K (2023) → €157K (2024) in P&L. Terwijl CPI 3,8% was in 2024. Kostenstructuur: salarissen €143K (2024, was €153K in 2023), afschrijving €1K, overige €14K. Recharging-mechanisme: €123K doorbelast naar andere projecten (was €74K) — substantiële verhoging reflecteert intensivering samenwerking met UvO/CEDAR/CFC." },

    risicos: [
      { cat: "Geopolitiek", sev: "W", titel: "Withering Storms — wereld minder stabiel bij 30-jarig bestaan", detail: "Voorwoord voorzitter Hendriks benoemt expliciet: geo-economie en -politiek in disarray; fundamentele democratische governance-waarden uitgedaagd; academische vrijheid in gevaar; universiteiten wereldwijd forse budgetbezuinigingen; internationale uitwisseling onderzoekers/studenten bestempeld als 'elite luxury'. Copyright en eerlijke remuneratie zijn diep geworteld in waarden van vrije meningsuiting, vrije pers en academische vrijheid — 'difficult not to be worried in times like these'." },

      { cat: "Inkomsten", sev: "W", titel: "Open access & CC-BY licenties onder druk op compensatiemodel", detail: "Ontwikkelingen in open access en copyright-hervormingen expliciet als hoofddrivers benoemd die IPRO substantieel kunnen raken. Compensatie voor re-use kan 'commensurably' dalen als onderwijsvrijstellingen worden ingevoerd en aandeel open-access materiaal onder CC-BY licenties stijgt. Ook nieuwe sharing tools en collaboration-netwerken tussen docenten en studenten zijn onderwerp van ongoing exploratie door IPRO en UvO." },

      { cat: "Toezicht", sev: "P", titel: "CvTA-light regime in voorbereiding", detail: "IPRO verwelkomt intentie van CvTA om 'lightweight government supervision' op te zetten. In 2025 wacht IPRO op aankondiging CvTA wanneer en hoe nieuw regime geïmplementeerd wordt en hoe verankerd in diverse juridische instructies die nu onder review zijn. Toegenomen EU-supervisie en strengere regels ziet bestuur juist als positieve kans voor CMO's — level playing field verbetert als nationale RRO's transparanter en accountable worden." },

      { cat: "Assurance", sev: "A", titel: "Rapport is samenstellingsopdracht — géén controleverklaring", detail: "Rapport 2024 opgesteld door Deloitte Accountancy & Advies B.V. (D.H.A.J. van Limpt) conform NVKS 4410 'Samenstellingsopdrachten' — niet conform controle- of beoordelingsstandaard. Compilation report verklaart expliciet: 'We have not performed any audit or review procedures which would enable us to express an opinion or a conclusion as to the fair presentation of the financial statements.' Verantwoordelijkheid voor correctheid cijfers ligt bij bestuur; Deloitte leest slechts of jaarrekening aansluit bij begrip van de organisatie en of transparancy-rapport consistent is. Onderscheidt zich van CBO's met goedkeurende controleverklaring." },
      { cat: "Reserves", sev: "P", titel: "Eigen vermogen €1,0 mln — ongewijzigd", detail: "Strategische reserve €625K (verhoogd van €375K in november 2021 om pas te houden bij gestegen repartitie-omvang; oorspronkelijk €250K in 2004). Geoormerkte reserves €375K (liquidatiereserve + operationele reserve voor ~1 jaar kosten). Totaal EV €1,0 mln ongewijzigd t.o.v. 2023. Budget 2025 operationele kosten €233K (4,3% van geplande repartitie) — operationele reserve dekt ca. 1,6 jaar kosten." },
      { cat: "Concentratie", sev: "A", titel: "Mandaten niet-exclusief · gemiddeld 6 RRO-partners", detail: "Mandaten aan IPRO zijn non-exclusief. Repartitie uitsluitend naar organisaties (6 RRO's: CCC, CLA, CFC, VG Wort, Reprobel + STM-leden), niet naar individuele rechthebbenden. Market-shares per 2021-survey: STM + STM-publishers 43,54% universiteiten / 52,35% HBO's. Resterend verdeeld over CCC, CLA, VGWORT, CFC, Reprobel." },
      { cat: "Governance", sev: "P", titel: "Bestuur en directie binnen WNT-normen", detail: "Managing Director Eefke Smit: €144.544 totaal uitbetaald in 2024 (0,67 FTE) — salaris, sociale premies, pensioen, bonussen en overige vergoedingen. Compliant met Wet Normering Topinkomens. Voorzitter subsistence €5.000 (gelijk aan 2023); penningmeester €4.000 (idem). Overige bestuursleden geen vergoeding ten laste van stichting. Jaarlijkse performance-appraisal Managing Director gedeeld in rapport aan bestuur. Geen conflict of interest gerapporteerd in 2024 of daarna." },

        { titel: "Fase 2 · Hoofdlijnenakkoord II + actualisering", periode: "2024", focus: "Vernieuwde mandaatovereenkomsten met Lira, Pictoright, PRO en FEMU + vernieuwde aanwijzingsovereenkomsten. Verdeelmatrix geactualiseerd per 2024 op basis van marktonderzoek. Uitzonderingsregeling fictief makers (niet zijnde uitgeverijen) vervangen door geactualiseerde regeling. CvTA-goedkeuring verkregen." },
        { titel: "Fase 3 · Uitbreiding regeling Zakelijk", periode: "per 2025", focus: "Gebruiksvoorwaarden Zakelijk uitgebreid met: tekst en afbeeldingen in presentaties · vertonen presentaties (intern + max 100 externen) · losse teksten en afbeeldingen van professionele makers, al dan niet van internet. Na CvTA-goedkeuring kan in 2025 ook Reprorechtregeling Onderwijs uitgebreid worden." },

    trends: [

      { titel: "Repartitie +12,5% naar €30,3M (incl. €912K uit EV)", richting: "up", impact: "P", detail: "€27,0M (2023) → €30,3M (2024). Verdeling 2024 van in 2023 geïnde gelden, binnen wettelijke 9-maands termijn. Inclusief €912K uit algemene reserve toegevoegd aan te verdelen rechten (gelijk aan 2023). Verdeling: individuele rechthebbenden €8K (1 uitkering o.b.v. bestuursbesluit) · NL CBO's €29,3M (PRO €13,1M / Lira €8,7M / Pictoright €4,6M / FEMU €0,3M) · buitenlandse CBO's €1,05M." },

      { titel: "Bedrijfslasten +11,3% naar €2,64M (onder budget €3,03M)", richting: "up", impact: "A", detail: "Stijgers: kosten Cedar €1,59M → €1,74M (+9,2%, automatisering Cedar €337K → €416K +23%) · kosten marktinformatie €26K → €72K (pilotonderzoek presentaties) · kosten facturatie €244K → €406K (+66%, veel herinneringen in afronding MK1-cyclus). Dalers: contributies €167K → €101K (andere financieringsstructuur Stichting BREIN) · kosten advies €33K → €27K. Bedrijfslasten als % rechtenopbrengst: 8,0% → 9,4%." },
      { titel: "Financieel resultaat €622K (was €177K, +251%)", richting: "up", impact: "P", detail: "Rente op spaarrekeningen en deposito's substantieel hoger dan begroot (€400K) en dan 2023 door gedurende 2024 hogere marktrentes. Compenseert precies het negatieve saldo van baten en lasten (-€622K) — eindresultaat €0. Vergelijkbare dynamiek bij andere CBO's: rente-effect als belangrijkste driver van operationele dekking. Begroting 2025: financieel resultaat €400K — neerwaarts verwacht." },
      { titel: "Algemene reserve afbouw voltooid op doelniveau €1,0M", richting: "down", impact: "P", detail: "€2,8M (1/1/2022) → €1,9M (1/1/2024) → €1,0M (31/12/2024). Gewenste omvang in 2021 vastgesteld op €1,0M of minimaal exit-verplichting Cedar indien hoger (ultimo 2024: €622.722). Overschrijding afgebouwd via jaarlijkse toevoeging €912K aan te verdelen rechten in 2022, 2023 én 2024 — verwerkt rechtstreeks via algemene reserve, niet via staat van baten en lasten. Auditcommissie stelt jaarlijks voorafgaand aan verdelingsbudget vast dat na uitkering minimaal 2 jaar bedrijfslasten liquiditeit overblijft." },
      { titel: "Gefactureerde gebruikers 144K → 115K (-20%)", richting: "down", impact: "A", detail: "Daling consistent met tweejaarlijkse aanschrijving MK1 (bedrijven t/m 19 fte): grootste deel wordt in eerste jaar van tweejaarlijkse factuurcyclus aangeschreven. Aantal uitgekeerde rechthebbenden: 20 (gelijk aan 2023) — via 4 verdeelorganisaties plus individuele uitzonderingen. FTE +6% naar 11,0 (via Cedar — Reprorecht heeft zelf geen medewerkers in dienst)." },
      { titel: "Inning per sector: bedrijfsleven -8,7% · onderwijs +0,5% · overheid -15,4%", richting: "flat", impact: "A", detail: "Bedrijfsleven €14,7M → €13,4M (MKB-cyclus). Onderwijs €12,1M → €12,2M (stabiel; gesprekken met PO-Raad/VO-raad/Unie van Waterschappen/VNG lopend). Overheid €1,6M → €1,4M. Buitenland €1,2M → €1,2M. Grootste buitenland-ontvangsten: Reprobel (België) €688K · CLA (UK) €181K · Copyright Agency Ltd (Australië) €122K · Kopinor (Noorwegen) €81K · ProLitteris (Zwitserland) €53K." },
      { titel: "Begroting 2025: €400K tekort · gedekt door rente", richting: "flat", impact: "A", detail: "Baten €2,66M · lasten €3,06M · saldo -€400K · financieel resultaat €400K · resultaat €0. Grootste kostenposten: Cedar €2,07M · facturatie €282K · marktonderzoek €175K · bestuur/toezicht €125K · contributies €125K. 2025 is eerste jaar nieuwe MK1-factuurcyclus (2025–2026) — meer aanschrijvingen = structureel meer facturatiekosten in oneven jaren." },
      { titel: "Ontvangen rente-kasstroom €600K (was €3K)", richting: "up", impact: "P", detail: "Kasstroomoverzicht: ontvangen interest €600K in 2024 versus slechts €3K in 2023 — forse timing-rebound van renteontvangsten op deposito's. Liquide middelen ultimo 2024: bankrekeningen €137K · spaarrekeningen €4,7M · deposito's €22,5M (verschillende looptijden max 12 mnd). Totaal €27,3M (was €29,3M) — daling door €912K EV-onttrekking + werkkapitaalmutaties. Gelden bij meerdere grote NL-banken." },
      { titel: "Bestuur 17 personen · paritair · gem. leeftijd 58 · M/V: 9/8", richting: "flat", impact: "P", detail: "Toezichthoudend bestuur: 6 auteurs + 2 beeldauteurs + 8 uitgevers + 1 onafhankelijk voorzitter (Valkering sinds 2017). Plus 1 vacature (KNAW). Aangewezen door: Auteursbond (3), KNAW (1 vacant), NVJ (1), Lira (1), BNO/DuPho/Continuïteit Beeldrecht (1), Pictoright (1), Mediafederatie (6 via MEVW/GEU/NDP/GAU/MMA) en NMUV+VMN (1). Uit midden: Presidium (5 leden, 4× vergaderd 2024) + Auditcommissie (3 leden, sinds 2021, 4× vergaderd 2024)." },

    risicos: [
      { cat: "AI", sev: "W", titel: "Generatieve AI traint met auteursrechtelijk materiaal — verdienmodellen makers onder druk", detail: "Voorwoord expliciet: 'een tijd waarin de creatieve industrie onder druk staat, bijvoorbeeld door generatieve AI-toepassingen die zijn getraind met auteursrechtelijk beschermd materiaal en die de verdienmodellen van creatieve makers kunnen gaan ondermijnen'. Strategische afhankelijkheid van '(technologische) ontwikkelingen in het gebruik van auteursrechtelijk beschermde werken' expliciet in risicoregister. Geen concrete Reprorecht-maatregelen of AI-projecten gerapporteerd — signalering op strategisch niveau zonder operationele respons." },
      { cat: "Mandaten", sev: "W", titel: "Sterk afhankelijk van mandaten Lira/PRO/Pictoright/FEMU + buitenlandse zusterorganisaties", detail: "Reprorecht is pure tussenschakel: wettelijke reprorechtvergoeding (Reprobesluit 1974) voor fotokopiëren + mandaat van rechthebbenden-organisaties voor digitaal hergebruik. Zonder mandaten kan Reprorecht digitaal niet innen. Risico gemitigeerd door Hoofdlijnenakkoord II (2024) met vernieuwde mandaatovereenkomsten met alle vier NL-partners — maar blijft structurele afhankelijkheid. Bovendien afhankelijk van behoud van draagvlak bij bedrijven en scholen (PO/VO)." },
      { cat: "Concentratie", sev: "A", titel: "MKB-aanschrijving tweejaarlijks → structurele inning-fluctuatie", detail: "Bedrijven t/m 19 fte (MK1) worden tweejaarlijks aangeschreven, waarvan het grootste deel in het eerste jaar. Gevolg: totaal-inning zaagt jaarlijks met 10–20% fluctuatie. 2024 was tweede jaar van cyclus 2023–2024; 2025 start nieuwe cyclus met volledige MK1-aanschrijving. Voor begroting en cashflow-planning moet steeds 2-jaarsgemiddelde worden gehanteerd — bedrijfslasten cycleren mee (facturatiekosten 2024: €406K · begroot 2025: €282K)." },
      { cat: "Wetgeving", sev: "A", titel: "Reprorecht berust op zelfregulering + Reprobesluit uit 1974", detail: "'Overheid heeft gekozen voor zelfregulering van het reprorecht.' Hele systeem afhankelijk van 'welwillendheid van betrokken koepelorganisaties van zowel betalende organisaties als rechthebbenden'. Convenant VNO-NCW/MKB-Nederland uit 2013 is fundament voor bedrijfstarieven. Bij verandering van politiek klimaat rond zelfregulering — of fundamentele Auteurswet-aanpassing i.v.m. AI-exceptions — is systeem kwetsbaar." },
      { cat: "Operationeel", sev: "A", titel: "Afhankelijkheid Cedar · exit-verplichting €623K", detail: "Volledige operatie (ICT, juridische zaken, financiële administratie, communicatie, huisvesting, personeelszaken) uitbesteed aan Cedar B.V. Reprorecht zitting in bestuur Stichting Cedar (aandeelhouder). Cedar bedient 7 CBO's (Leenrecht, Lira, PRO, Reprorecht, Thuiskopie, UvO, VEVAM). Bij beëindiging dienstverlening: verplichting ultimo 2024 €622.722 (2023: €642.278) voor aandeel langlopende huisvestingskosten Cedar + ontslagkosten direct betrokken medewerkers. Beschikbaarheid/betrouwbaarheid complexe geautomatiseerde systemen 'van groot belang'." },
      { cat: "Governance", sev: "A", titel: "Gemengd bestuursmodel: statutair bestuur ook toezichthoudend", detail: "Huidige model: statutair bestuur neemt Wet Toezicht-besluiten én is verantwoordelijk voor toezichthoudend proces. Uit hoofdstuk governance en voorwoord: 'dit blijft een uitdaging'. In 2023 bestuursstructuur geëvalueerd onder extern adviseur; voorlopige keuze voor nieuw bestuursmodel. In 2024 verder gewerkt aan uitwerking. Nog geen definitieve implementatiedatum of structuur gepubliceerd in jaarverslag 2024." },
      { cat: "Financieel", sev: "A", titel: "Bedrijfslasten +11,3% terwijl rechtenopbrengst -5,1%", detail: "Lasten €2,37M → €2,64M terwijl inning €29,7M → €28,2M. Lasten als % rechtenopbrengst: 8,0% → 9,4%. Deel van stijging is cyclisch (herinneringskosten MK1-jaar 2) en incidenteel (pilot presentatieonderzoek), maar Cedar-kosten stijgen structureel (+9,2%). Algemene reserve op minimum (€1,0M) = ~0,4 jaar bedrijfslasten. Reprorecht vertrouwt op rente-inkomsten op deposito's voor dekking negatief bedrijfsresultaat — begroting 2025 bevestigt dit patroon." },
      { cat: "Klanttevredenheid", sev: "P", titel: "1 klacht in 2024 · geen beroep bij Commissie sinds 2015", detail: "In verslagjaar 1 klacht ontvangen en afgehandeld. Commissie van Beroep heeft sinds 2015 geen beroepschrift ontvangen — zeer laag conflictniveau vergeleken met grotere CBO's. In 2024 géén licenties geweigerd (art. 2l lid 3 Wet toezicht). Past bij profiel van gematigde stichting met nauwe samenwerking koepels VNO-NCW/MKB-Nederland en onderwijskoepels." },
      { cat: "Assurance", sev: "P", titel: "Goedkeurende controleverklaring Flynth Audit", detail: "Flynth Audit B.V. (L.J.M. Schram RA) verklaart op 25 juni 2025 dat jaarrekening getrouw beeld geeft conform Titel 9 BW 2 en WNT. Controleprotocol WNT 2024 gevolgd; naleving anticumulatiebepaling WNT expliciet NIET gecontroleerd (conform protocol). Geen beperkingen, geen benadrukking, geen materiële onzekerheden. Onderscheidt zich van CBO's met samenstellingsopdracht (FEMU, IPRO, SCGO)." },
      { cat: "ESG", sev: "P", titel: "Duurzaam middelenbeheer in voorbereiding", detail: "Bestuur 2024 sprak over ESG-criteria en activiteiten Reprorecht met mogelijke gevolgen voor samenleving/milieu. Auditcommissie nodigde huisbankier ING Bank uit voor gesprek over duurzamer deposito Reprorecht-gelden. Begin 2025 presenteerde ING klimaatdoelen/-aanpak en meldde groen deposito voor woningcorporaties in ontwikkeling — mogelijk interessant voor Reprorecht. Auditcommissie 'benieuwd naar aanbod'. Geen concrete implementatie in 2024." },
      { cat: "Verdeelsleutel", sev: "P", titel: "Verdeelmatrix 2024 geactualiseerd + nieuwe fictief-makers-regeling", detail: "Op basis Verian-onderzoek naar hergebruik per categorie tekst/beeldwerken is Verdeelmatrix 2024 geactualiseerd. Totaal beschikbare bedrag toegerekend aan verschillende uitkeringscategorieën. Uitzonderingsregeling fictief makers (niet zijnde uitgeverijen) vervangen door geactualiseerde regeling. Toets Reglement Uitkeringen meegenomen. CvTA-goedkeuring verkregen — onderdeel van Hoofdlijnenakkoord II-pakket." },

      { type: "zelfevaluatie", rol: "Bestuur jaarlijks", datum: "2024 met extern deskundige", details: "Jaarlijkse zelfevaluatie functioneren bestuur, in 2024 onder begeleiding extern deskundige. Input ook van directeur. Aandachtspunt: 'rust en ruimte die moet worden genomen om te reflecteren op resultaten en processen van inning en uitkering, gedrag en cultuur. Vermeden moet worden dat die aandacht naar de achtergrond schuift door veelheid governanceregels.'" },
      { type: "WNT", rol: "WNT-verantwoording compliance", datum: "2024", details: "Alle topfunctionarissen onder individueel toepasselijk bezoldigingsmaximum. Stichtingsmax 2024: €233.000 (was €223.000). Directeur €219.298 (94,1% van max). Voorzitter €24.587 (70,3% van 15%-max). Overige bestuursleden <€5.000 (10%-max = €23.300). Veel bestuursleden zien af van vacatiegelden — opgenomen als bezoldiging <€2.100 in WNT-verantwoording. Naleving anticumulatiebepaling WNT niet gecontroleerd door accountant (conform controleprotocol WNT 2024)." },
      { type: "integriteit", rol: "Gedragscode + vertrouwenspersoon", datum: "doorlopend", details: "Belangenconflicten gedefinieerd in statuten/reglementen; oordeel op basis concrete nevenfuncties. Meldregeling vermoeden misstand of integriteitsschending. Onafhankelijk vertrouwenspersoon voor ongewenst gedrag (Arbo-wet). Bestuursleden en directeur verklaarden in 2024 géén reprorechtvergoedingen rechtstreeks te hebben ontvangen en géén tegenstrijdig persoonlijk belang te hebben." },

    incidenten: [
      { type: "akkoord", titel: "Hoofdlijnenakkoord II bereikt na 2 jaar voorbereiding", impact: "Samenwerking Reprorecht + Lira/PRO/Pictoright/FEMU opnieuw in meerjarenplan · vernieuwde mandaat- en aanwijzingsovereenkomsten · CvTA-goedkeuring", datum: "2024", detail: "Na Verian-onderzoek (2022–2023) naar delen/gebruiken informatie in bedrijven, overheid en PO/VO-scholen, en uitgebreide dialoog over betekenis uitkomsten voor regeling en gebruiksvoorwaarden. Onderdelen: vernieuwde mandaatovereenkomsten met alle 4 mandaatpartners · vernieuwde aanwijzingsovereenkomsten met Lira, Pictoright, PRO/De Mediafederatie en FEMU · uitbreiding + actualisering reprorechtregeling · verdeelmatrix per 2024 geactualiseerd · uitzonderingsregeling fictief makers (niet zijnde uitgeverijen) vervangen." },
      { type: "beleidswijziging", titel: "Reprorechtregeling Zakelijk per 2025 uitgebreid", impact: "Nieuwe gebruiksvormen onder licentie: presentaties + losse teksten/beelden van internet", datum: "per 2025 (CvTA-goedgekeurd 2024)", detail: "Uitbreiding met: (1) gebruik tekst en afbeeldingen in presentaties · (2) vertonen presentatie intern + aan max 100 externen · (3) gebruik losse teksten en afbeeldingen van professionele makers, al dan niet afkomstig van internet. Na CvTA-goedkeuring kan in 2025 ook Reprorechtregeling Onderwijs uitgebreid worden. Nieuwe gebruiksvoorwaarden in 2024 gepresenteerd en besproken met Commissie Auteursrechten van VNO-NCW/MKB-Nederland." },
      { type: "stelselwijziging", titel: "Administratievergoeding niet meer in mindering op te verdelen rechten", impact: "Geen invloed op resultaat of eigen vermogen · vergelijkende 2023-cijfers aangepast", datum: "per boekjaar 2024", detail: "Bij uitkering in te houden administratievergoeding wordt niet langer in mindering gebracht op te verdelen rechten en apart gepresenteerd onder overlopende passiva. 'Omdat over te verdelen rechten verder steeds over bruto bedragen wordt gesproken is besloten deze presentatie te wijzigen.' Presentatie sluit beter aan bij brancheusance. Nog in te houden admin.vergoeding naar post 'overlopende activa' (€1.869K ultimo 2024, was €2.036K)." },
      { type: "EV-mutatie", titel: "€912K onttrekking uit algemene reserve naar te verdelen rechten (derde achtereenvolgende jaar)", impact: "Algemene reserve €1,9M → €1,0M (doelniveau bereikt)", datum: "bestuursbesluit 2024", detail: "Verwerking rechtstreeks via vermindering algemene reserve naar te verdelen rechten (niet via staat van baten en lasten) — 'op vergelijkbare wijze als uitkeringen aan belanghebbenden bij andere rechtspersoonsvormen'. Methode voorkomt verstoring exploitatierekening. Afbouw voltooid: EV ultimo 2024 = €1,0M = doelniveau (vastgesteld 2021). Jaarlijkse toevoeging €912K in 2022, 2023 én 2024. Bestuur koos voor geleidelijke afbouw i.p.v. eenmalige uitkering." },

      { type: "onderzoek", titel: "Motivaction-pilot: kwalitatief onderzoek niet geschikt voor kengetallenonderzoek presentaties", impact: "Reprorecht oriënteert zich in 2025 op alternatieve methode", datum: "najaar 2024", detail: "Op verzoek Reprorecht voerde Motivaction afgelopen najaar kwalitatief pilotonderzoek uit (doel: effectiviteit veldwerkmethodes voor kengetallenonderzoek presentaties). Onderzoekconsultants Nel Verhoeven en Peter Mulder adviseerden. Gezamenlijke conclusie na pilot: kwalitatief onderzoek niet geschikt. Vervolgonderzoek nodig voor actualisering verdeelmatrix in context nieuwe regeling Zakelijk (presentaties) per 2025." },

      { titel: "Rechtenopbrengst -3,4% naar €30,8M", richting: "down", impact: "A", detail: "€31,9M (2023) → €30,8M (2024). Vooral lagere thuiskopie-incasso: €6,1M → €3,0M (-51%) — terugkeer naar normaal niveau na uitzonderlijk hoge 2023-incasso (eind 2023 nabetaling reservering 2019–2020). Reprorecht €8,1M → €8,7M (+7,9%). BMS/EMS €9,7M → €10,8M (+11,9%) door indexatie en Videma-toename. Leenrecht stabiel €5,8M → €6,0M. E-Lending €2,0M stabiel." },
      { titel: "Repartitie +12,8% naar €31,2M", richting: "up", impact: "P", detail: "€27,7M (2023) → €31,2M (2024). Aan rechthebbenden €24,5M (+16,7%), buitenlandse CBO's €6,7M (stabiel), NL CBO's €20K. Vooral thuiskopie-verdeling fors hoger (€3,4M → €6,1M, +79%) door in verdeling brengen eind 2023 ontvangen thuiskopiegelden over 2019–2020." },

      { titel: "Bedrijfslasten -2,1% naar €2,02M (onder budget €2,25M)", richting: "down", impact: "P", detail: "Belangrijkste posten: Cedar €1,14M (was €1,19M; -4,2%) · personeelskosten €299K · bestuur/toezicht €118K (was €133K) · automatisering €87K (was €53K; portalproject) · contributies €147K (BREIN €75K + €72K). Kosten Cedar personele inzet €608K (begroot €702K) door lager dan begrote bezetting. Bedrijfslasten als % repartitie: 6,9% → 6,1%." },
      { titel: "Financieel resultaat +€848K (+134%)", richting: "up", impact: "P", detail: "Rentebaten €848K (2023: €363K), begroot €600K. Door 'opgelopen rente op banktegoeden gedurende 2024' substantieel hoger dan ingeschat. Te ontvangen rente op balans: €475K (was €295K). Belangrijkste enkele factor achter positief eindresultaat — compenseert negatief saldo baten/lasten en overschrijdt begroting met €248K." },

      { titel: "Te verdelen rechten €27,5M → €25,1M (-9,0%)", richting: "down", impact: "P", detail: "Laagste niveau sinds 2021 (€29,5M). Samenstelling: BMS/EMS €14,6M (58%) · Reprorecht €5,1M · Leenrecht €2,8M · Thuiskopie €1,6M (was €4,9M — grotendeels verdeeld) · E-Lending €690K · Overig €291K. Per jaarlaag: 2024 €8,7M · 2023 €6,7M · 2022 €5,0M · 2021 €4,3M · 2020 e.o. €220K. Wettelijke 9-maandstermijn NL en 6-maandstermijn CBO-gelden in 2024 behaald." },
      { titel: "dBos-gelden €979K verdeeld aan 2.682 auteurs", richting: "flat", impact: "P", detail: "Tweede jaar compensatie OCW voor schooluitleningen via Stichting Leenrecht. €979.114 ontvangen, 7,5% socu ingehouden (€73K), van resterende €906K nog 4% admin.vergoeding: €906K netto uitgekeerd aan 2.682 kinder- en jeugdboekenauteurs (NUR-code selectie). Ondergrens €5, geen reserveringen. Restbedrag €14 niet uitkeerbaar. Wetswijziging opheffing onderwijsvrijstelling verwacht per juli 2026." },

      { titel: "Aangeslotenen +4,2% naar 17.092 · uitgekeerde rechthebbenden 25.260", richting: "up", impact: "P", detail: "17.092 zelfstandige tekstmakers aangesloten (2023: 16.397). In 2024 aan 25.260 rechthebbenden uitgekeerd (was 24.962). Gefactureerde gebruikers 37 (was 35). Doelgroep: romanciers, dichters, vertalers, journalisten, scenaristen, theaterauteurs, educatieve auteurs, wetenschappers, ondertitelaars, librettisten, hoorspelauteurs, recensenten, nasynchronisatieschrijvers." },
      { titel: "Socu-inhouding 7,5% = €2,07M naar Lira Fonds", richting: "flat", impact: "P", detail: "€2,07M (was €2,17M) volledig beschikbaar gesteld aan Stichting Lira Fonds (ANBI). Ruim onder wettelijk max 15%. Verwachting: op langere termijn terug naar historische 10%. Uitgezonderd van socu: E-Lending, individuele bedragen, gelden van buitenlandse zusterorganisaties. Plus €625K extra bijdrage uit algemene reserve in 2024 (idem 2023) als onderdeel EV-afbouw." },

    risicos: [
      { cat: "Wetgeving", sev: "W", titel: "VOD/EMS: vrijwillig collectief beheer 10 jaar na RODAP-convenant nog niet marktdekkend", detail: "2015 convenant met RODAP (omroepen/distributeurs/producenten) zou alle streamingdiensten verplichten VOD-vergoedingen én gebruiksdata te leveren. Tien jaar later: Netflix, KPN, Pathé Thuis leveren nóg steeds geen (volledige) data of vergoedingen. Wetgever heeft VOD uitgezonderd van wettelijke collectieve vergoedingsaanspraak. Lira-incasso VOD sterk gedaald terwijl VOD-omzetten explosief stegen. Platform Makers (mede namens Lira): oproep aan Tweede Kamer voor aanscherping wetsvoorstel Versterking Auteurscontractenrecht — 'Geen woorden, maar waarde'." },
      { cat: "Wetgeving", sev: "W", titel: "Wet versterking auteurscontractenrecht 2024 aangenomen — te zwak", detail: "Tweede Kamer nam in 2024 nieuw wetsvoorstel aan dat positie van makers moet versterken. Lira's oordeel: 'in de praktijk biedt de wetswijziging aan de makers helaas veel te weinig houvast'. Macht van 'reuzenexploitanten' (Netflix, Spotify, DPG, Mediahuis, NPO Start, Google, Universal, Disney) maakt uitoefenen van auteursrecht feitelijk onmogelijk zonder scherpere wet. 'Auteursrecht blijft strijdtoneel met overheid als tandeloze tijger.'" },
      { cat: "Wetgeving", sev: "A", titel: "Persuitgeversrecht DSM-richtlijn — gesprekken met OPR zonder akkoord", detail: "DSM-richtlijn 2021 voerde persuitgeversrecht in — vergoeding voor platforms (Google, zoekmachines, nieuwsaggregators, mediamonitoring). Gesprekken Lira met nieuwe uitgeversorganisatie OPR over passend makers-aandeel liepen in 2024 zonder akkoord. Vervolg in 2025." },
      { cat: "AI", sev: "A", titel: "AI-modellen getraind op werk zonder toestemming", detail: "Schrijvers en vertalers: AI is extra gereedschap, maar 'AI-modellen zijn zonder voorafgaande toestemming getraind met hun werk'. Recent Europese wet: AI-ontwikkelaars moeten transparant zijn over auteursrechtelijk beschermde trainings-input én zorgen dat output geen inbreuk maakt. 'Voorzichtige start, maar intussen nemen zorgen toe.' Lira volgt ontwikkelingen samen met Auteursbond en NVJ." },
      { cat: "Inkomsten", sev: "A", titel: "Thuiskopie-volatiliteit door reserveringen", detail: "Thuiskopie-incasso 2024: €3,0M (was €6,1M, -51%). Hoge 2023-incasso was eenmalig door vrijval reservering 2019–2020. Repartitie 2024 daarentegen fors (€6,1M) door in verdeling nemen die eenmalige betaling. Stichting de Thuiskopie houdt 'reserveringen aan in verband met de nog definitief vast te stellen hoofdverdeelsleutel voor thuiskopiegelden vanaf 2021' — mogelijk nog nabetaling." },
      { cat: "IT/cyber", sev: "A", titel: "Cybersecurity · menselijk falen als grootste risico", detail: "In 2024 gestart met continu opleidingsprogramma cybersecurity. Bewustwording medewerkers van 'grootste beveiligingsrisico: menselijk falen'. Passende beveiligingsmaatregelen al genomen: toegangscontrole, versleutelde communicatie website/portal, regelmatige controles. Portal-vernieuwing 2024–2025 bevat security-component." },
      { cat: "Operationeel", sev: "A", titel: "IT-afhankelijkheid Cedar", detail: "Volledige operatie via Cedar B.V. (gedeeld met Leenrecht, PRO, Reprorecht, Thuiskopie, UvO, VEVAM). 'Beschikbaarheid en betrouwbaarheid van complexe geautomatiseerde systemen van groot belang.' Exit-verplichting ultimo 2024: €401.237 (2023: €441.689) — langlopende verplichtingen Cedar + afkoop arbeidsovereenkomsten direct voor Lira werkzame medewerkers." },
